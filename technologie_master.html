<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Cours - Technologie Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800;900&display=swap');

        :root {
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --primary-700: #1d4ed8;
            --secondary-500: #10b981;
            --secondary-600: #059669;
            --accent-500: #8b5cf6;
            --accent-600: #7c3aed;
            --danger-500: #ef4444;
            --success-500: #16a34a;
            --neutral-50: #f8fafc;
            --neutral-100: #f1f5f9;
            --neutral-200: #e2e8f0;
            --neutral-300: #cbd5e1;
            --neutral-500: #64748b;
            --neutral-700: #334155;
            --neutral-800: #1e293b;
            --white: #ffffff;
            --font-primary: 'Poppins', sans-serif;
            --font-secondary: 'Inter', sans-serif;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --border-radius-lg: 0.75rem;
            --border-radius-md: 0.5rem;
            --transition-default: all 0.3s ease-in-out;
            --shadow-focus-ring: 0 0 0 3px rgba(59, 130, 246, 0.4);
        }

        body {
            font-family: var(--font-secondary);
            background-color: var(--neutral-100);
            color: var(--neutral-700);
            line-height: 1.6;
            margin: 0;
            padding: 1.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-container {
            background-color: var(--white);
            padding: 2.5rem;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            margin-bottom: 2rem;
            border-top: 5px solid var(--primary-500);
        }

        .page-header h1 {
            font-family: var(--font-primary);
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            color: var(--neutral-800);
            text-align: center;
            margin: 0 0 0.5rem 0;
        }

        .page-header-subtitle {
            text-align: center;
            font-size: 1.1rem;
            color: var(--neutral-500);
            font-weight: 500;
            margin: 0;
        }

        .section {
            background-color: var(--white);
            padding: 2.5rem;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            margin-bottom: 2rem;
        }

        .section h2 {
            font-family: var(--font-primary);
            font-size: 1.8rem;
            color: var(--primary-700);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--neutral-200);
            padding-bottom: 0.75rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .label-text {
            display: block;
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .input-field,
        .select-field,
        .textarea-field {
            width: 100%;
            box-sizing: border-box;
            padding: 0.8rem 1rem;
            border: 1px solid var(--neutral-300);
            border-radius: var(--border-radius-md);
            background-color: var(--neutral-50);
            font-size: 0.95rem;
            color: var(--neutral-700);
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
            font-family: var(--font-secondary);
        }

        .input-field:focus,
        .select-field:focus,
        .textarea-field:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: var(--shadow-focus-ring);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            font-family: var(--font-secondary);
            transition: var(--transition-default);
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary {
            background-color: var(--primary-500);
            color: var(--white);
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--primary-600);
        }

        .btn-secondary {
            background-color: var(--secondary-500);
            color: var(--white);
        }

        .btn-add {
            padding: 0.8rem;
            background-color: var(--accent-500);
            color: white;
            border-radius: var(--border-radius-md);
            font-size: 1rem;
        }

        .grid-2-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .grid-3-cols {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .radio-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 5px;
        }

        .radio-card {
            position: relative;
        }

        .radio-card input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-card label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: var(--neutral-50);
            border: 2px solid var(--neutral-200);
            border-radius: 8px;
            font-weight: 600;
            color: var(--neutral-500);
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-card input:checked+label {
            background: #eff6ff;
            border-color: var(--primary-500);
            color: var(--primary-700);
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }

        .design-panel {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .color-pickers {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .color-input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .color-input-group input[type="color"] {
            width: 45px;
            height: 45px;
            border: none;
            cursor: pointer;
        }

        .mimic-option {
            margin-top: 15px;
            padding: 15px;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .object-input-group {
            display: flex;
            gap: 0.5rem;
        }

        .object-input-group .input-field {
            flex-grow: 1;
        }

        #selectedObjectsContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1rem;
            padding: 0.5rem;
            min-height: 20px;
        }

        .selected-item {
            display: inline-flex;
            align-items: center;
            background-color: var(--secondary-500);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .remove-item-btn {
            margin-left: 0.75rem;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            padding: 0;
        }

        .suggestion-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .suggestion-item {
            padding: 0.4rem 0.8rem;
            background-color: var(--primary-500);
            color: var(--white);
            border-radius: var(--border-radius-md);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-default);
            user-select: none;
        }

        .suggestion-item:hover {
            background-color: var(--primary-600);
            transform: translateY(-1px);
        }

        .feedback-message {
            transition: all 0.3s;
            opacity: 0;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            font-weight: 500;
            max-height: 0;
            overflow: hidden;
        }

        .feedback-message.show {
            opacity: 1;
            max-height: 30px;
        }

        .feedback-message.success {
            color: var(--secondary-600);
        }

        @media (max-width: 768px) {

            .grid-2-cols,
            .grid-3-cols {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-container">
            <header class="page-header">
                <h1><i class="fas fa-laptop-code"></i> Générateur Master - Technologie</h1>
                <p class="page-header-subtitle">Version Consolidée : Richesse Pédagogique + Fonctionnalités Avancées</p>
            </header>
        </div>

        <section class="section">
            <h2>1. Sélection de la Séquence</h2>
            <div class="grid-2-cols">
                <div class="form-group">
                    <label for="gradeSelect" class="label-text">Niveau :</label>
                    <select id="gradeSelect" class="select-field">
                        <option value="">-- Choisir --</option>
                        <option value="5e">5ème</option>
                        <option value="4e">4ème</option>
                        <option value="3e">3ème</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="sequenceSelect" class="label-text">Séquence :</label>
                    <select id="sequenceSelect" class="select-field" disabled>
                        <option value="">-- Choisir un niveau --</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="label-text">Objet(s) d'étude (max 6) :</label>
                <div class="object-input-group">
                    <input type="text" id="studyObjectInput" class="input-field" placeholder="Ex: Drone, Robot...">
                    <button id="addObjectButton" class="btn btn-add"><i class="fas fa-plus"></i></button>
                </div>
                <div id="selectedObjectsContainer"></div>
                <div id="suggestionContainer" class="suggestion-container"></div>
            </div>

            <div class="form-group">
                <label for="planInput" class="label-text">Plan (optionnel) :</label>
                <textarea id="planInput" rows="3" class="textarea-field"
                    placeholder="I. Analyse, II. Solutions..."></textarea>
            </div>

            <label class="label-text">Ressources :</label>
            <div class="grid-3-cols">
                <textarea id="videoLinks" rows="3" class="textarea-field" placeholder="Vidéos"></textarea>
                <textarea id="websiteLinks" rows="3" class="textarea-field" placeholder="Sites web"></textarea>
                <textarea id="rawText" rows="3" class="textarea-field" placeholder="Texte brut"></textarea>
            </div>
        </section>

        <section class="section">
            <h2>2. Format et Design</h2>
            <div class="form-group">
                <label class="label-text">Format :</label>
                <div class="radio-group">
                    <div class="radio-card">
                        <input type="radio" name="outputFormat" value="docx" id="fmt_docx" checked>
                        <label for="fmt_docx"><i class="fas fa-file-word"></i> Word</label>
                    </div>
                    <div class="radio-card">
                        <input type="radio" name="outputFormat" value="markdown" id="fmt_md">
                        <label for="fmt_md"><i class="fas fa-hashtag"></i> Markdown</label>
                    </div>
                    <div class="radio-card">
                        <input type="radio" name="outputFormat" value="html" id="fmt_html">
                        <label for="fmt_html"><i class="fas fa-code"></i> HTML</label>
                    </div>
                    <div class="radio-card">
                        <input type="radio" name="outputFormat" value="pdf_ebook" id="fmt_pdf">
                        <label for="fmt_pdf"><i class="fas fa-book-open"></i> PDF E-Book</label>
                    </div>
                </div>
            </div>

            <div id="designPanel" class="design-panel">
                <h3 style="margin-top:0; font-size:1.1rem;"><i class="fas fa-palette"></i> Options Visuelles</h3>
                <div class="grid-2-cols">
                    <div>
                        <label class="label-text">Palette :</label>
                        <div class="color-pickers">
                            <div class="color-input-group"><input type="color" id="color1" value="#2563eb"><span
                                    style="font-size:0.7em">Primaire</span></div>
                            <div class="color-input-group"><input type="color" id="color2" value="#f59e0b"><span
                                    style="font-size:0.7em">Accent</span></div>
                            <div class="color-input-group"><input type="color" id="color3" value="#1e293b"><span
                                    style="font-size:0.7em">Texte</span></div>
                        </div>
                    </div>
                    <div>
                        <label class="label-text">Nb d'images :</label>
                        <input type="number" id="imageCount" class="input-field" value="0" min="0" max="15">
                    </div>
                </div>
                <div class="mimic-option">
                    <input type="checkbox" id="mimicImage">
                    <div><strong>🎨 Cloner un design</strong><br><span style="font-size:0.9rem">Joindre une capture pour
                            imiter le style</span></div>
                </div>
            </div>

            <div class="form-group" style="margin-top:15px;">
                <label style="cursor:pointer; display:flex; align-items:center; gap:0.5rem;">
                    <input type="checkbox" id="pixCheckbox" checked> Inclure compétences Pix/CRCN
                </label>
            </div>
        </section>

        <button id="generateButton" class="btn btn-primary" style="width:100%; margin-bottom:1.5rem;">
            <i class="fas fa-magic"></i> GÉNÉRER LE PROMPT
        </button>

        <div class="form-group">
            <label class="label-text">Prompt généré :</label>
            <textarea id="outputPrompt" rows="12" class="textarea-field" readonly style="background:#fff;"></textarea>
            <button id="copyButton" class="btn btn-secondary" style="margin-top:10px;"><i class="fas fa-copy"></i>
                Copier</button>
            <span id="copyMessage" class="feedback-message">Copié !</span>
        </div>

        <section class="section">
            <h2>Outils Annexes</h2>
            <div class="grid-2-cols">
                <button id="logbookButton" class="btn btn-secondary">Cahier de Texte</button>
                <button id="summaryButton" class="btn btn-secondary">Résumé Élèves</button>
            </div>
            <textarea id="pedagogicalOutput" rows="4" class="textarea-field" readonly
                style="margin-top:1rem;"></textarea>
        </section>
    </div>

    <script src="technologie_master_data.js"></script>
    <script src="technologie_master_app.js"></script>

</body>

</html>
