<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albert - Assistant IA Souverain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 0.8px, transparent 0.8px);
            background-size: 24px 24px;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .bubble-bot {
            border-radius: 1.5rem 1.5rem 1.5rem 0.4rem;
        }

        .bubble-user {
            border-radius: 1.5rem 1.5rem 0.4rem 1.5rem;
        }

        .slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden text-slate-900">

    <!-- HEADER -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 p-4 flex items-center justify-between z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                <i data-lucide="bot" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="font-black text-lg leading-tight tracking-tight">Albert</h1>
                <div id="sovereignty-badge" class="px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider bg-emerald-100 text-emerald-700 flex items-center gap-1">
                    <i data-lucide="shield-check" class="w-3 h-3"></i> Souveraineté d'État (FR)
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="clearChat()" class="p-3 hover:bg-red-50 rounded-xl text-slate-400 hover:text-red-500 transition-all" title="Effacer la discussion">
                <i data-lucide="trash-2" class="w-6 h-6"></i>
            </button>
            <button onclick="toggleSettings(true)" class="p-3 hover:bg-slate-50 rounded-xl text-slate-400 transition-all" title="Réglages">
                <i data-lucide="settings" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <!-- ZONE DE CHAT -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 chat-container">
        <!-- Messages ici -->
    </main>

    <!-- LOADING INDICATOR -->
    <div id="loading-indicator" class="hidden px-6 pb-4">
        <div class="flex gap-4">
            <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center text-white flex-none">
                <i data-lucide="bot" class="w-5 h-5"></i>
            </div>
            <div class="px-5 py-3 bubble-bot bg-white border border-slate-100 shadow-sm text-slate-400 font-bold text-xs">
                Albert réfléchit...
            </div>
        </div>
    </div>

    <!-- ZONE DE SAISIE -->
    <footer class="p-4 bg-white border-t border-slate-100">
        <form id="chat-form" class="max-w-4xl mx-auto flex gap-3">
            <input type="text" id="message-input" placeholder="Message Albert..."
                class="flex-1 bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-2xl px-6 py-4 outline-none transition-all font-medium">
            <button type="submit"
                class="w-14 h-14 bg-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">
                <i data-lucide="send" class="w-6 h-6"></i>
            </button>
        </form>
    </footer>

    <!-- MODAL RÉGLAGES -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-2xl slide-in">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-xl font-black text-slate-900 leading-tight">Configuration Albert</h2>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Souveraineté & Sécurité</p>
                </div>
                <button onclick="toggleSettings(false)" class="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center hover:bg-slate-100 transition-all">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div id="config-albert" class="space-y-4">
                <div class="space-y-1">
                    <label class="font-bold text-slate-500 text-[11px] uppercase tracking-wider flex justify-between">
                        URL API / RELAIS
                        <button onclick="setMentoriaPreset()" class="text-indigo-600 hover:text-indigo-800 lowercase text-[10px] flex items-center gap-1">
                            <i data-lucide="zap" class="w-2.5 h-2.5"></i> Utiliser Relais Mentoria (n8n)
                        </button>
                    </label>
                    <input type="text" id="set-url" class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl focus:border-indigo-500 outline-none font-mono text-xs">
                </div>
                <div class="space-y-1">
                    <label class="font-bold text-slate-500 text-[11px] uppercase tracking-wider">Clé D'API ALBERT (BEARER)</label>
                    <input type="password" id="set-key" class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl focus:border-indigo-500 outline-none font-mono text-xs" placeholder="sk-...">
                </div>
                <div class="space-y-1">
                    <label class="font-bold text-slate-500 text-[11px] uppercase tracking-wider flex justify-between">
                        Modèle Albert
                        <button onclick="fetchModels()" class="text-indigo-600 hover:text-indigo-800 lowercase text-[10px] flex items-center gap-1">
                            <i data-lucide="refresh-cw" class="w-2.5 h-2.5"></i> actualiser
                        </button>
                    </label>
                    <select id="set-model" class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl focus:border-indigo-500 outline-none font-bold text-xs bg-white" onchange="toggleCustomModel()">
                        <option value="albert-medium">Albert Moyen (Mistral 24B)</option>
                        <option value="albert-large">Albert Grand (GPT-120B)</option>
                        <option value="albert-small">Albert Rapide (8B)</option>
                        <option value="mistralai/Mistral-Small-3.2-24B-Instruct-2506">Mistral Small (Etalab)</option>
                        <option value="openai/gpt-oss-120b">Albert 120B (Souverain)</option>
                        <option value="custom">Autre...</option>
                    </select>
                    <input type="text" id="set-model-custom" class="hidden w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl focus:border-indigo-500 outline-none font-mono text-xs mt-2" placeholder="ID exact (ex: albert-medium)">
                </div>
            </div>

            <div class="pt-2 mt-4">
                <label class="flex items-center gap-3 cursor-pointer group">
                    <input type="checkbox" id="set-proxy" onchange="document.getElementById('set-proxy-url').classList.toggle('hidden', !this.checked)" class="w-5 h-5 rounded border-2 border-slate-200 text-indigo-600 focus:ring-indigo-500">
                    <span class="font-bold text-slate-700 text-[12px] group-hover:text-indigo-600 transition-colors">Utiliser un relais Proxy / Webhook</span>
                </label>
                <input type="text" id="set-proxy-url" class="hidden w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl focus:border-indigo-500 outline-none font-mono text-xs mt-2" placeholder="URL proxy (ex: https://corsproxy.io/?)">
            </div>

            <div class="mt-8">
                <button onclick="saveSettings()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200 mt-4 flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i> SAUVEGARDER
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // ÉTAT
        let apiUrl = localStorage.getItem('albert_api_url') || 'https://albert.api.etalab.gouv.fr/v1/chat/completions';
        let apiKey = localStorage.getItem('albert_api_key') || '';
        let modelName = localStorage.getItem('albert_model') || 'albert-medium';
        let useProxy = localStorage.getItem('albert_use_proxy') === 'true';
        let proxyUrl = localStorage.getItem('albert_proxy_url') || 'https://corsproxy.io/?';

        // Nettoyage de l'historique des messages parasites
        let rawHistory = JSON.parse(localStorage.getItem('albert_history')) || [];
        let messages = rawHistory.filter(m => !m.text.includes('Configuration mise à jour'));
        if (messages.length === 0) {
            messages = [{ role: 'bot', text: 'Bonjour ! Je suis Albert, l\'IA souveraine d\'Etalab. Comment puis-je vous aider ?' }];
        }

        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const loading = document.getElementById('loading-indicator');
        const sovereigntyBadge = document.getElementById('sovereignty-badge');

        function formatText(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^\s*-\s+(.*)$/gm, '• $1')
                .replace(/\n/g, '<br>');
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-emerald-500"></i>';
                lucide.createIcons();
                setTimeout(() => { btn.innerHTML = originalHTML; lucide.createIcons(); }, 2000);
            });
        }

        function renderMessages() {
            chatContainer.innerHTML = '';
            messages.forEach(msg => {
                const isUser = msg.role === 'user';
                const isError = msg.role === 'error';
                const avatarClass = isUser ? 'bg-slate-100 text-slate-400' : (isError ? 'bg-red-100 text-red-500' : 'bg-indigo-600 text-white');
                const bubbleClass = isUser ? 'bg-indigo-600 text-white bubble-user' : (isError ? 'bg-red-50 text-red-700 border border-red-100 bubble-bot' : 'bg-white border border-slate-100 text-slate-700 bubble-bot');
                const icon = isUser ? 'user' : (isError ? 'alert-circle' : 'bot');

                const html = `
                    <div class="flex ${isUser ? 'justify-end' : 'justify-start'} slide-in group">
                        <div class="flex max-w-[85%] gap-4 ${isUser ? 'flex-row-reverse' : 'flex-row'}">
                            <div class="mt-1 flex-none">
                                <div class="w-9 h-9 rounded-xl flex items-center justify-center ${avatarClass}">
                                    <i data-lucide="${icon}" class="w-5 h-5"></i>
                                </div>
                            </div>
                            <div class="relative">
                                <div class="px-5 py-3 rounded-2xl ${bubbleClass}">${isUser ? msg.text : formatText(msg.text)}</div>
                                ${!isUser && !isError ? `
                                <button onclick="copyToClipboard(\`${msg.text.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, this)" 
                                    class="absolute -right-10 top-2 p-2 text-slate-300 hover:text-indigo-600 opacity-0 group-hover:opacity-100 transition-all" title="Copier le texte">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                chatContainer.insertAdjacentHTML('beforeend', html);
            });
            lucide.createIcons();
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        function clearChat() {
            if (confirm("Effacer toute la discussion ?")) {
                messages = [{ role: 'bot', text: 'Bonjour ! Je suis Albert, l\'IA souveraine d\'Etalab. Comment puis-je vous aider ?' }];
                localStorage.setItem('albert_history', JSON.stringify(messages));
                renderMessages();
            }
        }

        function toggleSettings(show) {
            if (show) {
                document.getElementById('set-url').value = apiUrl;
                document.getElementById('set-key').value = apiKey;
                document.getElementById('set-model').value = ['albert-medium','albert-large','albert-small','mistralai/Mistral-Small-3.2-24B-Instruct-2506','openai/gpt-oss-120b'].includes(modelName) ? modelName : 'custom';
                if (document.getElementById('set-model').value === 'custom') {
                    document.getElementById('set-model-custom').classList.remove('hidden');
                    document.getElementById('set-model-custom').value = modelName;
                }
                document.getElementById('set-proxy').checked = useProxy;
                document.getElementById('set-proxy-url').value = proxyUrl;
                document.getElementById('set-proxy-url').classList.toggle('hidden', !useProxy);
                document.getElementById('settings-modal').classList.remove('hidden');
            } else {
                document.getElementById('settings-modal').classList.add('hidden');
            }
        }

        function toggleCustomModel() {
            const isCustom = document.getElementById('set-model').value === 'custom';
            document.getElementById('set-model-custom').classList.toggle('hidden', !isCustom);
        }

        function setMentoriaPreset() {
            document.getElementById('set-url').value = 'https://n8n.incubateur.education.gouv.fr/webhook/mentoria_chat';
            document.getElementById('set-proxy').checked = false;
            document.getElementById('set-proxy-url').classList.add('hidden');
            alert("Mode Mentoria configuré !");
        }

        async function fetchModels() {
            if (!apiKey) return alert("Clé API requise.");
            try {
                const target = apiUrl.includes('n8n.incubateur') ? apiUrl : apiUrl.replace('/chat/completions', '/models');
                const finalUrl = (useProxy && !apiUrl.includes('n8n')) ? `${proxyUrl}${encodeURIComponent(target)}` : target;
                const res = await fetch(finalUrl, { headers: { 'Authorization': `Bearer ${apiKey}` } });
                const data = await res.json();
                alert("Modèles disponibles récupérés (voir console).");
                console.log("Modèles:", data);
            } catch (e) { alert("Erreur: " + e.message); }
        }

        function saveSettings() {
            apiUrl = document.getElementById('set-url').value;
            apiKey = document.getElementById('set-key').value;
            modelName = document.getElementById('set-model').value;
            if (modelName === 'custom') modelName = document.getElementById('set-model-custom').value;
            useProxy = document.getElementById('set-proxy').checked;
            proxyUrl = document.getElementById('set-proxy-url').value;

            localStorage.setItem('albert_api_url', apiUrl);
            localStorage.setItem('albert_api_key', apiKey);
            localStorage.setItem('albert_model', modelName);
            localStorage.setItem('albert_use_proxy', useProxy ? 'true' : 'false');
            localStorage.setItem('albert_proxy_url', proxyUrl);

            toggleSettings(false);
            renderMessages();
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;
            messages.push({ role: 'user', text });
            messageInput.value = '';
            renderMessages();
            loading.classList.remove('hidden');

            if (!apiKey) {
                messages.push({ role: 'error', text: '⚠️ Clé API Albert manquante.' });
                loading.classList.add('hidden');
                renderMessages();
                return;
            }

            try {
                const apiMessages = [
                    { role: "system", content: "Tu es Albert, l'intelligence artificielle souveraine de l'État Français (Etalab). Réponds de manière claire, concise et professionnelle. Utilise le gras pour l'essentiel." },
                    ...messages.filter(m => m.role !== 'error').map(m => ({ role: m.role === 'bot' ? 'assistant' : 'user', content: m.text }))
                ];

                const isN8n = apiUrl.includes('n8n.incubateur.education.gouv.fr');
                const finalUrl = (useProxy && !isN8n) ? `${proxyUrl || 'https://corsproxy.io/?'}${encodeURIComponent(apiUrl)}` : apiUrl;

                const response = await fetch(finalUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({ model: modelName, messages: apiMessages, temperature: 0.7 })
                });

                if (!response.ok) {
                    const err = await response.text();
                    throw new Error(`Erreur API (${response.status}): ${err.substring(0, 100)}`);
                }

                const data = await response.json();
                messages.push({ role: 'bot', text: data.choices?.[0]?.message?.content || "Pas de réponse." });
                localStorage.setItem('albert_history', JSON.stringify(messages.slice(-10)));
            } catch (error) {
                let msg = error.message;
                if (msg === 'Failed to fetch') msg = "Échec de connexion. Vérifiez votre URL et le Proxy.";
                messages.push({ role: 'error', text: msg });
            } finally {
                loading.classList.add('hidden');
                renderMessages();
            }
        };

        renderMessages();
    </script>
</body>

</html>
