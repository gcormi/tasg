<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Albert - Version Certifiée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .slide-in { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col h-screen bg-slate-50 font-sans text-slate-800 transition-all">

    <!-- HEADER -->
    <header class="flex-none flex justify-between items-center bg-white shadow-sm px-6 py-4 border-b border-slate-200">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i data-lucide="bot" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-900 leading-none">Chatbot Albert</h1>
                <p id="conn-status" class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mt-1 flex items-center gap-1">
                    <i data-lucide="shield-check" class="w-3 h-3"></i> Initialisation...
                </p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleSettings(true)" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-all">
                <i data-lucide="settings" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <!-- ZONE DE MESSAGES -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 custom-scrollbar bg-[#fcfdfe]">
        <!-- Messages injectés en JS -->
    </main>

    <!-- INDICATEUR DE CHARGEMENT -->
    <div id="loading-indicator" class="hidden px-8 pb-8">
        <div class="flex justify-start animate-pulse">
            <div class="flex gap-4">
                <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center text-white shadow-sm">
                    <i data-lucide="bot" class="w-5 h-5"></i>
                </div>
                <div class="px-5 py-3 rounded-2xl bg-white border border-slate-200 text-slate-400 italic text-sm">
                    Albert réfléchit...
                </div>
            </div>
        </div>
    </div>

    <!-- ZONE DE SAISIE -->
    <footer class="bg-white border-t p-4 pb-6">
        <form id="chat-form" class="max-w-4xl mx-auto flex gap-3 p-2 bg-slate-50/50 rounded-2xl border-2 border-slate-100 focus-within:border-indigo-300 transition-all">
            <textarea 
                id="message-input"
                class="flex-1 bg-transparent border-none focus:ring-0 p-3 min-h-[44px] max-h-32 resize-none text-slate-700 outline-none"
                placeholder="Message Albert..."
                rows="1"
            ></textarea>
            <button type="submit" id="send-btn" class="px-6 bg-indigo-600 text-white rounded-xl shadow-lg shadow-indigo-100 disabled:bg-slate-300 transition-all hover:bg-indigo-700 flex items-center justify-center">
                <i data-lucide="send" class="w-5 h-5"></i>
            </button>
        </form>
    </footer>

    <!-- MODAL PARAMÈTRES -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-2xl slide-in">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-2xl font-black text-slate-900">Albert Setup</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Configuration API Locale</p>
                </div>
                <button onclick="toggleSettings(false)" class="p-3 hover:bg-slate-100 rounded-full text-slate-400">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="space-y-5 text-sm">
                <div class="space-y-1">
                    <label class="font-bold text-slate-500 text-[11px] uppercase tracking-wider">URL API (Endpoint)</label>
                    <input type="text" id="set-url" class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl focus:border-indigo-500 outline-none font-mono text-xs">
                </div>
                <div class="space-y-1">
                    <label class="font-bold text-slate-500 text-[11px] uppercase tracking-wider">Clé d'API (Bearer)</label>
                    <input type="password" id="set-key" class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl focus:border-indigo-500 outline-none font-mono text-xs" placeholder="sk-...">
                </div>
                <div class="space-y-1">
                    <label class="font-bold text-slate-500 text-[11px] uppercase tracking-wider flex justify-between">
                        Modèle
                        <button onclick="fetchModels()" class="text-indigo-600 hover:text-indigo-800 lowercase text-[10px] flex items-center gap-1">
                            <i data-lucide="refresh-cw" class="w-2.5 h-2.5"></i> Actualiser la liste
                        </button>
                    </label>
                    <select id="set-model" class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl focus:border-indigo-500 outline-none font-bold text-xs bg-white" onchange="toggleCustomModel()">
                        <option value="openweight-medium">Albert Moyen (Mistral 24B)</option>
                        <option value="openweight-large">Albert Grand (GPT-120B)</option>
                        <option value="openweight-small">Albert Rapide (8B)</option>
                        <option value="openweight-code">Albert Code (Qwen 30B)</option>
                        <option value="custom">Saisie personnalisée...</option>
                    </select>
                    <input type="text" id="set-model-custom" class="hidden w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl focus:border-indigo-500 outline-none font-mono text-xs mt-2" placeholder="Identifiant exact du modèle">
                </div>
                <div class="pt-2">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" id="set-proxy" class="w-5 h-5 rounded border-2 border-slate-200 text-indigo-600 focus:ring-indigo-500">
                        <span class="font-bold text-slate-700 text-sm group-hover:text-indigo-600 transition-colors">Activer le Proxy CORS (Recommandé)</span>
                    </label>
                    <p class="text-[10px] text-slate-400 mt-2 italic flex items-center gap-1">
                        <i data-lucide="info" class="w-3 h-3"></i> Nécessaire pour éviter "Failed to fetch" sur La Forge.
                    </p>
                </div>
            </div>

            <div class="mt-8">
                <button onclick="saveSettings()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-xl shadow-indigo-100 transition-all hover:bg-indigo-700 flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i> SAUVEGARDER
                </button>
            </div>
        </div>
    </div>

    <!-- SCRIPT LOGIQUE -->
    <script>
        // Initialisation Lucide
        lucide.createIcons();

        // 1. État
        let messages = JSON.parse(localStorage.getItem('albert_history')) || [
            { role: 'bot', text: 'Bonjour ! Je suis Albert. Votre configuration est-elle prête dans les paramètres (⚙️) ?' }
        ];

        let apiUrl = localStorage.getItem('albert_api_url') || 'https://albert.api.etalab.gouv.fr/v1/chat/completions';
        let apiKey = localStorage.getItem('albert_api_key') || '';
        let modelName = localStorage.getItem('albert_model') || 'openweight-medium';
        let useProxy = localStorage.getItem('albert_use_proxy') === 'true';

        // 2. DOM
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const chatForm = document.getElementById('chat-form');
        const loading = document.getElementById('loading-indicator');
        const connStatus = document.getElementById('conn-status');

        function updateStatus() {
            connStatus.innerHTML = useProxy 
                ? '<i data-lucide="globe" class="w-3 h-3 text-indigo-500"></i> Mode Proxy Activé' 
                : '<i data-lucide="shield-check" class="w-3 h-3 text-emerald-500"></i> Mode Direct';
            lucide.createIcons();
        }

        function renderMessages() {
            chatContainer.innerHTML = '';
            messages.forEach(msg => {
                const isUser = msg.role === 'user';
                const isError = msg.role === 'error';
                
                const bubbleClass = isUser ? 'bg-indigo-600 text-white shadow-indigo-50' : (isError ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-white border border-slate-200 shadow-sm');
                const avatarClass = isUser ? 'bg-slate-200 text-slate-600' : (isError ? 'bg-red-100 text-red-600' : 'bg-indigo-600 text-white shadow-md');
                const icon = isUser ? 'user' : (isError ? 'alert-circle' : 'bot');

                const html = `
                    <div class="flex ${isUser ? 'justify-end' : 'justify-start'} slide-in">
                        <div class="flex max-w-[85%] gap-4 ${isUser ? 'flex-row-reverse' : 'flex-row'}">
                            <div class="mt-1 flex-none">
                                <div class="w-9 h-9 rounded-xl flex items-center justify-center ${avatarClass}">
                                    <i data-lucide="${icon}" class="w-5 h-5"></i>
                                </div>
                            </div>
                            <div class="px-5 py-3 rounded-2xl ${bubbleClass} whitespace-pre-wrap">${msg.text}</div>
                        </div>
                    </div>
                `;
                chatContainer.insertAdjacentHTML('beforeend', html);
            });
            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function toggleCustomModel() {
            const select = document.getElementById('set-model');
            const customInput = document.getElementById('set-model-custom');
            if (select.value === 'custom') {
                customInput.classList.remove('hidden');
            } else {
                customInput.classList.add('hidden');
            }
        }

        async function fetchModels() {
            if (!apiKey) {
                alert("Veuillez d'abord saisir votre clé API.");
                return;
            }
            
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-2.5 h-2.5 animate-spin"></i> Chargement...';
            lucide.createIcons();
            
            try {
                // Utilisation du même tunnel Proxy que pour le Chat
                const baseModelsUrl = apiUrl.replace('/chat/completions', '/models');
                const finalUrl = useProxy ? `https://cors-anywhere.herokuapp.com/${baseModelsUrl}` : baseModelsUrl;
                
                const response = await fetch(finalUrl, {
                    headers: { 
                        'Authorization': `Bearer ${apiKey}`,
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                
                if (!response.ok) throw new Error("Erreur lors de la récupération");
                
                const data = await response.json();
                const select = document.getElementById('set-model');
                
                // On garde les options par défaut et on ajoute les nouvelles
                const defaults = ['openweight-medium', 'openweight-large', 'openweight-small', 'openweight-code', 'custom'];
                
                data.data.forEach(m => {
                    if (!defaults.includes(m.id)) {
                        const opt = document.createElement('option');
                        opt.value = m.id;
                        opt.textContent = m.id;
                        select.insertBefore(opt, select.lastElementChild);
                    }
                });
                
                alert(`${data.data.length} modèles trouvés sur Albert ! La liste a été mise à jour.`);
            } catch (err) {
                console.error(err);
                alert("Impossible de lister les modèles. Vérifiez votre clé et l'activation du proxy.");
            } finally {
                btn.innerHTML = originalHTML;
                lucide.createIcons();
            }
        }

        function toggleSettings(show) {
            if(show) {
                document.getElementById('set-url').value = apiUrl;
                document.getElementById('set-key').value = apiKey;
                
                const select = document.getElementById('set-model');
                let found = false;
                for (let opt of select.options) {
                    if (opt.value === modelName) {
                        select.value = modelName;
                        found = true;
                        break;
                    }
                }
                
                if (!found && modelName) {
                    select.value = 'custom';
                    document.getElementById('set-model-custom').value = modelName;
                }
                
                toggleCustomModel();
                document.getElementById('set-proxy').checked = useProxy;
                document.getElementById('settings-modal').classList.remove('hidden');
            } else {
                document.getElementById('settings-modal').classList.add('hidden');
            }
        }

        function saveSettings() {
            apiUrl = document.getElementById('set-url').value;
            apiKey = document.getElementById('set-key').value;
            
            const select = document.getElementById('set-model');
            if (select.value === 'custom') {
                modelName = document.getElementById('set-model-custom').value;
            } else {
                modelName = select.value;
            }

            useProxy = document.getElementById('set-proxy').checked;

            localStorage.setItem('albert_api_url', apiUrl);
            localStorage.setItem('albert_api_key', apiKey);
            localStorage.setItem('albert_model', modelName);
            localStorage.setItem('albert_use_proxy', useProxy);
            
            toggleSettings(false);
            updateStatus();
            messages.push({ role: 'bot', text: `✅ Configuration mise à jour. Intelligence : ${modelName}` });
            renderMessages();
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if(!text || loading.classList.contains('hidden') === false) return;

            messages.push({ role: 'user', text });
            messageInput.value = '';
            renderMessages();

            if(!apiKey) {
                messages.push({ role: 'error', text: '⚠️ Clé API manquante. Veuillez la configurer dans les paramètres (⚙️).' });
                renderMessages();
                return;
            }

            loading.classList.remove('hidden');
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // Création du tableau de messages style OpenAI
                const apiMessages = [
                    { role: "system", content: "Tu es Albert, un assistant IA intelligent. Réponds en français." }
                ];
                messages.filter(m => m.role !== 'error').forEach(m => {
                    apiMessages.push({
                        role: m.role === 'bot' ? 'assistant' : 'user',
                        content: m.text
                    });
                });

                const finalUrl = useProxy ? `https://cors-anywhere.herokuapp.com/${apiUrl}` : apiUrl;

                const response = await fetch(finalUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`,
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify({
                        model: modelName,
                        messages: apiMessages,
                        temperature: 0.7,
                    })
                });

                if (!response.ok) {
                    const errorMsg = await response.text();
                    if (response.status === 403 && errorMsg.includes('/corsdemo')) {
                        throw new Error("ACTIVATION_PROXY_REQUISE");
                    }
                    throw new Error(`Erreur API ${response.status}`);
                }

                const data = await response.json();
                const botReply = data.choices?.[0]?.message?.content || "Aucune réponse reçue.";
                messages.push({ role: 'bot', text: botReply });
                localStorage.setItem('albert_history', JSON.stringify(messages.slice(-10))); // Garder les 10 derniers

            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (msg === "ACTIVATION_PROXY_REQUISE") {
                    msg = "🔒 Proxy bloqué. Cliquez ici pour l'activer temporairement : https://cors-anywhere.herokuapp.com/corsdemo (puis cliquez sur le bouton bleu 'Request access').";
                } else if (msg.includes("Failed to fetch")) {
                    msg = "❌ Échec de la connexion (CORS). Vérifiez que vous avez bien coché 'Activer le Proxy' dans les réglages.";
                }
                messages.push({ role: 'error', text: msg });
            } finally {
                loading.classList.add('hidden');
                renderMessages();
            }
        };

        // Init
        updateStatus();
        renderMessages();

    </script>
</body>
</html>
