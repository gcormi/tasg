<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Albert - Souverain & Sécurisé</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // Adaptation de Lucide pour le chargement via CDN
        const { 
            Send, Settings, User, Bot, Loader2, AlertCircle, 
            Save, X, Zap, ShieldCheck, Globe 
        } = lucide;

        const PREDEFINED_MODELS = [
          { id: 'openai/gpt-oss-120b', name: 'Albert 120B (Souverain)' },
          { id: 'mistralai/Mistral-Small-3.2-24B-Instruct-2506', name: 'Mistral Small' }
        ];

        function App() {
          const [messages, setMessages] = React.useState([
            { role: 'bot', text: 'Bonjour ! Je suis Albert, votre assistant IA souverain via le Kit Albert. Comment puis-je vous aider aujourd\'hui ?' }
          ]);
          const [input, setInput] = React.useState('');
          const [isLoading, setIsLoading] = React.useState(false);
          const [showSettings, setShowSettings] = React.useState(false);
          const [config, setConfig] = React.useState({
            provider: 'kit-albert',
            key: '',
            model: 'AgentPublic/llama3-instruct-8b'
          });

          const messagesEndRef = React.useRef(null);

          React.useEffect(() => {
            const savedProvider = localStorage.getItem('albert_provider');
            // Force kit-albert si c'est une ancienne version ou si c'est vide
            const initialProvider = (savedProvider === 'albert' || !savedProvider) ? 'kit-albert' : savedProvider;
            
            const savedKey = localStorage.getItem('albert_config_key') || '';
            const savedModel = localStorage.getItem('albert_config_model') || 'openai/gpt-oss-120b';
            setConfig({ provider: initialProvider, key: savedKey, model: savedModel });

            const params = new URLSearchParams(window.location.search);
            const externalPrompt = params.get('prompt');
            if (externalPrompt) setInput(decodeURIComponent(externalPrompt));
          }, []);

          React.useEffect(() => {
            messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            if (window.lucide) lucide.createIcons();
          }, [messages, showSettings, isLoading]);

          const saveSettings = () => {
            localStorage.setItem('albertWorkerUrl', config.url);
            localStorage.setItem('albert_config_model', config.model);
            setShowSettings(false);
            setMessages(prev => [...prev, { role: 'bot', text: `✅ Configuration mise à jour.` }]);
          };

          const callAI = async (userPrompt) => {
            let endpoint = config.url.trim();
            
            // Auto-reconstruction si c'est juste un ID GAS
            if (endpoint.startsWith('AKfy') && !endpoint.includes('http')) {
              endpoint = `https://script.google.com/macros/s/${endpoint}/exec`;
              addLog("ID GAS détecté, reconstruction de l'URL...");
            }

            if (!endpoint) throw new Error("URL ou clé non configurée dans les réglages.");

            addLog(`Appel relais : ${endpoint.substring(0, 40)}...`);

            try {
              // Logique EXACTE de api.html (POST JSON)
              const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  message: userPrompt,
                  model: config.model,
                  temperature: 0.7
                })
              });

              if (!response.ok) {
                // Si 404, on tente un dernier bypass via proxy (cas spécifique Forge)
                if (response.status === 404 || response.status === 0) {
                  addLog("Échec direct (CORS/404), tentative via Proxy bridge...");
                  const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(endpoint)}`;
                  const retryRes = await fetch(proxyUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userPrompt, model: config.model })
                  });
                  if (!retryRes.ok) throw new Error(`Erreur Proxy (${retryRes.status})`);
                  const data = await retryRes.json();
                  return data.choices?.[0]?.message?.content || data.response || data;
                }
                throw new Error(`Serveur : ${response.status}`);
              }

              const data = await response.json();
              addLog("Réponse reçue avec succès.");
              
              // Format Albert/OpenAI
              if (data.choices && data.choices[0]) return data.choices[0].message.content;
              if (data.response) return data.response;
              return typeof data === 'string' ? data : JSON.stringify(data);

            } catch (error) {
              addLog(`Erreur : ${error.message}`, 'error');
              throw error;
            }
          };

          const handleSend = async (e) => {
            if (e) e.preventDefault();
            if (!input.trim() || isLoading) return;
            const msg = input.trim();
            setInput('');
            setMessages(prev => [...prev, { role: 'user', text: msg }]);
            setIsLoading(true);
            try {
              const response = await callAI(msg);
              setMessages(prev => [...prev, { role: 'bot', text: response }]);
            } catch (err) {
              setMessages(prev => [...prev, { role: 'error', text: `❌ ${err.message}` }]);
            } finally {
              setIsLoading(false);
            }
          };

          return (
            <div className="flex flex-col h-screen bg-slate-50 font-sans text-slate-800">
              <header className="flex-none flex justify-between items-center bg-white shadow-sm px-6 py-4 border-b border-slate-200">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-gradient-to-tr from-blue-700 to-indigo-700 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i data-lucide="bot" className="w-6 h-6"></i>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-900 leading-none">Albert <span className="text-[10px] bg-indigo-600 text-white px-2 py-0.5 rounded ml-2 shadow-sm font-bold uppercase tracking-wider">v7.0 Stable</span></h1>
                    <div className="flex items-center gap-2 mt-1">
                      <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                      <p className="text-[10px] font-bold uppercase tracking-wider text-slate-400">Prêt pour l'IA souveraine</p>
                    </div>
                  </div>
                </div>
                <button onClick={() => setShowSettings(true)} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-all">
                  <i data-lucide="settings" className="w-6 h-6"></i>
                </button>
              </header>

              <main className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 custom-scrollbar bg-[#fcfdfe]">
                {messages.map((msg, i) => (
                  <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`}>
                    <div className={`flex max-w-[85%] gap-4 ${msg.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                      <div className="mt-1">
                        <div className={`w-9 h-9 rounded-xl flex items-center justify-center shadow-sm ${
                          msg.role === 'user' ? 'bg-slate-200 text-slate-600' : 
                          msg.role === 'error' ? 'bg-red-100 text-red-600' : 'bg-indigo-600 text-white'
                        }`}>
                          <i data-lucide={msg.role === 'user' ? "user" : (msg.role === 'error' ? "alert-circle" : "bot")} className="w-5 h-5"></i>
                        </div>
                      </div>
                      <div className={`px-5 py-3 rounded-2xl shadow-sm whitespace-pre-wrap ${
                        msg.role === 'user' ? 'bg-indigo-600 text-white' : 
                        msg.role === 'error' ? 'bg-red-50 text-red-700 border border-red-200 text-sm font-mono' : 'bg-white border border-slate-200'
                      }`}>
                        {msg.text}
                      </div>
                    </div>
                  </div>
                ))}
                {isLoading && (
                  <div className="flex justify-start">
                    <div className="flex gap-4 animate-pulse">
                      <div className="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center text-white"><i data-lucide="bot" className="w-5 h-5"></i></div>
                      <div className="px-5 py-3 rounded-2xl bg-white border border-slate-200 text-slate-400 italic">Albert réfléchit...</div>
                    </div>
                  </div>
                )}
                
                {/* LOG CONSOLE */}
                <div className="mt-8 border-t border-slate-100 pt-4">
                  <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                    <i data-lucide="terminal" className="w-3 h-3"></i> Diagnostic Réseau
                  </p>
                  <div className="bg-slate-900 rounded-xl p-3 font-mono text-[9px] text-slate-300 space-y-1 max-h-32 overflow-y-auto custom-scrollbar shadow-inner border border-slate-800">
                    {logs.length === 0 && <span className="opacity-40 italic">Aucune activité réseau...</span>}
                    {logs.map((log, i) => (
                      <div key={i} className="flex gap-2">
                        <span className="text-slate-500">[{log.time}]</span>
                        <span className={log.type === 'error' ? 'text-red-400 font-bold' : 'text-emerald-400'}>{log.msg}</span>
                      </div>
                    ))}
                  </div>
                </div>
                
                <div ref={messagesEndRef} />
              </main>

              <footer className="bg-white border-t p-4 pb-6">
                <form onSubmit={handleSend} className="max-w-4xl mx-auto flex gap-3 p-2 bg-slate-50/50 rounded-2xl border-2 border-slate-100 focus-within:border-indigo-300 transition-all">
                  <textarea 
                    value={input} 
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && !e.shiftKey && handleSend(e)}
                    className="flex-1 bg-transparent border-none focus:ring-0 p-3 min-h-[44px] max-h-32 resize-none"
                    placeholder="Message Albert..."
                  />
                  <button type="submit" disabled={isLoading} className="px-6 bg-indigo-600 text-white rounded-xl shadow-lg shadow-indigo-200 disabled:bg-slate-300 transition-all hover:bg-indigo-700 flex items-center justify-center">
                    <i data-lucide="send" className="w-5 h-5"></i>
                  </button>
                </form>
              </footer>

              {showSettings && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4 z-50 animate-fade-in text-slate-700">
                  <div className="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-2xl relative overflow-hidden flex flex-col">
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h2 className="text-2xl font-black text-slate-900">Expertise Albert</h2>
                            <p className="text-xs text-slate-400 mt-1 font-medium">Synchronisé avec le Portail IA</p>
                        </div>
                        <button onClick={() => setShowSettings(false)} className="p-3 hover:bg-slate-100 rounded-full transition-all text-slate-400"><i data-lucide="x" className="w-6 h-6"></i></button>
                    </div>
                    
                    <div className="space-y-8">
                      <section>
                        <div className="flex items-center gap-2 mb-3">
                            <i data-lucide="link" className="w-4 h-4 text-indigo-500"></i>
                            <label className="text-[11px] font-black uppercase tracking-wider text-slate-500">URL du Relais ou ID</label>
                        </div>
                        <input 
                          type="text" 
                          className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-indigo-500 focus:bg-white focus:outline-none transition-all font-mono text-sm shadow-inner" 
                          placeholder="https://script.google.com/..."
                          value={config.url} 
                          onChange={e => setConfig({...config, url: e.target.value})} 
                        />
                        <p className="text-[10px] text-slate-400 mt-3 italic leading-relaxed">
                            <i data-lucide="info" className="w-3 h-3 inline mr-1"></i> Utilisez l'URL de votre Google Script "Web App" pour connecter Albert en toute sécurité.
                        </p>
                      </section>

                      <section>
                        <div className="flex items-center gap-2 mb-3">
                            <i data-lucide="cpu" className="w-4 h-4 text-indigo-500"></i>
                            <label className="text-[11px] font-black uppercase tracking-wider text-slate-500">Intelligence Artificielle</label>
                        </div>
                        <select 
                          className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-indigo-500 focus:bg-white focus:outline-none font-bold text-slate-700 appearance-none shadow-sm"
                          value={config.model}
                          onChange={e => setConfig({...config, model: e.target.value})}
                        >
                          {PREDEFINED_MODELS.map(m => (
                            <option key={m.id} value={m.id}>{m.name}</option>
                          ))}
                        </select>
                      </section>
                    </div>

                    <div className="mt-12 flex gap-4">
                      <button onClick={saveSettings} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-2xl font-black shadow-xl shadow-indigo-100 transition-all flex items-center justify-center gap-3 active:scale-95">
                        <i data-lucide="check-circle" className="w-5 h-5"></i>
                        VÉRIFIER & SAUVER
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
