<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Albert - Souverain & Sécurisé</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // Adaptation de Lucide pour le chargement via CDN
        const { 
            Send, Settings, User, Bot, Loader2, AlertCircle, 
            Save, X, Zap, ShieldCheck, Globe 
        } = lucide;

        const PREDEFINED_MODELS = [
          { id: 'openai/gpt-oss-120b', name: 'Albert 120B (Souverain - Recommandé)' },
          { id: 'mistralai/Mistral-Small-3.2-24B-Instruct-2506', name: 'Mistral Small (Équilibré)' },
          { id: 'meta-llama/Llama-3.1-8B-Instruct', name: 'Llama 3.1 8B (Rapide)' },
          { id: 'gemini-2.0-flash-lite', name: 'Gemini 2.0 Flash Lite (Google)' }
        ];

        function App() {
          const [messages, setMessages] = React.useState([
            { role: 'bot', text: 'Bonjour ! Je suis Albert, votre assistant IA souverain. Comment puis-je vous aider aujourd\'hui ?' }
          ]);
          const [input, setInput] = React.useState('');
          const [isLoading, setIsLoading] = React.useState(false);
          const [showSettings, setShowSettings] = React.useState(false);
          const [config, setConfig] = React.useState({
            provider: 'albert',
            key: '',
            model: 'openai/gpt-oss-120b'
          });

          const messagesEndRef = React.useRef(null);

          React.useEffect(() => {
            const savedProvider = localStorage.getItem('albert_provider') || 'albert';
            const savedKey = localStorage.getItem('albert_config_key') || '';
            const savedModel = localStorage.getItem('albert_config_model') || 'openai/gpt-oss-120b';
            setConfig({ provider: savedProvider, key: savedKey, model: savedModel });

            const params = new URLSearchParams(window.location.search);
            const externalPrompt = params.get('prompt');
            if (externalPrompt) setInput(decodeURIComponent(externalPrompt));
          }, []);

          React.useEffect(() => {
            messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            if (window.lucide) lucide.createIcons();
          }, [messages, showSettings, isLoading]);

          const saveSettings = () => {
            localStorage.setItem('albert_provider', config.provider);
            localStorage.setItem('albert_config_key', config.key);
            localStorage.setItem('albert_config_model', config.model);
            setShowSettings(false);
            setMessages(prev => [...prev, { role: 'bot', text: `✅ Paramètres mis à jour.` }]);
          };

          const callAI = async (userPrompt) => {
            const { provider, key, model } = config;
            if (!key) throw new Error(`Veuillez configurer votre ${provider === 'relais' ? 'URL de Relais' : 'Clé API'}.`);

            // --- LISTE DES CHEMINS POSSIBLES ---
            const endpoint = "https://albert.api.gouv.fr/v1/chat/completions";
            let targets = [];

            if (provider === 'relais' || key.startsWith('http')) {
              // On tente le Worker en premier
              targets.push({ id: 'Worker Personnel', url: key, isRelay: true });
              // Fallback au cas où le worker est HS (si l'utilisateur a aussi une clé, mais ici on reste sur le flux relais)
              targets.push({ id: 'Proxy Secours (Corsproxy)', url: `https://corsproxy.io/?${encodeURIComponent(endpoint)}`, isRelay: false });
            } else {
              // Mode Direct avec plusieurs Proxys
              targets.push({ id: 'Albert Direct', url: endpoint });
              targets.push({ id: 'Tunnel 1 (Corsproxy)', url: `https://corsproxy.io/?${encodeURIComponent(endpoint)}` });
              targets.push({ id: 'Tunnel 2 (Codetabs)', url: `https://api.codetabs.com/v1/proxy?url=${encodeURIComponent(endpoint)}` });
              targets.push({ id: 'Tunnel 3 (Thingproxy)', url: `https://thingproxy.freeboard.io/fetch/${endpoint}` });
            }

            let logs = [];
            for (let target of targets) {
              try {
                const isWorker = target.isRelay;
                const body = isWorker 
                  ? JSON.stringify({ message: userPrompt, model: model }) 
                  : JSON.stringify({ model, messages: [{ role: 'user', content: userPrompt }] });

                const res = await fetch(target.url, {
                  method: 'POST',
                  headers: { 
                    'Content-Type': 'application/json',
                    ...(isWorker ? {} : { 'Authorization': `Bearer ${key}` }) 
                  },
                  body: body
                });

                if (res.ok) {
                  const data = await res.json();
                  return data.choices?.[0]?.message?.content || data.response || data.text || "Réponse vide.";
                }
                
                const errText = await res.text().catch(() => "Erreur");
                logs.push(`${target.id}: HTTP ${res.status}`);
              } catch (e) {
                logs.push(`${target.id}: ${e.message}`);
                continue;
              }
            }
            throw new Error(`Tous les relais ont échoué :\n${logs.join('\n')}`);
          };

          const handleSend = async (e) => {
            if (e) e.preventDefault();
            if (!input.trim() || isLoading) return;
            const msg = input.trim();
            setInput('');
            setMessages(prev => [...prev, { role: 'user', text: msg }]);
            setIsLoading(true);
            try {
              const response = await callAI(msg);
              setMessages(prev => [...prev, { role: 'bot', text: response }]);
            } catch (err) {
              setMessages(prev => [...prev, { role: 'error', text: `⚠️ ${err.message}` }]);
            } finally {
              setIsLoading(false);
            }
          };

          return (
            <div className="flex flex-col h-screen bg-slate-50 font-sans text-slate-800">
              <header className="flex-none flex justify-between items-center bg-white shadow-sm px-6 py-4 border-b border-slate-200">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i data-lucide="bot" className="w-6 h-6"></i>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-900 leading-none">Chatbot Albert</h1>
                    <div className="flex items-center gap-2 mt-1">
                      <span className={`w-2 h-2 rounded-full ${config.key ? 'bg-green-500' : 'bg-red-500'}`}></span>
                      <p className="text-[10px] font-bold uppercase tracking-wider text-slate-400">
                        {config.provider === 'relais' ? 'Relais Sécurisé' : `Mode Direct : ${config.provider}`}
                      </p>
                    </div>
                  </div>
                </div>
                <button onClick={() => setShowSettings(true)} className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-all">
                  <i data-lucide="settings" className="w-6 h-6"></i>
                </button>
              </header>

              <main className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 custom-scrollbar">
                {messages.map((msg, i) => (
                  <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                    <div className={`flex max-w-[85%] gap-4 ${msg.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                      <div className="mt-1">
                        <div className={`w-9 h-9 rounded-xl flex items-center justify-center shadow-sm ${
                          msg.role === 'user' ? 'bg-slate-200 text-slate-600' : 
                          msg.role === 'error' ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white'
                        }`}>
                          <i data-lucide={msg.role === 'user' ? "user" : (msg.role === 'error' ? "alert-circle" : "bot")} className="w-5 h-5"></i>
                        </div>
                      </div>
                      <div className={`px-5 py-3 rounded-2xl shadow-sm whitespace-pre-wrap ${
                        msg.role === 'user' ? 'bg-blue-600 text-white' : 
                        msg.role === 'error' ? 'bg-red-50 text-red-700 border border-red-200 text-sm font-mono' : 'bg-white border border-slate-200'
                      }`}>
                        {msg.text}
                      </div>
                    </div>
                  </div>
                ))}
                {isLoading && (
                  <div className="flex justify-start">
                    <div className="flex gap-4 animate-pulse">
                      <div className="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center text-white"><i data-lucide="bot" className="w-5 h-5"></i></div>
                      <div className="px-5 py-3 rounded-2xl bg-white border border-slate-200 text-slate-400 italic">Albert réfléchit...</div>
                    </div>
                  </div>
                )}
                <div ref={messagesEndRef} />
              </main>

              <footer className="bg-white border-t p-4">
                <form onSubmit={handleSend} className="max-w-4xl mx-auto flex gap-3 p-2 bg-slate-50 rounded-xl border">
                  <textarea 
                    value={input} 
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && !e.shiftKey && handleSend(e)}
                    className="flex-1 bg-transparent border-none focus:ring-0 p-2 min-h-[44px] resize-none"
                    placeholder="Posez votre question..."
                  />
                  <button type="submit" disabled={isLoading} className="p-4 bg-blue-600 text-white rounded-xl disabled:bg-slate-300 transition-colors">
                    <i data-lucide="send" className="w-5 h-5"></i>
                  </button>
                </form>
              </footer>

              {showSettings && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                  <div className="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                    <div className="flex justify-between items-center mb-6">
                      <h2 className="text-xl font-bold">IA & Sécurité</h2>
                      <button onClick={() => setShowSettings(false)} className="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="x" className="w-6 h-6"></i></button>
                    </div>
                    
                    <div className="space-y-6 overflow-y-auto custom-scrollbar pr-2">
                      <section>
                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Mode de connexion</label>
                        <div className="grid grid-cols-2 gap-2">
                          <button onClick={() => setConfig({...config, provider: 'relais'})} className={`p-3 rounded-xl border-2 flex flex-col items-center gap-1 transition-all ${config.provider === 'relais' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-100 italic opacity-60'}`}>
                            <i data-lucide="shield-check" className="w-5 h-5"></i>
                            <span className="font-bold">Relais</span>
                          </button>
                          <button onClick={() => setConfig({...config, provider: 'albert'})} className={`p-3 rounded-xl border-2 flex flex-col items-center gap-1 transition-all ${config.provider === 'albert' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-100 opacity-60'}`}>
                            <i data-lucide="zap" className="w-5 h-5"></i>
                            <span className="font-bold">Direct</span>
                          </button>
                        </div>
                      </section>

                      <section>
                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">
                          {config.provider === 'relais' ? 'URL du Worker Cloudflare' : 'Clé API Albert'}
                        </label>
                        <input 
                          type="text" 
                          className="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 focus:outline-none transition-all font-mono text-sm" 
                          placeholder={config.provider === 'relais' ? "https://..." : "votre clé ici..."}
                          value={config.key} 
                          onChange={e => setConfig({...config, key: e.target.value})} 
                        />
                      </section>

                      <section>
                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Modèle d'IA</label>
                        <select 
                          className="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 focus:outline-none bg-white font-medium"
                          value={config.model}
                          onChange={e => setConfig({...config, model: e.target.value})}
                        >
                          {PREDEFINED_MODELS.map(m => (
                            <option key={m.id} value={m.id}>{m.name}</option>
                          ))}
                        </select>
                        <p className="text-[10px] text-slate-400 mt-2 italic px-1">
                          Note : Assurez-vous que votre clé a le droit d'utiliser ce modèle.
                        </p>
                      </section>
                    </div>

                    <div className="mt-8 pt-4 border-t flex gap-3">
                      <button onClick={saveSettings} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="save" className="w-5 h-5"></i>
                        Enregistrer
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
