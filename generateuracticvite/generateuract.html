    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        // --- UTILS & LOGIC ---

        const STOP_WORDS = new Set(['a', 'afin', 'ai', 'aie', 'aient', 'aies', 'ait', 'alors', 'apres', 'as', 'au', 'aucun', 'aucune', 'aujourd', 'aura', 'aurai', 'auraient', 'aurais', 'aurait', 'auras', 'aurez', 'auriez', 'aurions', 'aurons', 'auront', 'aussi', 'autre', 'autres', 'aux', 'avaient', 'avais', 'avait', 'avant', 'avec', 'avez', 'aviez', 'avions', 'avoir', 'avons', 'ayant', 'ayez', 'ayons', 'bon', 'car', 'ce', 'ceci', 'cela', 'celle', 'celles', 'celui', 'cependant', 'certain', 'certaine', 'certaines', 'certains', 'ces', 'cet', 'cette', 'ceux', 'chaque', 'ci', 'comme', 'comment', 'd', 'dans', 'de', 'deja', 'depuis', 'des', 'deux', 'devant', 'devrait', 'doit', 'donc', 'dont', 'du', 'elle', 'elles', 'en', 'encore', 'entre', 'est', 'et', 'etaient', 'etais', 'etait', 'etant', 'ete', 'etes', 'etiez', 'etions', 'etre', 'eu', 'eue', 'eues', 'eurent', 'eus', 'eusse', 'eussent', 'eusses', 'eussiez', 'eussions', 'eut', 'eux', 'faire', 'fais', 'faisaient', 'faisant', 'fait', 'faites', 'fois', 'font', 'furent', 'fus', 'fusse', 'fussent', 'fusses', 'fussiez', 'fussions', 'fut', 'haut', 'hors', 'hui', 'il', 'ils', 'j', 'je', 'l', 'la', 'le', 'les', 'leur', 'leurs', 'lui', 'm', 'ma', 'mais', 'me', 'meme', 'memes', 'mes', 'mien', 'mienne', 'miennes', 'miens', 'moi', 'moins', 'mon', 'mot', 'n', 'ne', 'ni', 'nom', 'non', 'nos', 'notre', 'notres', 'nous', 'on', 'ont', 'ou', 'par', 'parce', 'pas', 'pendant', 'personne', 'peu', 'peut', 'plus', 'plutot', 'pour', 'pourquoi', 'puis', 'qu', 'quand', 'que', 'quel', 'quelle', 'quelles', 'quels', 'qui', 's', 'sa', 'sans', 'se', 'sera', 'serai', 'seraient', 'serais', 'serait', 'seras', 'serez', 'seriez', 'serions', 'serons', 'seront', 'ses', 'si', 'sien', 'sienne', 'siennes', 'siens', 'soi', 'soient', 'sois', 'soit', 'sommes', 'son', 'sont', 'soyez', 'soyons', 'suis', 'sur', 't', 'ta', 'tandis', 'te', 'tel', 'telle', 'telles', 'tels', 'tes', 'toi', 'ton', 'tous', 'tout', 'toute', 'toutes', 'tres', 'tu', 'un', 'une', 'va', 'vais', 'vas', 'vers', 'voici', 'voila', 'vont', 'vos', 'votre', 'votres', 'vous', 'y']);

        const normalizeWord = (word) => word.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^A-Z]/g, '');

        function extractKeywords(text, count, forcedWordsStr = '') {
            const forcedWords = new Set((forcedWordsStr || '').split(',').map(w => normalizeWord(w.trim())).filter(w => w.length > 0));
            const words = text.toLowerCase().replace(/['’]/g, ' ').split(/[^a-zA-ZàâäéèêëîïôöùûüçÀÂÄÉÈÊËÎÏÔÖÙÛÜÇ0-9]+/).filter(word => word.length > 3 && !STOP_WORDS.has(word));

            const wordCount = {};
            words.forEach(word => {
                const normalized = normalizeWord(word);
                if (normalized.length > 0) { wordCount[normalized] = (wordCount[normalized] || 0) + 1; }
            });

            const sortedWords = Object.entries(wordCount).sort((a, b) => b[1] - a[1]).map(([word]) => word);
            const result = [];

            forcedWords.forEach(word => { if (word.length > 0 && !result.includes(word)) result.push(word); });
            for (const word of sortedWords) {
                if (!result.includes(word) && result.length < count) result.push(word);
            }
            return result.slice(0, count);
        }

        // Crossword Logic
        const GRID_SIZE = 50;
        const createGrid = (size) => Array(size).fill(null).map(() => Array(size).fill(null));
        function canPlaceWord(grid, word, row, col, direction) {
            if (row < 0 || col < 0) return false;
            if (direction === 'horizontal') {
                if (col + word.length > GRID_SIZE) return false;
                for (let i = 0; i < word.length; i++) {
                    if (grid[row][col + i] && grid[row][col + i] !== word[i]) return false;
                    if (!grid[row][col + i] && (grid[row - 1]?.[col + i] || grid[row + 1]?.[col + i])) return false;
                }
                if (grid[row]?.[col - 1] || grid[row]?.[col + word.length]) return false;
            } else {
                if (row + word.length > GRID_SIZE) return false;
                for (let i = 0; i < word.length; i++) {
                    if (grid[row + i]?.[col] && grid[row + i][col] !== word[i]) return false;
                    if (!grid[row + i]?.[col] && (grid[row + i]?.[col - 1] || grid[row + i]?.[col + 1])) return false;
                }
                if (grid[row - 1]?.[col] || grid[row + word.length]?.[col]) return false;
            }
            return true;
        }
        function finalizeGrid(grid, words) {
            let minRow = GRID_SIZE, minCol = GRID_SIZE, maxRow = 0, maxCol = 0;
            words.forEach(w => {
                if (w.direction === 'horizontal') {
                    minRow = Math.min(minRow, w.row); maxRow = Math.max(maxRow, w.row);
                    minCol = Math.min(minCol, w.col); maxCol = Math.max(maxCol, w.col + w.mot.length - 1);
                } else {
                    minRow = Math.min(minRow, w.row); maxRow = Math.max(maxRow, w.row + w.mot.length - 1);
                    minCol = Math.min(minCol, w.col); maxCol = Math.max(maxCol, w.col);
                }
            });
            const height = maxRow - minRow + 1;
            const width = maxCol - minCol + 1;
            if (height <= 1 && width <= 1) return null;
            const finalPlacedWords = words.map(w => ({ ...w, row: w.row - minRow, col: w.col - minCol, number: 0 }));
            let clueNumber = 1;
            const numberCoordinates = new Map();
            finalPlacedWords.sort((a, b) => a.row - b.row || a.col - b.col);
            for (const word of finalPlacedWords) {
                const key = `${word.row},${word.col}`;
                if (!numberCoordinates.has(key)) { numberCoordinates.set(key, clueNumber++); }
                word.number = numberCoordinates.get(key);
            }
            return { placedWords: finalPlacedWords, rows: height, cols: width };
        }
        function generateCrossword(wordsArray) {
            const sortedWords = [...wordsArray].map(w => ({ mot: w })).sort((a, b) => b.mot.length - a.mot.length);
            let grid = createGrid(GRID_SIZE);
            const placedWords = [];
            if (sortedWords.length === 0) return null;
            const firstWord = sortedWords.shift();
            const startCol = Math.floor((GRID_SIZE - firstWord.mot.length) / 2);
            const startRow = Math.floor(GRID_SIZE / 2);
            for (let i = 0; i < firstWord.mot.length; i++) grid[startRow][startCol + i] = firstWord.mot[i];
            placedWords.push({ ...firstWord, row: startRow, col: startCol, direction: 'horizontal', number: 0 });

            for (const word of sortedWords) {
                let bestFit = null;
                let maxScore = -1;
                for (const placed of placedWords) {
                    for (let i = 0; i < placed.mot.length; i++) {
                        for (let j = 0; j < word.mot.length; j++) {
                            if (placed.mot[i] === word.mot[j]) {
                                const newDirection = placed.direction === 'horizontal' ? 'vertical' : 'horizontal';
                                let newRow, newCol;
                                if (newDirection === 'vertical') { newRow = placed.row - j; newCol = placed.col + i; }
                                else { newRow = placed.row + i; newCol = placed.col - j; }
                                if (canPlaceWord(grid, word.mot, newRow, newCol, newDirection)) {
                                    let score = 1; if (score > maxScore) { maxScore = score; bestFit = { word, row: newRow, col: newCol, direction: newDirection }; }
                                }
                            }
                        }
                    }
                }
                if (bestFit) {
                    const { word: wordToPlace, row, col, direction } = bestFit;
                    for (let i = 0; i < wordToPlace.mot.length; i++) {
                        if (direction === 'horizontal') grid[row][col + i] = wordToPlace.mot[i];
                        else grid[row + i][col] = wordToPlace.mot[i];
                    }
                    placedWords.push({ ...wordToPlace, row, col, direction, number: 0 });
                }
            }
            return finalizeGrid(grid, placedWords);
        }

        /* ========== HUB ÉLÈVE ========== */
        function generateHubHtml(title, activities, weights, displayMax, courseFilename, hasCover, notebookLabels) {
            const coverPart = hasCover
                ? `<div style="width:100%;max-width:380px;height:240px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:18px;box-shadow:0 20px 40px -10px rgba(0,0,0,.12);border:1.5px solid #e2e8f0;flex-shrink:0;"><img src="course_cover.jpg" style="width:100%;height:100%;object-fit:cover;" alt="Couverture"></div>`
                : `<div style="margin-bottom:20px;text-align:center;font-size:4.5rem;">📄</div>`;

            const noteHtml = notebookLabels.map((l, idx) => `
                <div style="margin-bottom:16px;width:100%;">
                    <label style="display:block;font-weight:900;margin-bottom:6px;color:#1e293b;font-size:.72rem;text-transform:uppercase;letter-spacing:1px;">${l}</label>
                    <textarea id="note-${idx}" class="note-area" style="width:100%;height:85px;border:1.5px solid #e2e8f0;background:#fff;border-radius:10px;padding:11px;resize:none;font-size:.9rem;color:#475569;line-height:1.6;box-sizing:border-box;" oninput="saveNotes()"></textarea>
                </div>`).join('');

            const cardsHtml = activities.map(a => {
                const iconMap = { 'xml': '📊', 'holes': '✍️', 'motsmeles': '🧩', 'motscroises': '🔡', 'memory': '🎴', 'pendu': '⚖️', 'intrus': '🔍', 'lesson': '📄', 'html': '🎮' };
                const icon = iconMap[a.type] || '🎮';
                return `<div id="card-${a.idx}" class="card locked" onclick="launch('activity_${a.idx}.html',${a.idx})">${icon}<h3>${a.title}</h3><span id="b-${a.idx}" class="badge">À faire</span></div>`;
            }).join('');

            const W = JSON.stringify(weights);
            const JS = `
                var weights=${W}, maxD=${displayMax}, file="${courseFilename}";
                var session={scores:{},notes:{},pdfRead:false,submitted:false};
                window.onload=function(){
                    try{SCORM.initHub();}catch(e){}
                    try{var d=SCORM.getData();if(d&&d.scores)session=d;}catch(e){}
                    if(session.notes){for(var k in session.notes){var el=document.getElementById("note-"+k);if(el)el.value=session.notes[k];}}
                    if(session.pdfRead){var bv=document.getElementById("btn-val-pdf");if(bv)bv.style.display="none";unlockFirst();}
                    updateUI();
                    if(session.submitted){lockAll();}
                    makeDraggable(document.getElementById("postit"),document.getElementById("postit-head"));
                };
                function saveNotes(){
                    var n={}; document.querySelectorAll(".note-area").forEach(function(el,idx){n[idx]=el.value;});
                    session.notes=n; try{SCORM.setNote(JSON.stringify(session));}catch(e){}
                }
                function openPDF(){ window.open(file,"_blank"); }
                function validatePDF(){
                    session.pdfRead=true; document.getElementById("btn-val-pdf").style.display="none";
                    try{SCORM.setNote(JSON.stringify(session));}catch(e){}
                    unlockFirst(); updateUI();
                }
                function unlockFirst(){
                    var c0=document.getElementById("card-0"); if(c0){c0.classList.remove("locked");c0.style.pointerEvents="auto";}
                }
                function switchTab(t){
                    document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
                    document.getElementById("page-"+t).classList.add("active");
                    document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active");});
                    document.getElementById("t-"+t).classList.add("active");
                }
                function launch(url,idx){
                    var f=document.getElementById("act-frame"); f.src=url; f.style.display="block";
                    document.getElementById("menu").style.display="none";
                    document.getElementById("btn-back").style.display="block";
                }
                function stop(){
                    document.getElementById("act-frame").src="about:blank";
                    document.getElementById("act-frame").style.display="none";
                    document.getElementById("menu").style.display="grid";
                    document.getElementById("btn-back").style.display="none";
                    updateUI();
                }
                window.addEventListener("message",function(e){
                    if(e.data&&e.data.type==="scorm_score"){
                        var idx=e.data.idx;var score=e.data.score;
                        session.scores[idx]=score;
                        updateUI(); saveNotes();
                    }
                });
                function updateUI(){
                    var tW=0,cW=0;
                    var c0=document.getElementById("card-0");if(c0){c0.classList.remove("locked");c0.style.pointerEvents="auto";}
                    for(var id in weights){
                        var sc=session.scores&&session.scores[id]!==undefined?session.scores[id]:undefined;
                        tW+=weights[id];
                        var b=document.getElementById("b-"+id); var card=document.getElementById("card-"+id);
                        if(sc!==undefined){
                            cW+=(sc/100)*weights[id];
                            if(b){b.innerText=sc>=50?"\u2705 Terminé":sc>0?"\u23f3 En cours":"\uD83D\uDC40 Visité";b.className=sc>=50?"badge done":"badge";}
                            if(card){card.classList.remove("locked");card.style.pointerEvents="auto";}
                            var nId=parseInt(id)+1; var cN=document.getElementById("card-"+nId);
                            if(cN){cN.classList.remove("locked");cN.style.pointerEvents="auto";}
                        }
                    }
                    var pct=tW>0?Math.round((cW/tW)*100):0;
                    var ds=tW>0?Math.round((cW/tW)*maxD*10)/10:0;
                    document.getElementById("score").innerText="Score : "+ds+"/"+maxD;
                    try{SCORM.setGlobalScore(pct);}catch(e){}
                }
                function submitWork(){
                    if(session.submitted){alert("Travail déjà envoyé. Vous ne pouvez plus modifier.");return;}
                    var rows=""; var meta=${JSON.stringify(activities.map(a => ({ idx: a.idx, title: a.title })))};
                    var tW=0,cW=0; meta.forEach(function(a){
                        var sc=session.scores&&session.scores[a.idx]!==undefined?session.scores[a.idx]:null;
                        var w=weights[a.idx]||0; tW+=w;
                        var pts=sc!==null?Math.round((sc/100)*w*10)/10:0; if(sc!==null)cW+=pts;
                        var badge=sc===null?"\uD83D\uDD12 Non fait":(sc>=50?"\u2705 Terminé":(sc>0?"\u23f3 En cours":"\uD83D\uDC40 Visité"));
                        var col=sc===null?"#94a3b8":(sc>=50?"#15803d":(sc>0?"#d97706":"#94a3b8"));
                        rows += "<tr><td style='padding:10px 8px;border-bottom:1px solid #f1f5f9;'>" + a.title + "</td><td style='text-align:center;color:" + col + ";font-weight:700;padding:10px 8px;border-bottom:1px solid #f1f5f9;'>" + badge + "</td><td style='text-align:right;font-weight:800;padding:10px 8px;border-bottom:1px solid #f1f5f9;'>" + pts.toFixed(1) + "/" + w + "</td></tr>";
                    });
                    var ds=tW>0?Math.round((cW/tW)*maxD*10)/10:0;

                    document.getElementById("recap-rows").innerHTML=rows;

                function confirmSubmit(){
                    session.submitted=true; try{SCORM.finish();}catch(e){} try{SCORM.setNote(JSON.stringify(session));}catch(e){}

                    document.querySelectorAll(".card").forEach(function(c){c.classList.add("locked");c.style.pointerEvents="none";});

                }
                function makeDraggable(el,h){
                    var x=0,y=0,x1=0,y1=0; if(!h) return; h.onmousedown=dragStart;
                    function dragStart(e){ e.preventDefault(); x1=e.clientX; y1=e.clientY; document.onmouseup=dragEnd; document.onmousemove=drag; }
                    function drag(e){ e.preventDefault(); x=x1-e.clientX; y=y1-e.clientY; x1=e.clientX; y1=e.clientY; el.style.top=(el.offsetTop-y)+"px"; el.style.left=(el.offsetLeft-x)+"px"; }
                    function dragEnd(){ document.onmouseup=null; document.onmousemove=null; }
                }
                function togglePostit(){ var p=document.getElementById("postit"); p.style.display=p.style.display==="block"?"none":"block"; }
            `;

            const css = `
                *{box-sizing:border-box} body,html{margin:0;padding:0;height:100%;font-family:Inter,sans-serif;background:#f1f5f9;color:#1e293b;user-select:none;}

        .card.flipped {
            background: #fff;
            border: 2px solid #6366f1;
            color: #6366f1;

                        items.forEach(function(val,i){
            var c=document.createElement("div"); c.className="card"; c.innerText="?"; c.onclick=function(){
                if(flipped.length<2 && !c.classList.contains("flipped")){
                            c.classList.add("flipped"); c.innerText=val; flipped.push({el:c,val:val});
                        if(flipped.length==2){
                            setTimeout(function () {
                                if (flipped[0].val == flipped[1].val) { flipped[0].el.classList.add("done"); flipped[1].el.classList.add("done"); count++; if (count == p) SCORM.sendScore(100, idx); }

                        let text = '';
                        for (let i = 1; i <= pdf.numPages; i++) {

                            text += content.items.map(item => item.str).join(' ') + '\n';

                                </li>
                            </ul>


                            <div className="px-4 mb-2 mt-8 text-xs font-semibold text-slate-500 uppercase tracking-wider">
                                Paramètres Pédagogiques</div>
                            <div className="px-6 mt-3 space-y-4">
                                <div>
                                    <label className="text-xs text-slate-400 block mb-1">Cible Cognitive (Bloom)</label>
                                    <select value={bloomLevel} onChange={e => setBloomLevel(e.target.value)} className="w-full
                                bg-slate-800 border border-slate-700 rounded p-2 text-sm text-slate-200 outline-none
                                focus:border-brand-500">
                                        <option>Mémorisation pure</option>
                                        <option>Compréhension & Application</option>
                                        <option>Analyse & Évaluation (Complexe)</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="text-xs text-slate-400 block mb-1">Ton de l'interface</label>
                                    <select value={iaTone} onChange={e => setIaTone(e.target.value)} className="w-full
                                bg-slate-800 border border-slate-700 rounded p-2 text-sm text-slate-200 outline-none
                                focus:border-brand-500">
                                        <option>Sérieux et Académique</option>
                                        <option>Encourageant et Ludique</option>
                                        <option>Défi / Compétition</option>
                                    </select>
                                </div>
                            </div>
                        </nav>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                        <div className="max-w-4xl mx-auto space-y-6">
                            {activeScreen === 'generator' ? (
                                <>
                                    {/* SOURCE SECTION */}
                                    <section className="glass-panel p-6 rounded-2xl shadow-sm border border-slate-200">
                                        <div className="flex items-center mb-4 text-brand-600">
                                            <Icons.FileText />
                                            <h2 className="text-lg font-bold ml-2">Source de Connaissances</h2>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-2">Import Fichier
                                                    (PDF, TXT, HTML)</label>
                                                <div
                                                    className="relative border-2 border-dashed border-slate-300 rounded-xl p-4 hover:border-brand-500 transition-colors bg-slate-50 flex items-center justify-center cursor-pointer group">
                                                    <input type="file"
                                                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                                        accept=".txt,.html,.pdf" onChange={handleFileUpload} />
                                                    <div className="text-center pointer-events-none">
                                                        <Icons.Upload
                                                            className="mx-auto h-6 w-6 text-slate-400 group-hover:text-brand-500 mb-1" />
                                                        <span
                                                            className="text-sm text-slate-500 group-hover:text-brand-600 font-medium">
                                                            {fileName ? fileName : "Glisser ou cliquer ici"}
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-2">Ou copier-coller
                                                    le texte brut</label>
                                                <textarea
                                                    className="w-full h-24 p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm custom-scrollbar resize-none"
                                                    placeholder="Le contenu du cours commence ici..." value={sourceText}
                                                    onChange={e => { setSourceText(e.target.value); setFileName(null); }} />
                                            </div>
                                        </div>
                                    </section>

                                    {/* CONFIGURATION SECTIONS */}
                                    {activeModsCount === 0 && (
                                        <div className="glass-panel p-10 rounded-2xl shadow-sm border border-slate-200 text-center animate-fade-in">
                                            <div className="flex justify-center mb-4 text-slate-300 transform scale-150"><Icons.Settings /></div>
                                            <h3 className="text-lg font-bold text-slate-600">Aucun module sélectionné</h3>
                                            <p className="text-sm text-slate-500 mt-1">Cochez une ou plusieurs activités dans le menu de gauche.</p>
                                        </div>
                                    )}

                                    {selectedModules.seriousgame && (
                                        <section className="glass-panel p-6 rounded-2xl shadow-sm border-t-4 border-t-brand-500 animate-fade-in relative">
                                            <div className="flex items-center mb-6 text-brand-600 border-b border-slate-100 pb-4">
                                                <Icons.Gamepad /><h2 className="text-lg font-bold ml-2">Serious Game</h2>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                                <InputGroup label="Questions" type="number" value={sgQuestions} onChange={setSgQuestions} />
                                                <InputGroup label="Seuil victoire" type="number" value={sgScoreToWin} onChange={setSgScoreToWin} />
                                                <Toggle label="Chrono" checked={sgTimerActive} onChange={setSgTimerActive} />
                                                <InputGroup label="Mot Magique" value={sgMagicWord} onChange={setSgMagicWord} />
                                                <InputGroup label="Points" type="number" value={sgMaxPoints} onChange={setSgMaxPoints} />
                                            </div>
                                        </section>
                                    )}

                                    {selectedModules.activites && (
                                        <section className="glass-panel p-6 rounded-2xl shadow-sm border-t-4 border-t-brand-500 animate-fade-in">
                                            <div className="flex items-center mb-6 text-brand-600 border-b border-slate-100 pb-4">
                                                <Icons.Layers /><h2 className="text-lg font-bold ml-2">Activités Formatives</h2>
                                            </div>
                                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                                <InputGroup label="QCM" type="number" value={actId} onChange={setActId} />
                                                <InputGroup label="Séquençage" type="number" value={actSeq} onChange={setActSeq} />
                                                <InputGroup label="Trous" type="number" value={actSynth} onChange={setActSynth} />
                                                <InputGroup label="Logique" type="number" value={actLogic} onChange={setActLogic} />
                                            </div>
                                        </section>
                                    )}

                                    {/* ... more modules if needed ... */}

                                    <div className="flex justify-end mt-8">
                                        <button onClick={generatePrompt} disabled={isGenerating || activeModsCount === 0} className="bg-brand-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-brand-700 transition shadow-lg flex items-center">
                                            {isGenerating ? "Traitement..." : <><Icons.Wand className="mr-2" /> Générer le Super-Prompt</>}
                                        </button>
                                    </div>

                                    {generatedPrompt && (
                                        <section className="glass-panel p-6 rounded-2xl border border-brand-300 mt-8 animate-fade-in">
                                            <div className="flex justify-between items-center mb-4">
                                                <h2 className="text-lg font-bold text-brand-700">Prompt Expert Généré</h2>
                                                <button onClick={copyToClipboard} className="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm">{copySuccess ? "Copié !" : "Copier pour l'IA"}</button>
                                            </div>
                                            <pre className="bg-slate-900 text-slate-300 p-4 rounded-xl text-sm overflow-x-auto whitespace-pre-wrap"><code>{generatedPrompt}</code></pre>
                                        </section>
                                    )}
                                </>
                            ) : (
                                <div className="space-y-6 animate-fade-in">
                                    <section className="glass-panel p-6 rounded-2xl shadow-sm border border-slate-200">
                                        <h2 className="text-xl font-bold mb-4 flex items-center text-brand-700">
                                            <Icons.Layers className="mr-2" /> 1. Configurer le Package
                                        </h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <InputGroup label="Titre du Parcours" value={scormTitle} onChange={setScormTitle} />
                                            <InputGroup label="Points Totaux (SCORM)" type="number" value={scormPoints} onChange={setScormPoints} />
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-1">Fichier de base (PDF/HTML)</label>
                                                <input type="file" onChange={e => { setCourseFile(e.target.files[0]); setCourseFileName(e.target.files[0].name); }} className="w-full text-sm" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-1">Image de couverture (.jpg)</label>
                                                <input type="file" accept="image/*" onChange={e => setCourseCover(e.target.files[0])} className="w-full text-sm" />
                                            </div>
                                        </div>
                                    </section>

                                    <section className="glass-panel p-6 rounded-2xl shadow-sm border border-brand-200 bg-brand-50/30">
                                        <h2 className="text-xl font-bold mb-4 flex items-center text-brand-700">
                                            <Icons.Brain className="mr-2" /> 2. Injecter la réponse de l'IA
                                        </h2>
                                        <p className="text-sm text-slate-600 mb-3">Collez le contenu généré par l'IA pour extraire les activités.</p>
                                        <textarea value={aiResponseText} onChange={e => setAiResponseText(e.target.value)} className="w-full h-48 p-4 border border-slate-300 rounded-xl mb-4 text-sm font-mono" placeholder="[[LECON]] ... [[SYNTHESE]] ..."></textarea>
                                        <button onClick={injectAiResult}
                                            className="bg-brand-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-brand-700 shadow-md">Parser
                                            le code</button>
                                    </section>

                                    {activities.length > 0 && (
                                        <section className="glass-panel p-6 rounded-2xl shadow-sm bg-white animate-fade-in">
                                            <h2 className="text-xl font-bold mb-4">3. Récapitulatif et Export</h2>
                                            <div className="space-y-2 mb-6">
                                                {activities.map(a => (
                                                    <div key={a.idx}
                                                        className="flex justify-between p-3 bg-slate-50 rounded-lg border border-slate-200">
                                                        <span className="font-medium">{a.title}</span>
                                                        <span className="text-slate-500 text-sm">{a.type} - {a.weight} pts</span>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="text-sm font-bold text-brand-700 mb-4">{scormStatus}</div>
                                            <button onClick={generateScormPackage}
                                                className="w-full py-4 bg-gradient-to-r from-green-600 to-emerald-500 text-white rounded-xl font-bold text-lg shadow-xl hover:scale-[1.02] transition-transform">
                                                Générer le Package SCORM (.ZIP)
                                            </button>
                                        </section>
                                    )}
                                </div>
                            )}
                        </div>

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <App />);
    </script>
</body>

</html>
