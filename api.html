<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface IA Multi-Modèle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Définition de la police Inter par défaut */
        body {
            font-family: 'Inter', sans-serif;
            /* Important: S'assurer que le fond est blanc pour l'iframe */
            background-color: #ffffff; 
        }
        /* Style simple pour le spinner de chargement */
        #loading-spinner {
            border: 4px solid rgba(0, 0, 0, .1);
            border-left-color: #09f;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Style pour la zone de texte brut (préserve les sauts de ligne) */
        #raw-output {
            white-space: pre-wrap; 
            word-wrap: break-word;
            font-family: monospace; /* Police mono pour le code/texte brut */
        }
    </style>
</head>
<body class="">

    <div class="bg-white w-full relative">
        
        <a id="back-arrow-link" href="index.html" title="Retour à l'accueil" class="absolute top-1 -left-1 sm:top-5 sm:left-6 text-gray-400 hover:text-gray-600 transition-colors">
            <i class="fas fa-arrow-left text-xl"></i>
        </a>

        <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-6 text-center">Interface IA 🤖</h1>

        <div id="config-section">
            <h2 class="text-lg font-semibold text-gray-700 mb-3">Configuration de l'IA</h2>
            <p class="text-sm text-gray-600 mb-4">Choisissez votre fournisseur d'IA et entrez votre clé API. Elle sera sauvegardée dans votre navigateur.</p>
            
            <label for="ai-selector" class="block text-sm font-medium text-gray-700 mb-1">Fournisseur d'IA</label>
            <select id="ai-selector" class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
                <option value="gemini">Google (Gemini)</option>
                <option value="chatgpt">OpenAI (ChatGPT)</option>
                <option value="mistral">Mistral</option>
                <option value="claude">Anthropic (Claude)</option>
                <option value="deepseek">DeepSeek</option>
                <option value="perplexity">Perplexity</option>
            </select>

            <label for="api-key-input" class="block text-sm font-medium text-gray-700 mb-1">Clé API</label>
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="password" id="api-key-input" placeholder="Entrez votre clé API ici..." class="flex-grow p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="save-key-button" class="bg-blue-600 text-white font-semibold py-3 px-5 rounded-lg shadow-md hover:bg-blue-700 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                    Sauvegarder
                </button>
            </div>
            <p class="text-xs text-gray-500 mt-3">⚠️ Votre clé est stockée localement. Ne l'utilisez pas sur un appareil public.</p>
        </div>

        <div id="prompt-section" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 id="config-status-text" class="text-lg font-semibold text-green-700"></h2>
                <button id="change-ai-button" class="text-sm text-blue-600 hover:text-blue-800 hover:underline">Changer d'IA</button>
            </div>

            <label for="prompt-input" class="block text-sm font-medium text-gray-700 mb-2">Votre Message :</label>
            <textarea id="prompt-input" rows="8" class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Entrez votre question ou instruction ici... (ex: 'Donne-moi un cours en HTML sur les volcans' ou 'Explique-moi la photosynthèse')"></textarea>
            
            <button id="generate-button" class="w-full bg-green-600 text-white font-bold py-3 px-5 rounded-lg shadow-md hover:bg-green-700 transition-colors mt-4 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2">
                Envoyer
            </button>
        </div>

        <div id="results-section" class="mt-6 hidden">
            <div id="loading-spinner" class="mx-auto my-4 hidden"></div>

            <div class="flex border-b border-gray-200">
                <button id="tab-preview" class="py-2 px-4 font-semibold text-blue-600 border-b-2 border-blue-600">Aperçu</button>
                <button id="tab-raw" class="py-2 px-4 font-semibold text-gray-500">Texte ou Code</button>
            </div>

            <div id="preview-output" class="mt-4 p-4 border border-gray-200 rounded-lg min-h-[150px] bg-gray-50">
                </div>

            <div id="raw-output-container" class="mt-4 hidden">
                <pre class="bg-gray-900 text-white p-4 rounded-lg overflow-x-auto"><code id="raw-output" class="text-sm"></code></pre>
                <button id="copy-text-button" class="mt-2 bg-gray-600 text-white text-xs font-medium py-1 px-3 rounded-md hover:bg-gray-700">Copier le texte ou code</button>
            </div>
        </div>

    </div>

    <script>
        // Clés pour le localStorage
        const STORAGE_SELECTED_AI = 'selectedAI';
        const STORAGE_GEMINI_KEY = 'geminiApiKey';
        const STORAGE_CHATGPT_KEY = 'chatgptApiKey';
        const STORAGE_MISTRAL_KEY = 'mistralApiKey';
        const STORAGE_CLAUDE_KEY = 'claudeApiKey';
        const STORAGE_DEEPSEEK_KEY = 'deepseekApiKey';
        const STORAGE_PERPLEXITY_KEY = 'perplexityApiKey';

        // --- Références aux éléments du DOM ---
        const configSection = document.getElementById('config-section');
        const promptSection = document.getElementById('prompt-section');
        const aiSelector = document.getElementById('ai-selector');
        const apiKeyInput = document.getElementById('api-key-input');
        const saveKeyButton = document.getElementById('save-key-button');
        
        const configStatusText = document.getElementById('config-status-text');
        const changeAiButton = document.getElementById('change-ai-button');
        const promptInput = document.getElementById('prompt-input');
        const generateButton = document.getElementById('generate-button');
        
        const resultsSection = document.getElementById('results-section');
        const loadingSpinner = document.getElementById('loading-spinner');
        
        // Références aux onglets et aux sorties
        const tabPreview = document.getElementById('tab-preview');
        const tabRaw = document.getElementById('tab-raw');
        const previewOutput = document.getElementById('preview-output');
        const rawOutputContainer = document.getElementById('raw-output-container');
        const rawOutput = document.getElementById('raw-output');
        const copyTextButton = document.getElementById('copy-text-button');


        // --- Configuration des différentes API ---
        
        // Instruction système générale
        const systemPrompt = "Tu es un assistant IA polyvalent et serviable. Réponds à la demande de l'utilisateur de manière claire, concise et précise. Si l'utilisateur demande explicitement du code HTML, génère uniquement le code HTML brut.";

        const AI_CONFIGS = {
            'gemini': {
                name: "Google (Gemini)",
                storageKey: STORAGE_GEMINI_KEY,
                getApiUrl: (cleApi) => `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${cleApi}`,
                getHeaders: (cleApi) => ({ 'Content-Type': 'application/json' }),
                getPayload: (prompt) => ({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: { 
                        responseMimeType: "text/plain",
                        maxOutputTokens: 8192 // Ajout d'une limite par sécurité
                    }
                }),
                parseResponse: (result) => {
                    if (!result.candidates || !result.candidates[0].content.parts[0].text) {
                        throw new Error("Réponse de l'API Gemini invalide ou bloquée.");
                    }
                    return result.candidates[0].content.parts[0].text;
                }
            },
            'chatgpt': {
                name: "OpenAI (ChatGPT)",
                storageKey: STORAGE_CHATGPT_KEY,
                getApiUrl: () => 'https://api.openai.com/v1/chat/completions',
                getHeaders: (cleApi) => ({
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${cleApi}`
                }),
                getPayload: (prompt) => ({
                    model: 'gpt-4o', 
                    messages: [
                        { role: 'system', content: systemPrompt }, 
                        { role: 'user', content: prompt }
                    ],
                    max_tokens: 4096 // Ajout d'une limite
                }),
                parseResponse: (result) => {
                    if (!result.choices || !result.choices[0].message.content) {
                        throw new Error("Réponse de l'API OpenAI invalide.");
                    }
                    return result.choices[0].message.content;
                }
            },
            'mistral': {
                name: "Mistral",
                storageKey: STORAGE_MISTRAL_KEY,
                getApiUrl: () => 'https://api.mistral.ai/v1/chat/completions',
                getHeaders: (cleApi) => ({
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${cleApi}`
                }),
                getPayload: (prompt) => ({
                    model: 'mistral-large-latest',
                    messages: [
                        { role: 'system', content: systemPrompt }, 
                        { role: 'user', content: prompt }
                    ],
                    max_tokens: 4096 // <-- MODIFICATION AJOUTÉE
                }),
                parseResponse: (result) => {
                    if (!result.choices || !result.choices[0].message.content) {
                        throw new Error("Réponse de l'API Mistral invalide.");
                    }
                    return result.choices[0].message.content;
                }
            },
            'claude': {
                name: "Anthropic (Claude)",
                storageKey: STORAGE_CLAUDE_KEY,
                getApiUrl: () => 'https://api.anthropic.com/v1/messages',
                getHeaders: (cleApi) => ({
                    'Content-Type': 'application/json',
                    'x-api-key': cleApi,
                    'anthropic-version': '2023-06-01'
                }),
                getPayload: (prompt) => ({
                    model: 'claude-3-haiku-20240307', 
                    system: systemPrompt, 
                    messages: [ { role: 'user', content: prompt } ],
                    max_tokens: 4096 // Limite déjà présente ici
                }),
                parseResponse: (result) => {
                     if (!result.content || !result.content[0].text) {
                        throw new Error("Réponse de l'API Anthropic invalide.");
                    }
                    return result.content[0].text;
                }
            },
            'deepseek': {
                name: "DeepSeek",
                storageKey: STORAGE_DEEPSEEK_KEY,
                getApiUrl: () => 'https://api.deepseek.com/v1/chat/completions',
                getHeaders: (cleApi) => ({
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${cleApi}`
                }),
                getPayload: (prompt) => ({
                    model: 'deepseek-chat', 
                    messages: [
                        { role: 'system', content: systemPrompt }, 
                        { role: 'user', content: prompt }
                    ],
                    max_tokens: 4096 // <-- MODIFICATION AJOUTÉE
                }),
                parseResponse: (result) => {
                    if (!result.choices || !result.choices[0].message.content) {
                        throw new Error("Réponse de l'API DeepSeek invalide.");
                    }
                    return result.choices[0].message.content;
                }
            },
            'perplexity': {
                name: "Perplexity",
                storageKey: STORAGE_PERPLEXITY_KEY,
                getApiUrl: () => 'https://api.perplexity.ai/chat/completions',
                getHeaders: (cleApi) => ({
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${cleApi}`
                }),
                getPayload: (prompt) => ({
                    model: 'llama-3-sonar-large-32k-online', 
                    messages: [
                        { role: 'system', content: systemPrompt }, 
                        { role: 'user', content: prompt }
                    ],
                    max_tokens: 4096 // <-- MODIFICATION AJOUTÉE
                }),
                parseResponse: (result) => {
                    if (!result.choices || !result.choices[0].message.content) {
                        throw new Error("Réponse de l'API Perplexity invalide.");
                    }
                    return result.choices[0].message.content;
                }
            }
        };

        /**
         * Fonction principale d'appel API
         */
        async function callGenerationAPI(promptUtilisateur, cleApi, aiType) {
            const config = AI_CONFIGS[aiType];
            if (!config) {
                throw new Error(`Configuration AI non trouvée pour: ${aiType}`);
            }

            const API_URL = config.getApiUrl(cleApi);
            const headers = config.getHeaders(cleApi);
            const payload = config.getPayload(promptUtilisateur);

            // On retire la logique de "réessai" (backoff) pour l'instant
            // car elle peut masquer des erreurs 429 (rate limiting)
            // et compliquer le débogage. On fait un appel direct.
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const result = await response.json();
                    return config.parseResponse(result);
                } else {
                    // Si l'API renvoie une erreur (429, 503, 401...), on la capture ici
                    const errorBody = await response.text();
                    console.error("Détails de l'erreur API:", errorBody);
                    // On lance une erreur claire pour l'utilisateur
                    throw new Error(`Erreur API: ${response.status} ${response.statusText}.`);
                }
            } catch (error) {
                // Gère les erreurs réseau (ex: CORS si jamais il est ré-activé)
                console.error("Erreur réseau ou fetch:", error);
                throw new Error(`Erreur réseau: ${error.message}. Vérifiez la console (F12) pour un blocage CORS.`);
            }
        }

        // --- Logique de l'application ---

        function basculerSections(cleExiste, aiType = '') {
            if (cleExiste && aiType) {
                configSection.classList.add('hidden');
                promptSection.classList.remove('hidden');
                const aiName = AI_CONFIGS[aiType]?.name || aiType;
                configStatusText.innerHTML = `Connecté à : <strong class="text-gray-900">${aiName}</strong>`;
            } else {
                configSection.classList.remove('hidden');
                promptSection.classList.add('hidden');
                resultsSection.classList.add('hidden'); 
                updateApiKeyInput(); 
            }
        }

        function updateApiKeyInput() {
            const selectedAI = aiSelector.value;
            const config = AI_CONFIGS[selectedAI];
            if (!config) {
                apiKeyInput.value = '';
                apiKeyInput.placeholder = 'Veuillez sélectionner une IA valide...';
                return;
            }
            const cleSauvegardee = localStorage.getItem(config.storageKey);
            
            apiKeyInput.value = cleSauvegardee || '';
            apiKeyInput.placeholder = `Entrez votre clé API pour ${config.name}...`;
        }
        
        function sauvegarderCle() {
            const selectedAI = aiSelector.value;
            const config = AI_CONFIGS[selectedAI];
            const cle = apiKeyInput.value.trim();
            
            if (cle) {
                localStorage.setItem(config.storageKey, cle);
                localStorage.setItem(STORAGE_SELECTED_AI, selectedAI);
                basculerSections(true, selectedAI);
            } else {
                alert("Veuillez entrer une clé API valide.");
            }
        }
        
        function changerIA() {
            basculerSections(false);
        }

        // Gérer la génération de la réponse
        async function gererGeneration() {
            const prompt = promptInput.value.trim();
            const activeAI = localStorage.getItem(STORAGE_SELECTED_AI);
            
            if (!activeAI) {
                alert("Erreur : Aucune IA sélectionnée.");
                basculerSections(false);
                return;
            }
            
            const config = AI_CONFIGS[activeAI];
            const cleApi = localStorage.getItem(config.storageKey);

            if (!prompt) {
                alert("Veuillez entrer un message.");
                return;
            }
            if (!cleApi) {
                alert(`Erreur : Clé API non trouvée pour ${config.name}.`);
                basculerSections(false);
                return;
            }

            // Afficher le chargement et vider les anciennes réponses
            loadingSpinner.classList.remove('hidden');
            resultsSection.classList.remove('hidden');
            previewOutput.innerHTML = ''; 
            rawOutput.textContent = ''; 
            generateButton.disabled = true;
            generateButton.textContent = "Envoi en cours...";

            // Réinitialiser l'état des onglets (Aperçu par défaut)
            afficherOnglet('preview'); 

            try {
                // Appeler la fonction de génération
                const textContent = (await callGenerationAPI(prompt, cleApi, activeAI)).trim();
                
                // Nettoyer le HTML (l'IA ajoute parfois ````html` au début/fin)
                const cleanHtml = textContent
                    .replace(/^```(html|xml)\n?/, '') // Gère html ou xml
                    .replace(/```$/, '')
                    .trim();

                // Toujours remplir le texte brut
                rawOutput.textContent = cleanHtml;

                // Détecter si la réponse est du HTML/XML
                const isHtmlOrXml = cleanHtml.startsWith('<') && cleanHtml.endsWith('>');

                if (isHtmlOrXml && cleanHtml.length > 10) { // Petite vérification de longueur
                    // Afficher l'aperçu HTML
                    previewOutput.innerHTML = cleanHtml;
                    afficherOnglet('preview');
                } else {
                    // Afficher le texte brut
                    previewOutput.innerHTML = `<pre class="text-sm text-gray-800 whitespace-pre-wrap">${cleanHtml}</pre>`;
                    // Si ce n'est pas du HTML, on montre le texte dans l'aperçu mais on bascule l'onglet actif sur "Texte ou Code"
                    afficherOnglet('raw');
                }

            } catch (error) {
                console.error("Erreur lors de la génération :", error);
                rawOutput.textContent = `Erreur : ${error.message}`;
                previewOutput.innerHTML = `<p class="text-red-600 font-semibold">Erreur :</p><p class="text-red-500 text-sm">${error.message}</p>`;
                // En cas d'erreur, on bascule sur l'onglet "Texte ou Code" pour voir le message
                afficherOnglet('raw'); 
            } finally {
                // Cacher le chargement et réactiver le bouton
                loadingSpinner.classList.add('hidden');
                generateButton.disabled = false;
                generateButton.textContent = "Envoyer";
            }
        }

        // Gérer l'affichage des onglets
        function afficherOnglet(type) {
            if (type === 'preview') {
                previewOutput.classList.remove('hidden');
                rawOutputContainer.classList.add('hidden');
                tabPreview.classList.add('text-blue-600', 'border-blue-600');
                tabPreview.classList.remove('text-gray-500');
                tabRaw.classList.add('text-gray-500');
                tabRaw.classList.remove('text-blue-600', 'border-blue-600');
            } else { // type === 'raw'
                previewOutput.classList.add('hidden');
                rawOutputContainer.classList.remove('hidden');
                tabRaw.classList.add('text-blue-600', 'border-blue-600');
                tabRaw.classList.remove('text-gray-500');
                tabPreview.classList.add('text-gray-500');
                tabPreview.classList.remove('text-blue-600', 'border-blue-600');
            }
        }

        // Copier le texte brut
        function copierTexte() {
            const text = rawOutput.textContent;
            const buttonText = "Copier le texte ou code"; // Texte par défaut
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    copyTextButton.textContent = "Copié !";
                    setTimeout(() => { copyTextButton.textContent = buttonText; }, 2000);
                }).catch(err => {
                    fallbackCopyTextToClipboard(text, buttonText);
                });
            } else {
                fallbackCopyTextToClipboard(text, buttonText);
            }
        }
        
        function fallbackCopyTextToClipboard(text, buttonText) {
            try {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.top = 0;
                textArea.style.left = 0;
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                copyTextButton.textContent = "Copié !";
                setTimeout(() => { copyTextButton.textContent = buttonText; }, 2000);
            } catch (e) {
                alert("La copie a échoué. Veuillez copier manuellement.");
            }
        }


        // --- Écouteurs d'événements ---
        
        // Au chargement de la page
        document.addEventListener('DOMContentLoaded', () => {
            // Logique pour adapter l'affichage (dans modal ou seul)
            if (window.self !== window.top) {
                // -- ON EST DANS L'IFRAME (MODAL) --
                const backArrow = document.getElementById('back-arrow-link');
                if (backArrow) {
                    backArrow.style.display = 'none';
                }
                // Ajouter le padding interne pour la modale
                document.body.classList.add('p-4', 'sm:p-6');
            } else {
                 // -- ON EST EN PAGE SEULE --
                // Ajouter les styles de centrage et de fond
                document.body.classList.add('bg-gray-100', 'min-h-screen', 'flex', 'items-center', 'justify-center', 'p-4');
                // Ajouter les styles de carte (ombre, coins arrondis, etc.)
                document.body.querySelector('div').classList.add('max-w-3xl', 'p-6', 'sm:p-8', 'rounded-xl', 'shadow-lg');
            }

            // Logique d'initialisation de l'IA
            const selectedAI = localStorage.getItem(STORAGE_SELECTED_AI) || 'gemini';
            aiSelector.value = selectedAI;
            
            const config = AI_CONFIGS[selectedAI];
            // S'assurer que la config existe avant de lire la clé
            const cleSauvegardee = config ? localStorage.getItem(config.storageKey) : null;

            if (cleSauvegardee) {
                basculerSections(true, selectedAI);
            } else {
                basculerSections(false);
            }
        });

        // Changement du sélecteur d'IA
        aiSelector.addEventListener('change', updateApiKeyInput);

        // Clic sur "Sauvegarder"
        saveKeyButton.addEventListener('click', sauvegarderCle);

        // Clic sur "Changer d'IA"
        changeAiButton.addEventListener('click', changerIA);

        // Clic sur "Envoyer"
        generateButton.addEventListener('click', gererGeneration);
        
        // Clic sur les onglets
        tabPreview.addEventListener('click', () => afficherOnglet('preview'));
        tabRaw.addEventListener('click', () => afficherOnglet('raw'));
        
        // Clic sur "Copier"
        copyTextButton.addEventListener('click', copierTexte);

    </script>
</body>
</html>
