<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prospects EI — gcormi.fr</title>
<style>
  :root {
    --indigo: #4f46e5;
    --slate: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --bg: #f8fafc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--slate); line-height: 1.6; }

  .page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  .header {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 60%, #2563eb 100%);
    color: #fff; border-radius: 1.25rem; padding: 2rem; margin-bottom: 2rem;
  }
  .header h1 { font-size: 1.5rem; font-weight: 900; margin-bottom: .25rem; }
  .header p { opacity: .85; font-size: .9rem; }

  .toolbar {
    display: flex; flex-wrap: wrap; gap: 1rem; align-items: center;
    margin-bottom: 1.5rem;
  }
  .search-wrap { flex: 1; min-width: 200px; }
  .search-wrap input {
    width: 100%; padding: .6rem 1rem; border: 1.5px solid var(--border);
    border-radius: .75rem; font-size: .9rem; background: #fff;
    outline: none; transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--indigo); }

  .filters { display: flex; gap: .5rem; flex-wrap: wrap; }
  .filter-btn {
    padding: .4rem .9rem; border-radius: 2rem; font-size: .8rem; font-weight: 700;
    border: 2px solid transparent; cursor: pointer; transition: all .15s;
    background: #fff; color: var(--muted); border-color: var(--border);
  }
  .filter-btn.active { background: var(--indigo); color: #fff; border-color: var(--indigo); }
  .filter-btn:hover:not(.active) { border-color: var(--indigo); color: var(--indigo); }

  .stats { font-size: .85rem; color: var(--muted); padding: .4rem .75rem; background: #fff; border: 1px solid var(--border); border-radius: .75rem; white-space: nowrap; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.25rem;
  }

  .card {
    background: #fff; border: 2px solid var(--border); border-radius: 1rem;
    padding: 1.25rem; display: flex; flex-direction: column; gap: .75rem;
    transition: box-shadow .2s, transform .15s;
  }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.08); transform: translateY(-2px); }

  .card[data-score="5"] { border-color: #86efac; background: #f0fdf4; }
  .card[data-score="4"] { border-color: #bbf7d0; background: #f0fdf4; }
  .card[data-score="3"] { border-color: #fde047; background: #fefce8; }
  .card[data-score="2"] { border-color: #fdba74; background: #fff7ed; }
  .card[data-score="1"] { border-color: #fca5a5; background: #fef2f2; }

  .card-header { display: flex; align-items: flex-start; gap: .75rem; }
  .score-badge {
    flex-shrink: 0; width: 2.25rem; height: 2.25rem; border-radius: .5rem;
    display: flex; align-items: center; justify-content: center;
    font-size: .85rem; font-weight: 900; color: #fff;
  }
  .score-5 { background: #059669; }
  .score-4 { background: #16a34a; }
  .score-3 { background: #ca8a04; }
  .score-2 { background: #ea580c; }
  .score-1 { background: #dc2626; }
  .score-0 { background: #94a3b8; }

  .card-name { font-size: .9rem; font-weight: 800; color: var(--slate); line-height: 1.35; }
  .card-meta { display: flex; gap: .5rem; flex-wrap: wrap; }
  .tag {
    font-size: .72rem; font-weight: 600; padding: .2rem .6rem;
    background: var(--bg); border: 1px solid var(--border); border-radius: 2rem; color: var(--muted);
  }
  .card-analysis {
    font-size: .8rem; color: var(--muted); line-height: 1.6;
    border-top: 1px solid var(--border); padding-top: .75rem;
  }
  .card-analysis strong { color: var(--slate); }

  .empty {
    grid-column: 1/-1; text-align: center; padding: 3rem;
    color: var(--muted); font-size: .95rem;
  }

  .loading {
    text-align: center; padding: 4rem; color: var(--muted);
  }
  .spinner {
    width: 2rem; height: 2rem; border: 3px solid var(--border);
    border-top-color: var(--indigo); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: #fef2f2; border: 1px solid #fca5a5; border-radius: 1rem;
    padding: 1.25rem 1.5rem; color: #dc2626; font-size: .875rem;
    margin-bottom: 1.5rem;
  }
  .error strong { display: block; margin-bottom: .25rem; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
  }
  @media print {
    body { background: #fff; }
    .toolbar { display: none; }
    .card { break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>🎯 Prospects EI</h1>
    <p>Organismes et structures qualifiés automatiquement — gcormi.fr · Consultant IA &amp; Éducation</p>
  </div>

  <div id="error-box" class="error" style="display:none">
    <strong>Impossible de charger les données</strong>
    <span id="error-msg"></span>
  </div>

  <div id="toolbar" class="toolbar" style="display:none">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Rechercher un nom, une ville…" oninput="applyFilters()">
    </div>
    <div class="filters" id="filter-btns">
      <button class="filter-btn active" onclick="setFilter('all', this)">Tous</button>
      <button class="filter-btn" onclick="setFilter(5, this)">⭐ Score 5</button>
      <button class="filter-btn" onclick="setFilter(4, this)">Score 4</button>
      <button class="filter-btn" onclick="setFilter(3, this)">Score 3</button>
      <button class="filter-btn" onclick="setFilter(2, this)">Score 2</button>
      <button class="filter-btn" onclick="setFilter(1, this)">Score 1</button>
    </div>
    <div class="stats" id="stats">0 prospects</div>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    Chargement des prospects…
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>
// ─── CONFIGURATION ────────────────────────────────────────────────────────────
// Publier le Google Sheet : Fichier > Partager > Publier sur le web > CSV
// Coller l'URL ici :
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQr4uoJQd_PMpmuUrHTvLWcBawsHXHkBCB8J1XPga-pijVuGb7KkWiYhHGLKxR0rXPvyg36dYwRDNjp/pub?gid=0&single=true&output=csv';
// ─────────────────────────────────────────────────────────────────────────────

let allProspects = [];
let activeFilter = 'all';

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i + 1];
    if (inQ) {
      if (c === '"' && n === '"') { field += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); field = ''; rows.push(row); row = []; }
      else if (c !== '\r') { field += c; }
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function extractScore(text) {
  const m = text.match(/(?:Score|Note)\s*[:\s]+(\d)/i);
  return m ? parseInt(m[1]) : 0;
}

function renderText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function scoreClass(s) {
  return s >= 1 && s <= 5 ? `score-${s}` : 'score-0';
}

function buildCard(p) {
  return `
    <div class="card" data-score="${p.score}" data-name="${p.nom.toLowerCase()}" data-ville="${p.ville.toLowerCase()}">
      <div class="card-header">
        <div class="score-badge ${scoreClass(p.score)}">${p.score || '?'}</div>
        <div class="card-name">${p.nom}</div>
      </div>
      <div class="card-meta">
        ${p.ville ? `<span class="tag">📍 ${p.ville}</span>` : ''}
        ${p.score ? `<span class="tag">Score ${p.score}/5</span>` : ''}
      </div>
      ${p.analyse ? `<div class="card-analysis"><p>${renderText(p.analyse)}</p></div>` : ''}
    </div>`;
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const cards = document.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(c => {
    const matchScore = activeFilter === 'all' || c.dataset.score == activeFilter;
    const matchSearch = !q || c.dataset.name.includes(q) || c.dataset.ville.includes(q);
    const show = matchScore && matchSearch;
    c.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  document.getElementById('stats').textContent = `${visible} prospect${visible > 1 ? 's' : ''}`;
  const empty = document.querySelector('.empty');
  if (empty) empty.style.display = visible === 0 ? '' : 'none';
}

function setFilter(val, btn) {
  activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

async function load() {
  if (CSV_URL === 'METTRE_URL_ICI') {
    showError('URL du Google Sheet non configurée. Ouvrez index.html et remplacez METTRE_URL_ICI par l\'URL CSV publiée.');
    return;
  }
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) { showError('Aucune donnée dans le sheet.'); return; }

    // Ligne 1 = en-têtes, skip
    allProspects = rows.slice(1)
      .filter(r => r[0] && r[0].trim())
      .map(r => ({
        nom: r[0] || '',
        secteur: r[1] || '',
        ville: r[2] || '',
        analyse: r[3] || '',
        score: extractScore(r[3] || '')
      }))
      .sort((a, b) => b.score - a.score);

    const grid = document.getElementById('grid');
    grid.innerHTML = allProspects.map(buildCard).join('') +
      `<div class="empty" style="display:none">Aucun prospect ne correspond à votre recherche.</div>`;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('toolbar').style.display = 'flex';
    document.getElementById('stats').textContent = `${allProspects.length} prospects`;

  } catch (e) {
    showError(e.message);
  }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-box').style.display = 'block';
  document.getElementById('error-msg').textContent = ' ' + msg;
}

load();
</script>
</body>
</html>
