<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord de Classe | Gilles Cormi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --card-glass: rgba(30, 41, 59, 0.7);
            --accent-indigo: #6366f1;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            color: #f1f5f9;
            overflow: hidden;
            height: 100vh;
        }

        /* THEMES */
        body.theme-night {
            background-color: #020617;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(15, 23, 42, 0.4) 0px, transparent 50%);
            --card-glass: rgba(15, 23, 42, 0.7);
        }

        body.theme-day {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(186, 230, 253, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(224, 242, 254, 0.4) 0px, transparent 50%);
            color: #1e293b;
            --card-glass: rgba(255, 255, 255, 0.85);
        }
        body.theme-day .glass-card { border-color: rgba(0,0,0,0.05); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        body.theme-day #current-date { color: #0f172a; }
        body.theme-day #digital-clock, body.theme-day blockquote { color: #334155; }
        body.theme-day .info-area { color: #334155; }
        body.theme-day [contenteditable]:empty:before { color: rgba(0,0,0,0.2); }
        body.theme-day .clock-container { background: #fff; border-color: #f1f5f9; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); }
        body.theme-day .hour-hand { background: #1e293b; }
        body.theme-day .min-hand { background: #94a3b8; }
        body.theme-day .number { color: #cbd5e1; }

        body.theme-cyber {
            background-color: #050505;
            background-image: 
                linear-gradient(rgba(31, 41, 55, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(31, 41, 55, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            --card-glass: rgba(0, 0, 0, 0.8);
        }
        body.theme-cyber .glass-card { border-color: #6366f1; box-shadow: 0 0 30px rgba(99, 102, 241, 0.1); }


        .font-display { font-family: 'Outfit', sans-serif; }

        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        /* HORLOGE ANALOGIQUE MODERNE */
        .clock-container {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.8);
            border: 8px solid rgba(255, 255, 255, 0.05);
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5), 0 0 60px rgba(99, 102, 241, 0.2);
        }

        .clock-face::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%; left: 50%;
            transform-origin: bottom;
            border-radius: 10px;
            transform: translateX(-50%);
        }

        .hour-hand { width: 6px; height: 70px; background: #fff; z-index: 3; }
        .min-hand { width: 4px; height: 100px; background: rgba(255,255,255,0.7); z-index: 2; }
        .second-hand { width: 2px; height: 110px; background: var(--accent-rose); z-index: 1; }

        .number {
            position: absolute;
            width: 100%; height: 100%;
            text-align: center;
            font-weight: 800;
            font-family: 'Outfit';
            font-size: 1.2rem;
            color: rgba(255,255,255,0.3);
            padding: 10px;
        }

        /* TIMER PROGRESS RING */
        .timer-svg { transform: rotate(-90deg); }
        .timer-circle {
            transition: stroke-dashoffset 1s linear;
            stroke-linecap: round;
        }

        /* EDITABLE AREA */
        .info-area {
            background: transparent;
            border: none;
            width: 100%;
            height: 100%;
            resize: none;
            color: #cbd5e1;
            font-size: 1.4rem;
            line-height: 1.6;
            outline: none;
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .pulse-emerald { animation: pulseE 2s infinite; }
        @keyframes pulseE {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* EDITOR UI */
        .editor-btn {
            @apply w-8 h-8 rounded-lg flex items-center justify-center text-xs transition-all border border-white/5 hover:bg-white/10 hover:border-white/20;
        }
        .editor-btn.active { @apply bg-indigo-600 border-indigo-500 text-white; }

        [contenteditable]:empty:before {
            content: attr(placeholder);
            color: rgba(255,255,255,0.2);
            cursor: text;
        }
    </style>
</head>
<body class="p-8 flex flex-col gap-8">

    <!-- TOP SECTION: DATE & METEO -->
    <header class="flex justify-between items-end">
        <div class="f-up">
            <h1 id="current-date" class="font-display font-extrabold text-5xl tracking-tight text-white mb-2">Dimanche 22 Mars</h1>
            <p class="text-indigo-400 font-bold uppercase tracking-widest text-sm flex items-center gap-2">
                <i class="fas fa-school"></i> 
                Tableau de Bord de Classe · Gilles Cormi EI
            </p>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex bg-black/20 p-1 rounded-2xl border border-white/5 order-2 lg:order-1">
                <button onclick="setTheme('day')" class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-white/10 transition-colors" title="Mode Jour"><i class="fas fa-sun text-amber-400"></i></button>
                <button onclick="setTheme('night')" class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-white/10 transition-colors" title="Mode Nuit"><i class="fas fa-moon text-indigo-400"></i></button>
                <button onclick="setTheme('cyber')" class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-white/10 transition-colors" title="Mode Cyber/Tech"><i class="fas fa-microchip text-emerald-400"></i></button>
            </div>
            
            <div class="glass-card px-8 py-4 flex items-center gap-6 border-indigo-500/30 shadow-indigo-500/20 order-1 lg:order-2">
                <div class="text-right">
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Météo Collège</div>
                    <div class="text-2xl font-bold text-white transition-colors" id="meteo-temp">16°C</div>
                </div>
                <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-amber-400 text-2xl">
                    <i class="fas fa-cloud-sun" id="meteo-icon"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN GRID -->
    <main class="grid grid-cols-12 gap-8 flex-grow">
        
        <!-- LEFT: CLOCK & NOISE (4 cols) -->
        <div class="col-span-4 flex flex-col gap-8">
            
            <!-- HORLOGE -->
            <div class="glass-card p-10 flex flex-col items-center justify-center flex-grow bg-indigo-900/10 border-indigo-500/20">
                <div class="clock-container mb-8">
                    <div class="clock-face w-full h-full relative" id="clock-face">
                        <!-- Numbers generated by JS -->
                    </div>
                    <div class="hand hour-hand" id="hour-hand"></div>
                    <div class="hand min-hand" id="min-hand"></div>
                    <div class="hand second-hand" id="second-hand"></div>
                </div>
                <div id="digital-clock" class="text-4xl font-display font-black text-white tracking-widest opacity-80">17:54:20</div>
            </div>

            <!-- NIVEAU SONORE -->
            <div class="glass-card p-6 border-emerald-500/20">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Consigne Niveau Sonore</span>
                    <i class="fas fa-volume-down text-emerald-400"></i>
                </div>
                <div class="flex gap-2">
                    <button onclick="setNoise('chut')" id="noise-chut" class="flex-grow py-3 rounded-xl border border-white/5 bg-white/5 text-xs font-bold hover:bg-rose-500/20 hover:text-rose-400 transition-all">SILENCE</button>
                    <button onclick="setNoise('murmure')" id="noise-murmure" class="flex-grow py-3 rounded-xl border border-emerald-500/40 bg-emerald-500/20 text-emerald-400 text-xs font-bold pulse-emerald">MURMURE</button>
                    <button onclick="setNoise('libre')" id="noise-libre" class="flex-grow py-3 rounded-xl border border-white/5 bg-white/5 text-xs font-bold hover:bg-amber-500/20 hover:text-amber-400 transition-all">GROUPE</button>
                </div>
            </div>
        </div>

        <!-- RIGHT: INFO & TIMER (8 cols) -->
        <div class="col-span-8 flex flex-col gap-8">
            
            <!-- BLOC NOTES CENTRAL -->
            <div class="glass-card p-10 flex-grow relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-8 opacity-5 group-hover:opacity-20 transition-opacity">
                    <i class="fas fa-pen-nib text-8xl text-white"></i>
                </div>
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center text-slate-900 text-xs shadow-lg shadow-amber-500/40">
                            <i class="fas fa-sticky-note"></i>
                        </div>
                        <span class="text-xs font-bold uppercase tracking-widest text-amber-500">Informations & Travail à faire</span>
                    </div>
                    
                    <!-- TEXT EDITOR TOOLS -->
                    <div class="flex items-center gap-1.5 bg-black/20 p-1 rounded-xl border border-white/5">
                        <button onclick="execCmd('bold')" class="editor-btn" title="Gras"><i class="fas fa-bold"></i></button>
                        <button onclick="execCmd('italic')" class="editor-btn" title="Italique"><i class="fas fa-italic"></i></button>
                        <button onclick="execCmd('underline')" class="editor-btn" title="Souligner"><i class="fas fa-underline"></i></button>
                        <div class="w-px h-4 bg-white/10 mx-1"></div>
                        <button onclick="execCmd('insertUnorderedList')" class="editor-btn" title="Liste"><i class="fas fa-list-ul"></i></button>
                        <button onclick="execCmd('backColor', '#4f46e5')" class="editor-btn text-indigo-400" title="Surligner IDG"><i class="fas fa-highlighter"></i></button>
                    </div>
                </div>
                <!-- CONTENT EDITABLE AREA -->
                <div id="info-board" contenteditable="true" class="info-area overflow-y-auto" placeholder="Tapez ici les consignes, devoirs ou objectifs de la séance..."></div>
            </div>

            <!-- BOTTOM ROW: TIMER & MOT DU JOUR -->
            <div class="grid grid-cols-2 gap-8 h-64">
                
                <!-- TIMER COMPTE A REBOURS -->
                <div class="glass-card p-8 flex items-center gap-8 border-rose-500/20">
                    <div class="relative w-32 h-32 flex-shrink-0">
                        <svg class="timer-svg w-32 h-32">
                            <circle cx="64" cy="64" r="58" fill="transparent" stroke="rgba(255,255,255,0.05)" stroke-width="8"></circle>
                            <circle id="timer-progress" cx="64" cy="64" r="58" fill="transparent" stroke="#f43f5e" stroke-width="8" stroke-dasharray="364.4" stroke-dashoffset="0" class="timer-circle"></circle>
                        </svg>
                        <div id="timer-text" class="absolute inset-0 flex items-center justify-center font-display font-black text-2xl text-white">10:00</div>
                    </div>
                    <div class="flex flex-col gap-2 flex-grow">
                        <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Chronomètre Activité</div>
                        <div class="flex gap-2">
                            <button onclick="startTimer(5)" class="w-full py-2 bg-white/5 rounded-lg text-[10px] font-bold hover:bg-rose-500/20 transition-all">5 MIN</button>
                            <button onclick="startTimer(10)" class="w-full py-2 bg-white/5 rounded-lg text-[10px] font-bold hover:bg-rose-500/20 transition-all">10 MIN</button>
                            <button onclick="startTimer(20)" class="w-full py-2 bg-white/5 rounded-lg text-[10px] font-bold hover:bg-rose-500/20 transition-all">20 MIN</button>
                        </div>
                        <button id="btn-timer-toggle" onclick="toggleTimer()" class="mt-2 w-full py-3 bg-rose-500 text-white rounded-xl font-bold shadow-lg shadow-rose-500/30 text-xs">COMMENCER</button>
                    </div>
                </div>

                <!-- MOT DU JOUR / CITATION -->
                <div class="glass-card p-8 bg-emerald-500/5 border-emerald-500/20 flex flex-col justify-center">
                    <div class="flex items-center gap-2 mb-4">
                        <i class="fas fa-lightbulb text-emerald-400 text-sm"></i>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-emerald-500/60">Le Mot / La Pensée du Jour</span>
                    </div>
                    <blockquote id="quote-text" class="text-xl font-display font-semibold italic text-slate-300 leading-snug">
                        "Celui qui ne se trompe jamais est celui qui n'a jamais rien tenté."
                    </blockquote>
                    <cite class="mt-4 text-[10px] font-bold text-emerald-500 uppercase tracking-widest not-italic block">— Albert Einstein</cite>
                </div>
            </div>

        </div>
    </main>

    <script>
        // --- HORLOGE ---
        const clockFace = document.getElementById('clock-face');
        for (let i = 1; i <= 12; i++) {
            const div = document.createElement('div');
            div.className = 'number';
            div.style.transform = `rotate(${i * 30}deg)`;
            div.innerHTML = `<span style="display:inline-block; transform:rotate(-${i * 30}deg)">${i}</span>`;
            clockFace.appendChild(div);
        }

        function updateClock() {
            const now = new Date();
            const sec = now.getSeconds();
            const min = now.getMinutes();
            const hour = now.getHours();

            document.getElementById('second-hand').style.transform = `translateX(-50%) rotate(${sec * 6}deg)`;
            document.getElementById('min-hand').style.transform = `translateX(-50%) rotate(${min * 6 + sec * 0.1}deg)`;
            document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${hour * 30 + min * 0.5}deg)`;

            document.getElementById('digital-clock').innerText = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- DATE ---
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('fr-FR', options);

        // --- TIMER ---
        let timerSeconds = 600;
        let initialSeconds = 600;
        let timerActive = false;
        let timerInterval = null;
        const dashArray = 364.4;

        function updateTimerUI() {
            const m = Math.floor(timerSeconds / 60);
            const s = timerSeconds % 60;
            document.getElementById('timer-text').innerText = `${m}:${s.toString().padStart(2, '0')}`;
            
            const offset = dashArray - (timerSeconds / initialSeconds) * dashArray;
            document.getElementById('timer-progress').style.strokeDashoffset = offset;
        }

        function startTimer(min) {
            clearInterval(timerInterval);
            timerSeconds = min * 60;
            initialSeconds = timerSeconds;
            timerActive = true;
            updateTimerUI();
            document.getElementById('btn-timer-toggle').innerText = "ARRÊTER";
            
            timerInterval = setInterval(() => {
                if(timerSeconds > 0) {
                    timerSeconds--;
                    updateTimerUI();
                } else {
                    clearInterval(timerInterval);
                    timerActive = false;
                    document.getElementById('btn-timer-toggle').innerText = "FINI !";
                    // Petit effet sonore discret possible ici
                }
            }, 1000);
        }

        function toggleTimer() {
            if (timerActive) {
                clearInterval(timerInterval);
                timerActive = false;
                document.getElementById('btn-timer-toggle').innerText = "REPRENDRE";
            } else {
                startTimer(timerSeconds / 60);
            }
        }

        // --- NIVEAU SONORE ---
        function setNoise(mode) {
            const btnChut = document.getElementById('noise-chut');
            const btnMurmure = document.getElementById('noise-murmure');
            const btnLibre = document.getElementById('noise-libre');

            [btnChut, btnMurmure, btnLibre].forEach(b => {
                b.className = "flex-grow py-3 rounded-xl border border-white/5 bg-white/5 text-xs font-bold transition-all";
            });

            if(mode === 'chut') {
                btnChut.className = "flex-grow py-3 rounded-xl border border-rose-500/40 bg-rose-500/20 text-rose-400 text-xs font-bold pulse-rose";
            } else if(mode === 'murmure') {
                btnMurmure.className = "flex-grow py-3 rounded-xl border border-emerald-500/40 bg-emerald-500/20 text-emerald-400 text-xs font-bold pulse-emerald";
            } else {
                btnLibre.className = "flex-grow py-3 rounded-xl border border-amber-500/40 bg-amber-500/20 text-amber-400 text-xs font-bold pulse-amber";
            }
        }

        // --- SAUVEGARDE AUTO DU BLOC NOTES ---
        const infoBoard = document.getElementById('info-board');
        infoBoard.innerHTML = localStorage.getItem('classe_info_board_html') || "";
        
        infoBoard.addEventListener('input', () => {
            localStorage.setItem('classe_info_board_html', infoBoard.innerHTML);
        });

        function execCmd(cmd, value = null) {
            document.execCommand(cmd, false, value);
            infoBoard.focus();
        }

        // --- QUOTES (SCIENCE & TECH SPECIAL) ---
        const quotes = [
            { t: "La technologie, c'est l'art d'organiser le monde pour que nous n'ayons pas à le subir.", a: "Max Frisch", c: "tech" },
            { t: "Innover, ce n'est pas avoir une nouvelle idée, c'est arrêter d'avoir une vieille idée.", a: "Edwin Land", c: "tech" },
            { t: "La meilleure façon de prédire l'avenir, c'est de l'inventer.", a: "Alan Kay", c: "tech" },
            { t: "Le génie est 1% d'inspiration et 99% de transpiration.", a: "Thomas Edison", c: "tech" },
            { t: "Simplicité est la sophistication suprême.", a: "Léonard de Vinci", c: "tech" },
            { t: "Toute technologie suffisamment avancée est indiscernable de la magie.", a: "Arthur C. Clarke", c: "tech" },
            { t: "L'innovation distingue un leader d'un suiveur.", a: "Steve Jobs", c: "tech" },
            { t: "Vos clients les plus mécontents sont votre plus grande source d'apprentissage.", a: "Bill Gates", c: "tech" },
            { t: "Le présent est à eux ; le futur, pour lequel j'ai réellement travaillé, est à moi.", a: "Nikola Tesla", c: "tech" },
            { t: "Je n'ai pas échoué. J'ai simplement trouvé 10 000 solutions qui ne fonctionnent pas.", a: "Thomas Edison", c: "tech" },
            { t: "L'ingénieur est un homme qui sait faire avec un euro ce que n'importe quel imbécile saurait faire avec deux.", a: "Arthur M. Wellington", c: "tech" },
            { t: "C'est en forgeant qu'on devient forgeron.", a: "Proverbe Français", c: "tech" },
            { t: "Les obstacles sont ces choses effrayantes que vous voyez quand vous quittez vos yeux de votre objectif.", a: "Henry Ford", c: "tech" },
            { t: "Rien ne se perd, rien ne se crée, tout se transforme.", a: "Antoine Lavoisier", c: "sci" },
            { t: "Dans la vie, rien n'est à craindre, tout est à comprendre.", a: "Marie Curie", c: "sci" },
            { t: "L'imagination est plus importante que le savoir.", a: "Albert Einstein", c: "sci" },
            { t: "Ce que nous savons est une goutte d'eau, ce que nous ignorons est l'océan.", a: "Isaac Newton", c: "sci" },
            { t: "Quelque part, quelque chose d'incroyable attend d'être connu.", a: "Carl Sagan", c: "sci" },
            { t: "On ne force pas la curiosité, on l'éveille.", a: "Daniel Pennac", c: "sci" },
            { t: "La science sans conscience n'est que ruine de l'âme.", a: "Rabelais", c: "sci" },
            { t: "On ne peut pas apprendre à un homme quoi que ce soit, on peut seulement l'aider à le trouver en lui.", a: "Galilée", c: "sci" },
            { t: "La science est la clé qui ouvre les portes du futur.", a: "Anonyme", c: "sci" },
            { t: "L'univers est plein de choses magiques qui attendent patiemment que nos esprits s'aiguisent.", a: "Eden Phillpotts", c: "sci" },
            { t: "La plus haute forme de recherche est de jouer.", a: "Albert Einstein", c: "sci" },
            { t: "Si j'ai vu plus loin, c'est en montant sur les épaules de géants.", a: "Isaac Newton", c: "sci" },
            { t: "L'éducation est l'arme la plus puissante pour changer le monde.", a: "Nelson Mandela", c: "gen" },
            { t: "L'important n'est pas de ne jamais tomber, mais de se relever à chaque fois.", a: "Confucius", c: "gen" },
            { t: "Ceux qui ne peuvent pas changer d'avis ne peuvent rien changer du tout.", a: "George Bernard Shaw", c: "gen" },
            { t: "Là où il y a une volonté, il y a un chemin.", a: "Lao Tseu", c: "gen" },
            { t: "Le plaisir le plus délicat est de faire plaisir aux autres.", a: "Jean de La Bruyère", c: "gen" },
            { t: "Le doute est le commencement de la sagesse.", a: "Aristote", c: "gen" },
            { t: "Le succès, c'est d'aller d'échec en échec sans perdre son enthousiasme.", a: "Winston Churchill", c: "gen" },
            { t: "L'intelligence, c'est la faculté d'adaptation au changement.", a: "Stephen Hawking", c: "sci" },
            { t: "Le futur appartient à ceux qui croient à la beauté de leurs rêves.", a: "Eleanor Roosevelt", c: "gen" },
            { t: "La logique vous mènera d'un point A à un point B. L'imagination vous mènera partout.", a: "Albert Einstein", c: "sci" },
            { t: "Une personne qui n'a jamais commis d'erreur n'a jamais tenté d'innover.", a: "Albert Einstein", c: "gen" },
            { t: "Tout ce qui est techniquement possible finit par arriver.", a: "Anonyme", c: "tech" },
            { t: "L'informatique n'est pas plus la science des ordinateurs que l'astronomie n'est celle des télescopes.", a: "Edsger Dijkstra", c: "tech" },
            { t: "Les machines devraient travailler, les gens devraient penser.", a: "IBM", c: "tech" },
            { t: "La connaissance s’acquiert par l’expérience, tout le reste n’est que de l’information.", a: "Albert Einstein", c: "sci" },
            { t: "Savoir écouter, c'est posséder, outre le sien, le cerveau des autres.", a: "Léonard de Vinci", c: "gen" },
            { t: "Le dessin est la sincérité de l'art.", a: "Jean-Auguste-Dominique Ingres", c: "gen" },
            { t: "Le but de l'éducation est de transformer un esprit vide en un esprit ouvert.", a: "Malcolm Forbes", c: "gen" },
            { t: "La créativité, c'est l'intelligence qui s'amuse.", a: "Albert Einstein", c: "gen" },
            { t: "Celui qui demande est un idiot pendant cinq minutes, celui qui ne demande pas reste un idiot pour toujours.", a: "Proverbe Chinois", c: "gen" },
            { t: "On n'apprend pas à marcher en suivant des règles. On apprend en faisant et en tombant.", a: "Richard Branson", c: "gen" },
            { t: "La vie est un mystère qu'il faut vivre, et non un problème à résoudre.", a: "Gandhi", c: "gen" },
            { t: "Chaque difficulté rencontrée doit être l'occasion d'un nouveau progrès.", a: "Pierre de Coubertin", c: "gen" },
            { t: "Rien n'est permanent, sauf le changement.", a: "Héraclite", c: "sci" },
            { t: "La simplicité est la sophistication suprême.", a: "Léonard de Vinci", c: "gen" }
        ];

        function loadRandomQuote() {
            const q = quotes[Math.floor(Math.random() * quotes.length)];
            const quoteEl = document.getElementById('quote-text');
            const citeEl = document.querySelector('cite');
            const tagContainer = document.querySelector('.uppercase.tracking-widest.text-emerald-500\\/60');
            
            if (quoteEl) quoteEl.innerText = `"${q.t}"`;
            if (citeEl) citeEl.innerText = `— ${q.a}`;
            if (tagContainer) {
                const tag = q.c === 'tech' ? 'Ingénierie & Innovation' : (q.c === 'sci' ? 'Sciences & Découverte' : 'Sagesse & Réflexion');
                tagContainer.innerText = tag;
            }
        }

        // --- THEMES ---
        function setTheme(theme) {
            document.body.className = `p-8 flex flex-col gap-8 theme-${theme}`;
            localStorage.setItem('classe-theme', theme);
        }
        setTheme(localStorage.getItem('classe-theme') || 'night');

        loadRandomQuote();
        setInterval(loadRandomQuote, 1500000); // 25 minutes
    </script>
</body>
</html>
