<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord de Classe | Gilles Cormi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-glass: rgba(30, 41, 59, 0.7);
            --accent-indigo: #6366f1;
            --accent-rose: #f43f5e;
            --clock-hands: #ffffff;
        }

        html, body { height: 100%; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
            overflow: hidden;
            height: 100vh;
            box-sizing: border-box;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        body.theme-night { background: #020617; background-image: radial-gradient(at 0% 0%, rgba(30,58,138,0.4) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(15,23,42,0.4) 0px, transparent 50%); --card-glass: rgba(15,23,42,0.8); }
        body.theme-day   { background: #f8fafc; color: #1e293b; --card-glass: rgba(255,255,255,0.9); }
        body.theme-sky   { background: linear-gradient(135deg,#e0f2fe,#bae6fd); color: #0c4a6e; --card-glass: rgba(255,255,255,0.88); }
        body.theme-mint  { background: linear-gradient(135deg,#dcfce7,#bbf7d0); color: #064e3b; --card-glass: rgba(255,255,255,0.9); }
        body.theme-cyber { background: #050505; --card-glass: rgba(0,0,0,0.85); }

        body.theme-day  #current-date, body.theme-day  #digital-clock  { color: #0f172a; }
        body.theme-sky  #current-date, body.theme-sky  #digital-clock  { color: #0c4a6e; }
        body.theme-mint #current-date, body.theme-mint #digital-clock  { color: #064e3b; }

        /* Citation lisible sur thèmes clairs */
        body.theme-day blockquote, body.theme-day cite,
        body.theme-sky blockquote, body.theme-sky cite,
        body.theme-mint blockquote, body.theme-mint cite { color: #111827 !important; }
        body.theme-day .info-area  { color: #1e293b; }
        body.theme-sky .info-area  { color: #0c4a6e; }
        body.theme-mint .info-area { color: #064e3b; }

        body.theme-day  .hour-hand,body.theme-sky .hour-hand,body.theme-mint .hour-hand { background: #1e293b; }
        body.theme-day  .min-hand, body.theme-sky .min-hand, body.theme-mint .min-hand  { background: #64748b; }

        .font-display { font-family: 'Outfit', sans-serif; }

        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.4);
        }

        /* CLOCK */
        .clock-container {
            width: 200px; height: 200px;
            border-radius: 50%;
            background: rgba(15,23,42,0.8);
            border: 3px solid rgba(255,255,255,0.08);
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.4), 0 0 40px rgba(99,102,241,0.15);
        }
        .clock-face::after { content:''; position:absolute; width:10px; height:10px; background:#fff; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10; }
        .hand { position:absolute; bottom:50%; left:50%; transform-origin:bottom; border-radius:10px; transform:translateX(-50%); }
        .hour-hand   { width:5px; height:60px; background:var(--clock-hands); z-index:3; }
        .min-hand    { width:3px; height:85px; background:var(--clock-hands); opacity:.8; z-index:2; }
        .second-hand { width:2px; height:95px; background:var(--accent-rose); z-index:1; }
        .clock-num   { position:absolute; width:100%; height:100%; text-align:center; font-family:'Outfit'; font-weight:800; font-size:1rem; color:rgba(255,255,255,0.25); padding:8px; }

        /* EDITOR AREA */
        .info-area {
            flex: 1;
            width: 100%;
            min-height: 0;
            overflow-y: auto;
            background: transparent;
            border: none;
            outline: none;
            cursor: text;
            font-size: 2rem;
            line-height: 1.4;
        }

        .editor-btn {
            display: flex; align-items: center; justify-content: center;
            padding: 0.25rem 0.5rem;
            min-width: 2rem; height: 2rem;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            transition: all 0.15s;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.75rem;
        }
        .editor-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }

        .theme-btn {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid transparent; transition: all 0.2s;
        }
        .theme-btn.active { border-color: var(--accent-indigo); }

        @keyframes pulseR { 0%{box-shadow:0 0 0 0 rgba(244,63,94,.4)} 70%{box-shadow:0 0 0 12px rgba(244,63,94,0)} 100%{box-shadow:0 0 0 0 rgba(244,63,94,0)} }
        @keyframes pulseG { 0%{box-shadow:0 0 0 0 rgba(16,185,129,.4)} 70%{box-shadow:0 0 0 12px rgba(16,185,129,0)} 100%{box-shadow:0 0 0 0 rgba(16,185,129,0)} }
        @keyframes pulseA { 0%{box-shadow:0 0 0 0 rgba(245,158,11,.4)} 70%{box-shadow:0 0 0 12px rgba(245,158,11,0)} 100%{box-shadow:0 0 0 0 rgba(245,158,11,0)} }

        [contenteditable]:empty::before { content: attr(placeholder); color: rgba(255,255,255,0.18); font-style: italic; pointer-events: none; }
    </style>
</head>
<body class="theme-night">

    <!-- HEADER -->
    <header class="flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <h1 id="current-date" class="font-display text-2xl font-extrabold text-white uppercase tracking-tight">---</h1>
            <div id="digital-clock" class="text-2xl font-mono font-bold text-slate-400">00:00:00</div>
        </div>

        <div class="glass-card px-3 py-1.5 flex items-center gap-2">
            <button onclick="setTheme('night')" id="btn-night" class="theme-btn bg-slate-900   text-indigo-400 active"><i class="fas fa-moon"></i></button>
            <button onclick="setTheme('day')"   id="btn-day"   class="theme-btn bg-white       text-amber-500"><i class="fas fa-sun"></i></button>
            <button onclick="setTheme('sky')"   id="btn-sky"   class="theme-btn bg-sky-100     text-sky-600"><i class="fas fa-cloud-sun"></i></button>
            <button onclick="setTheme('mint')"  id="btn-mint"  class="theme-btn bg-emerald-50  text-emerald-600"><i class="fas fa-leaf"></i></button>
            <button onclick="setTheme('cyber')" id="btn-cyber" class="theme-btn bg-black       text-indigo-400"><i class="fas fa-microchip"></i></button>
        </div>

        <div class="glass-card px-5 py-2 flex items-center gap-4">
            <div class="flex flex-col items-center">
                <i id="meteo-icon" class="fas fa-sun text-amber-400 text-2xl"></i>
                <span class="text-[9px] font-bold uppercase text-amber-400/70 tracking-wider mt-0.5">Ciel clair</span>
            </div>
            <div class="w-px h-8 bg-white/10"></div>
            <div class="flex flex-col">
                <span id="meteo-temp" class="font-display text-2xl font-extrabold leading-none">22°C</span>
                <span class="text-[10px] font-bold uppercase tracking-widest text-emerald-400">Bastia</span>
            </div>
            <div class="w-px h-8 bg-white/10"></div>
            <div class="flex flex-col gap-0.5 text-[10px] text-slate-400 font-medium">
                <span><i class="fas fa-wind mr-1 text-sky-400"></i>15 km/h</span>
                <span><i class="fas fa-droplet mr-1 text-blue-400"></i>62%</span>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="flex-1 grid grid-cols-12 gap-6 min-h-0">

        <!-- GAUCHE: horloge + bruit -->
        <div class="col-span-3 flex flex-col gap-6 min-h-0">

            <div class="glass-card p-6 flex flex-col items-center justify-center gap-4 flex-1">
                <div class="clock-container">
                    <div class="clock-face h-full w-full">
                        <div id="hour" class="hand hour-hand"></div>
                        <div id="min"  class="hand min-hand"></div>
                        <div id="sec"  class="hand second-hand"></div>
                        <div class="clock-num" style="transform:rotate(30deg)"><span  style="display:block;transform:rotate(-30deg)">1</span></div>
                        <div class="clock-num" style="transform:rotate(60deg)"><span  style="display:block;transform:rotate(-60deg)">2</span></div>
                        <div class="clock-num" style="transform:rotate(90deg)"><span  style="display:block;transform:rotate(-90deg)">3</span></div>
                        <div class="clock-num" style="transform:rotate(120deg)"><span style="display:block;transform:rotate(-120deg)">4</span></div>
                        <div class="clock-num" style="transform:rotate(150deg)"><span style="display:block;transform:rotate(-150deg)">5</span></div>
                        <div class="clock-num" style="transform:rotate(180deg)"><span style="display:block;transform:rotate(-180deg)">6</span></div>
                        <div class="clock-num" style="transform:rotate(210deg)"><span style="display:block;transform:rotate(-210deg)">7</span></div>
                        <div class="clock-num" style="transform:rotate(240deg)"><span style="display:block;transform:rotate(-240deg)">8</span></div>
                        <div class="clock-num" style="transform:rotate(270deg)"><span style="display:block;transform:rotate(-270deg)">9</span></div>
                        <div class="clock-num" style="transform:rotate(300deg)"><span style="display:block;transform:rotate(-300deg)">10</span></div>
                        <div class="clock-num" style="transform:rotate(330deg)"><span style="display:block;transform:rotate(-330deg)">11</span></div>
                        <div class="clock-num" style="transform:rotate(360deg)"><span style="display:block;transform:rotate(-360deg)">12</span></div>
                    </div>
                </div>
                <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Temps réel scolaire</p>
            </div>

            <div class="glass-card p-6 shrink-0">
                <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-rose-500 inline-block animate-pulse"></span>
                    Niveau Sonore
                </p>
                <div class="flex gap-2">
                    <button onclick="setNoise('chut')"    id="noise-chut"    class="flex-1 py-3 rounded-xl bg-rose-500/20    text-rose-400    border border-rose-500/30    text-xs font-bold" style="animation:pulseR 2s infinite">SILENCE</button>
                    <button onclick="setNoise('murmure')" id="noise-murmure" class="flex-1 py-3 rounded-xl bg-white/5        text-slate-400   border border-white/5        text-xs font-bold">MURMURE</button>
                    <button onclick="setNoise('libre')"   id="noise-libre"   class="flex-1 py-3 rounded-xl bg-white/5        text-slate-400   border border-white/5        text-xs font-bold">GROUPE</button>
                </div>
            </div>

        </div>

        <!-- DROITE: éditeur + timer + citation -->
        <div class="col-span-9 flex flex-col gap-6 min-h-0">

            <!-- ÉDITEUR -->
            <div class="glass-card p-6 flex flex-col flex-1 min-h-0">
                <!-- Barre d'outils -->
                <div class="flex items-center gap-1 flex-wrap mb-4 bg-black/20 p-2 rounded-xl border border-white/5 shrink-0">
                    <!-- Format -->
                    <button onmousedown="event.preventDefault(); applyFormat('bold')"          class="editor-btn font-black">B</button>
                    <button onmousedown="event.preventDefault(); applyFormat('underline')"     class="editor-btn underline">U</button>
                    <button onmousedown="event.preventDefault(); applyFormat('italic')"        class="editor-btn italic">I</button>
                    <div class="w-px h-5 bg-white/10 mx-1"></div>
                    <!-- Tailles -->
                    <button onmousedown="event.preventDefault(); applyFontSize('normal')"   class="editor-btn">Normal</button>
                    <button onmousedown="event.preventDefault(); applyFontSize('grand')"    class="editor-btn font-bold">Grand</button>
                    <button onmousedown="event.preventDefault(); applyFontSize('xxl')"      class="editor-btn font-black" style="font-size:1.1rem">XXL</button>
                    <button onmousedown="event.preventDefault(); applyFontSize('giga')"     class="editor-btn font-black text-rose-400" style="font-size:1.4rem">GIGA</button>
                    <div class="w-px h-5 bg-white/10 mx-1"></div>
                    <!-- Couleurs de texte -->
                    <button onmousedown="event.preventDefault(); applyColor('text','#f1f5f9')" class="w-5 h-5 rounded-full border-2 border-white/40 bg-white shrink-0"   title="Blanc"></button>
                    <button onmousedown="event.preventDefault(); applyColor('text','#ef4444')" class="w-5 h-5 rounded-full bg-red-500 shrink-0"   title="Rouge"></button>
                    <button onmousedown="event.preventDefault(); applyColor('text','#3b82f6')" class="w-5 h-5 rounded-full bg-blue-500 shrink-0"  title="Bleu"></button>
                    <button onmousedown="event.preventDefault(); applyColor('text','#22c55e')" class="w-5 h-5 rounded-full bg-green-500 shrink-0" title="Vert"></button>
                    <div class="w-px h-5 bg-white/10 mx-1"></div>
                    <!-- Surlignage -->
                    <button onmousedown="event.preventDefault(); applyColor('bg','#fbbf24')"   class="editor-btn text-amber-400" title="Surligner Jaune"><i class="fas fa-highlighter"></i></button>
                    <button onmousedown="event.preventDefault(); applyColor('bg','transparent')" class="editor-btn" title="Enlever surlignage"><i class="fas fa-eraser"></i></button>
                    <div class="w-px h-5 bg-white/10 mx-1"></div>
                    <button onmousedown="event.preventDefault(); applyFormat('insertUnorderedList')" class="editor-btn"><i class="fas fa-list-ul"></i></button>
                </div>

                <!-- Zone de texte éditable -->
                <div
                    id="info-board"
                    contenteditable="true"
                    class="info-area"
                    placeholder="Tapez ici les consignes, devoirs ou objectifs de la séance..."
                ></div>
            </div>

            <!-- BAS: Timer + Citation -->
            <div class="grid grid-cols-2 gap-6 shrink-0" style="height:170px">

                <!-- TIMER -->
                <div class="glass-card p-5 flex items-center gap-5">
                    <div class="relative shrink-0" style="width:100px;height:100px">
                        <svg width="100" height="100" style="transform:rotate(-90deg)">
                            <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="7"/>
                            <circle id="timer-ring" cx="50" cy="50" r="44" fill="none" stroke="#f43f5e" stroke-width="7" stroke-dasharray="276.5" stroke-dashoffset="0" style="transition:stroke-dashoffset 1s linear"/>
                        </svg>
                        <div id="timer-label" class="absolute inset-0 flex items-center justify-center text-sm font-bold">5:00</div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <div class="flex items-center gap-2">
                            <input id="timer-input" type="number" value="5" min="1" max="99"
                                class="w-14 bg-white/5 border border-white/10 rounded-lg px-2 py-1 text-xl font-bold text-white outline-none">
                            <span class="text-[10px] font-bold text-slate-500">MIN</span>
                        </div>
                        <div class="flex gap-2">
                            <button id="timer-btn" onclick="toggleTimer()" class="bg-rose-500 hover:bg-rose-600 text-white text-xs font-bold py-2 px-4 rounded-xl transition-all">DÉMARRER</button>
                            <button onclick="resetTimer()" class="w-9 bg-white/5 hover:bg-white/10 rounded-xl flex items-center justify-center text-xs text-slate-400"><i class="fas fa-undo"></i></button>
                        </div>
                    </div>
                </div>

                <!-- CITATION -->
                <div class="glass-card p-5 flex flex-col justify-center gap-2">
                    <i class="fas fa-quote-left text-indigo-500 text-sm"></i>
                    <blockquote class="text-base font-medium italic text-slate-200">"Enseigner, ce n'est pas remplir un vase, c'est allumer un feu."</blockquote>
                    <cite class="text-[10px] font-bold text-indigo-400">— Michel de Montaigne</cite>
                </div>

            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="shrink-0 flex items-center justify-between text-[10px] font-bold uppercase tracking-widest text-slate-600">
        <span>© 2026 Gilles Cormi — Tableau de Bord Pédagogique</span>
        <div class="flex items-center gap-4">
            <span class="text-indigo-400">Bastia | Session Active</span>
        </div>
    </footer>

    <script>
    // =====================
    // HORLOGE
    // =====================
    function updateClock() {
        const now = new Date();
        const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
        document.getElementById('hour').style.transform = `translateX(-50%) rotate(${(h%12)*30+(m/60)*30}deg)`;
        document.getElementById('min').style.transform  = `translateX(-50%) rotate(${m*6}deg)`;
        document.getElementById('sec').style.transform  = `translateX(-50%) rotate(${s*6}deg)`;
        document.getElementById('digital-clock').textContent = now.toLocaleTimeString('fr-FR');
        document.getElementById('current-date').textContent  = now.toLocaleDateString('fr-FR', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
    }
    setInterval(updateClock, 1000); updateClock();

    // =====================
    // THEMES
    // =====================
    function setTheme(t) {
        document.body.className = 'theme-' + t;
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + t).classList.add('active');
        localStorage.setItem('classe_theme', t);
    }
    setTheme(localStorage.getItem('classe_theme') || 'night');

    // =====================
    // NIVEAU SONORE
    // =====================
    function setNoise(mode) {
        const btns = { chut:'noise-chut', murmure:'noise-murmure', libre:'noise-libre' };
        Object.entries(btns).forEach(([k,id]) => {
            const el = document.getElementById(id);
            el.className = 'flex-1 py-3 rounded-xl bg-white/5 text-slate-400 border border-white/5 text-xs font-bold';
            el.style.animation = '';
        });
        const map = {
            chut:    ['noise-chut',    'bg-rose-500/20',    'text-rose-400',    'border-rose-500/30',    'pulseR 2s infinite'],
            murmure: ['noise-murmure', 'bg-emerald-500/20', 'text-emerald-400', 'border-emerald-500/30', 'pulseG 2s infinite'],
            libre:   ['noise-libre',   'bg-amber-500/20',   'text-amber-400',   'border-amber-500/30',   'pulseA 2s infinite'],
        };
        const [id, bg, tc, bc, anim] = map[mode];
        const el = document.getElementById(id);
        el.className = `flex-1 py-3 rounded-xl ${bg} ${tc} border ${bc} text-xs font-bold`;
        el.style.animation = anim;
    }

    // =====================
    // TIMER
    // =====================
    let timerInterval = null, timeLeft = null, originalTime = null;

    function updateTimerDisplay() {
        const min = Math.floor(timeLeft / 60).toString().padStart(2,'0');
        const sec = (timeLeft % 60).toString().padStart(2,'0');
        document.getElementById('timer-label').textContent = min + ':' + sec;
        const offset = 276.5 - (timeLeft / originalTime) * 276.5;
        document.getElementById('timer-ring').style.strokeDashoffset = offset;
    }

    function toggleTimer() {
        const btn = document.getElementById('timer-btn');
        if (timerInterval) {
            clearInterval(timerInterval); timerInterval = null;
            btn.textContent = 'REPRENDRE';
            return;
        }
        if (!timeLeft) {
            timeLeft = parseInt(document.getElementById('timer-input').value) * 60;
            originalTime = timeLeft;
        }
        btn.textContent = 'PAUSE';
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval); timerInterval = null;
                btn.textContent = 'TERMINÉ !';
                try { new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play(); } catch(e){}
            }
        }, 1000);
    }

    function resetTimer() {
        clearInterval(timerInterval); timerInterval = null; timeLeft = null;
        document.getElementById('timer-btn').textContent = 'DÉMARRER';
        document.getElementById('timer-ring').style.strokeDashoffset = 0;
        const v = document.getElementById('timer-input').value;
        document.getElementById('timer-label').textContent = v + ':00';
    }

    // =====================
    // EDITEUR DE TEXTE
    // =====================
    const board = document.getElementById('info-board');

    // Restore saved content
    board.innerHTML = localStorage.getItem('classe_info_board_html') || '';

    // Auto-save on change
    board.addEventListener('input', () => localStorage.setItem('classe_info_board_html', board.innerHTML));

    // Saved selection before button clicks
    let savedRange = null;

    board.addEventListener('mouseup', saveSelection);
    board.addEventListener('keyup',   saveSelection);
    board.addEventListener('blur',    saveSelection);

    function saveSelection() {
        const sel = window.getSelection();
        if (sel && sel.rangeCount > 0 && board.contains(sel.anchorNode)) {
            savedRange = sel.getRangeAt(0).cloneRange();
        }
    }

    function restoreSelection() {
        if (!savedRange) { board.focus(); return; }
        board.focus();
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(savedRange);
    }

    // ---- Apply formatting (bold, italic, underline, lists) ----
    function applyFormat(cmd) {
        restoreSelection();
        document.execCommand('styleWithCSS', false, true);
        document.execCommand(cmd, false, null);
        savedRange = null;
        localStorage.setItem('classe_info_board_html', board.innerHTML);
    }

    // ---- Apply color (text or background) to selection ----
    function applyColor(type, color) {
        restoreSelection();
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0 || sel.isCollapsed) {
            board.focus();
            return;
        }
        const range = sel.getRangeAt(0);
        const span = document.createElement('span');
        if (type === 'text') {
            span.style.color = color;
        } else {
            span.style.backgroundColor = color === 'transparent' ? '' : color;
        }
        // Surround selection
        try {
            range.surroundContents(span);
        } catch(e) {
            // If surroundContents fails (partial selection crossing tags), use extractContents
            const frag = range.extractContents();
            span.appendChild(frag);
            range.insertNode(span);
        }
        sel.removeAllRanges();
        savedRange = null;
        localStorage.setItem('classe_info_board_html', board.innerHTML);
    }

    // ---- Apply font size to selection or whole board ----
    function applyFontSize(size) {
        const fontSizes = { normal: '2rem', grand: '3.5rem', xxl: '5.5rem', giga: '8.5rem' };
        const sel = window.getSelection();
        const hasSelection = sel && !sel.isCollapsed && savedRange && board.contains(savedRange.commonAncestorContainer);

        if (hasSelection) {
            restoreSelection();
            const range = sel.getRangeAt(0);
            const span = document.createElement('span');
            span.style.fontSize = fontSizes[size];
            try {
                range.surroundContents(span);
            } catch(e) {
                const frag = range.extractContents();
                span.appendChild(frag);
                range.insertNode(span);
            }
            sel.removeAllRanges();
            savedRange = null;
        } else {
            board.style.fontSize = fontSizes[size];
            localStorage.setItem('classe_font_size', size);
        }
        localStorage.setItem('classe_info_board_html', board.innerHTML);
    }

    // Restore font size
    const savedFs = localStorage.getItem('classe_font_size');
    const fsSizes = { normal: '2rem', grand: '3.5rem', xxl: '5.5rem', giga: '8.5rem' };
    board.style.fontSize = fsSizes[savedFs] || '2rem';

    </script>
</body>
</html>
