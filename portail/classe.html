<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord de Classe | Gilles Cormi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --card-glass: rgba(30, 41, 59, 0.7);
            --accent-indigo: #6366f1;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;
            --clock-hands: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            gap: 2rem;
        }

        /* THEMES */
        body.theme-night { background-color: #020617; background-image: radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.4) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(15, 23, 42, 0.4) 0px, transparent 50%); --card-glass: rgba(15, 23, 42, 0.7); }
        body.theme-day { background-color: #f8fafc; color: #1e293b; --card-glass: rgba(255, 255, 255, 0.85); }
        body.theme-day #current-date { color: #0f172a; }
        body.theme-day #digital-clock, body.theme-day blockquote, body.theme-day .info-area { color: #334155; }
        body.theme-day .clock-container { background: #fff; border-color: #f1f5f9; }
        body.theme-day .hour-hand { background: #1e293b; }
        body.theme-day .min-hand { background: #94a3b8; }

        body.theme-sky { background-color: #f0f9ff; background-image: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); color: #000; --card-glass: rgba(255, 255, 255, 0.9); }
        body.theme-mint { background-color: #f0fdf4; background-image: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); color: #000; --card-glass: rgba(255, 255, 255, 0.92); }
        body.theme-cyber { background-color: #050505; --card-glass: rgba(0, 0, 0, 0.8); }

        .font-display { font-family: 'Outfit', sans-serif; }
        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        /* CLOCK & TIMER SIZE ADJUSTMENTS FOR FOOTER VISIBILITY */
        .clock-container {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.8);
            border: 6px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }
        .clock-face::after { content: ''; position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; transform: translateX(-50%); }
        .hour-hand { width: 5px; height: 50px; background: var(--clock-hands); z-index: 3; }
        .min-hand { width: 3px; height: 75px; background: var(--clock-hands); opacity: 0.8; z-index: 2; }
        .second-hand { width: 1px; height: 85px; background: var(--accent-rose); z-index: 1; }

        .info-area {
            background: transparent;
            border: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            color: inherit;
            line-height: 1.4;
            outline: none;
            cursor: text;
        }

        /* Force color/bg-color because Tailwind/Theme might conflict */
        .info-area * {
            color: inherit;
        }
        .info-area span[style*="color"], .info-area font[color] {
            color: revert !important;
        }
        .info-area span[style*="background-color"], .info-area mark {
            background-color: revert !important;
            color: #000 !important;
        }

        .editor-btn {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            transition: all 0.2s;
        }
        .editor-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }

        .theme-btn { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; border: 2px solid transparent; }
        .theme-btn.active { border-color: var(--accent-indigo); }

        .pulse-emerald { animation: pulseE 2s infinite; }
        @keyframes pulseE { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .pulse-rose { animation: pulseR 2s infinite; }
        @keyframes pulseR { 0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); } }
    </style>
</head>
<body class="theme-night">

    <!-- HEADER -->
    <header class="flex items-center justify-between shrink-0">
        <div class="flex items-center gap-6">
            <h1 id="current-date" class="text-3xl font-display font-extrabold text-white uppercase">---</h1>
            <div id="digital-clock" class="text-3xl font-mono font-bold text-slate-400">00:00:00</div>
        </div>

        <div class="glass-card px-4 py-2 flex items-center gap-2">
            <button onclick="setTheme('night')" id="btn-night" class="theme-btn bg-slate-900 text-indigo-400 active"><i class="fas fa-moon"></i></button>
            <button onclick="setTheme('day')" id="btn-day" class="theme-btn bg-white text-amber-500"><i class="fas fa-sun"></i></button>
            <button onclick="setTheme('sky')" id="btn-sky" class="theme-btn bg-sky-100 text-sky-600"><i class="fas fa-cloud-sun"></i></button>
            <button onclick="setTheme('mint')" id="btn-mint" class="theme-btn bg-emerald-50 text-emerald-600"><i class="fas fa-leaf"></i></button>
            <button onclick="setTheme('cyber')" id="btn-cyber" class="theme-btn bg-black text-indigo-500"><i class="fas fa-microchip"></i></button>
        </div>

        <div class="glass-card px-6 py-3 flex items-center gap-4">
            <span id="meteo-temp" class="text-2xl font-display font-extrabold">22°C</span>
            <span class="text-sm font-bold uppercase text-emerald-500">Bastia</span>
        </div>
    </header>

    <main class="flex-grow grid grid-cols-12 gap-8 min-h-0">
        <!-- LEFT -->
        <div class="col-span-4 flex flex-col gap-8 min-h-0">
            <div class="glass-card p-6 flex flex-col items-center justify-center gap-4 shrink-0">
                <div class="clock-container">
                    <div class="clock-face h-full w-full">
                        <div id="hour" class="hand hour-hand"></div>
                        <div id="min" class="hand min-hand"></div>
                        <div id="sec" class="hand second-hand"></div>
                    </div>
                </div>
                <div class="text-xs font-bold text-slate-500 uppercase tracking-widest">Temps réel scolaire</div>
            </div>

            <div class="glass-card p-6 flex flex-col gap-4 shrink-0">
                <span class="text-xs font-bold uppercase text-slate-400">Niveau Sonore</span>
                <div class="flex gap-2">
                    <button onclick="setNoise('chut')" id="noise-chut" class="flex-grow py-3 rounded-xl bg-white/5 text-xs font-bold transition-all">SILENCE</button>
                    <button onclick="setNoise('murmure')" id="noise-murmure" class="flex-grow py-3 rounded-xl bg-white/5 text-xs font-bold">MURMURE</button>
                    <button onclick="setNoise('libre')" id="noise-libre" class="flex-grow py-3 rounded-xl bg-white/5 text-xs font-bold">GROUPE</button>
                </div>
            </div>
        </div>

        <!-- RIGHT (EDITOR) -->
        <div class="col-span-8 flex flex-col gap-8 min-h-0">
            <div class="glass-card p-8 flex flex-col flex-grow min-h-0">
                <div class="flex items-center justify-between mb-4 shrink-0">
                    <span class="text-xs font-bold uppercase text-amber-500"><i class="fas fa-sticky-note mr-2"></i>Informations</span>
                    <div class="flex items-center gap-2 bg-black/20 p-1.5 rounded-xl border border-white/5">
                        <button onmousedown="event.preventDefault(); execCmd('bold')" class="editor-btn font-black text-sm">B</button>
                        <button onmousedown="event.preventDefault(); execCmd('underline')" class="editor-btn underline text-sm">U</button>
                        <button onmousedown="event.preventDefault(); execCmd('italic')" class="editor-btn italic text-sm">I</button>
                        <div class="w-px h-5 bg-white/10 mx-1"></div>
                        <button onmousedown="event.preventDefault(); changeFontSize('large')" class="editor-btn text-xs">Normal</button>
                        <button onmousedown="event.preventDefault(); changeFontSize('extra')" class="editor-btn text-sm font-bold">Grand</button>
                        <button onmousedown="event.preventDefault(); changeFontSize('xxl')" class="editor-btn text-lg font-black">XXL</button>
                        <button onmousedown="event.preventDefault(); changeFontSize('giga')" class="editor-btn text-2xl font-black text-rose-500">GIGA</button>
                        <div class="w-px h-5 bg-white/10 mx-1"></div>
                        <div class="flex gap-1 bg-black/40 p-1 rounded-lg">
                            <button onmousedown="event.preventDefault(); execCmd('foreColor', '#ffffff')" class="w-4 h-4 rounded-full bg-white border border-white/20"></button>
                            <button onmousedown="event.preventDefault(); execCmd('foreColor', '#ef4444')" class="w-4 h-4 rounded-full bg-red-500"></button>
                            <button onmousedown="event.preventDefault(); execCmd('foreColor', '#3b82f6')" class="w-4 h-4 rounded-full bg-blue-500"></button>
                            <button onmousedown="event.preventDefault(); execCmd('foreColor', '#22c55e')" class="w-4 h-4 rounded-full bg-green-500"></button>
                        </div>
                        <button onmousedown="event.preventDefault(); execCmd('backColor', '#fbbf24')" class="editor-btn text-amber-400 ml-2" title="Surligner"><i class="fas fa-highlighter"></i></button>
                    </div>
                </div>
                <!-- THE EDITOR BOARD -->
                <div id="info-board" contenteditable="true" class="info-area" placeholder="Tapez ici..."></div>
            </div>

            <div class="grid grid-cols-2 gap-8 h-48 shrink-0">
                <div class="glass-card p-6 flex items-center gap-6">
                    <div class="relative w-24 h-24 shrink-0">
                        <svg class="w-24 h-24 -rotate-90">
                            <circle cx="48" cy="48" r="44" fill="transparent" stroke="rgba(255,255,255,0.05)" stroke-width="6"></circle>
                            <circle id="timer-progress" cx="48" cy="48" r="44" fill="transparent" stroke="#f43f5e" stroke-width="6" stroke-dasharray="276" stroke-dashoffset="0" class="transition-all"></circle>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center font-bold text-xs" id="timer-label">5m</div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <div class="flex items-center gap-2">
                            <input type="number" id="timer-input" value="5" class="w-12 bg-white/5 border border-white/10 rounded-lg px-2 py-1 text-xl font-bold">
                            <span class="text-[10px] font-bold text-slate-500 uppercase">Min</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="startTimer()" id="timer-btn" class="bg-rose-500 px-4 py-2 rounded-xl text-xs font-bold">DÉMARRER</button>
                            <button onclick="resetTimer()" class="w-10 bg-white/5 rounded-xl flex items-center justify-center text-xs"><i class="fas fa-undo"></i></button>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 flex flex-col justify-center">
                    <blockquote class="text-base font-medium italic text-slate-200">"Allumer un feu."</blockquote>
                    <cite class="text-[10px] font-bold text-indigo-400 mt-2">— Montaigne</cite>
                </div>
            </div>
        </div>
    </main>

    <footer class="flex items-center justify-between shrink-0 text-[10px] font-bold uppercase tracking-widest text-slate-500">
        <span>© 2026 Gilles Cormi | Tableau de Bord</span>
        <span>BASTIA | Statut : Actif</span>
    </footer>

    <script>
        function updateClock() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            document.getElementById('hour').style.transform = `translateX(-50%) rotate(${(h % 12) * 30 + (m / 60) * 30}deg)`;
            document.getElementById('min').style.transform = `translateX(-50%) rotate(${m * 6}deg)`;
            document.getElementById('sec').style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
            document.getElementById('digital-clock').textContent = now.toLocaleTimeString('fr-FR');
            document.getElementById('current-date').textContent = now.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000); updateClock();

        function setTheme(theme) {
            document.body.className = `theme-${theme}`;
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${theme}`).classList.add('active');
            localStorage.setItem('classe_theme', theme);
        }
        setTheme(localStorage.getItem('classe_theme') || 'night');

        let timerInterval, timeLeft, originalTime;
        function startTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; document.getElementById('timer-btn').textContent = "REPRENDRE"; return; }
            if (!timeLeft) { timeLeft = parseInt(document.getElementById('timer-input').value) * 60; originalTime = timeLeft; }
            document.getElementById('timer-btn').textContent = "PAUSE";
            timerInterval = setInterval(() => {
                timeLeft--; 
                const offset = 276 - (timeLeft / originalTime) * 276;
                document.getElementById('timer-progress').style.strokeDashoffset = offset;
                document.getElementById('timer-label').textContent = Math.ceil(timeLeft / 60) + 'm';
                if (timeLeft <= 0) { clearInterval(timerInterval); new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play(); }
            }, 1000);
        }
        function resetTimer() { clearInterval(timerInterval); timerInterval = null; timeLeft = null; document.getElementById('timer-progress').style.strokeDashoffset = 0; document.getElementById('timer-btn').textContent = "DÉMARRER"; document.getElementById('timer-label').textContent = document.getElementById('timer-input').value + 'm'; }

        function setNoise(mode) {
            document.querySelectorAll('[id^="noise-"]').forEach(b => b.className = "flex-grow py-3 rounded-xl bg-white/5 text-xs font-bold transition-all");
            const color = mode === 'chut' ? 'rose' : (mode === 'murmure' ? 'emerald' : 'amber');
            document.getElementById('noise-' + mode).className = `flex-grow py-3 rounded-xl bg-${color}-500/20 text-${color}-400 text-xs font-bold pulse-${color}`;
        }

        const infoBoard = document.getElementById('info-board');
        infoBoard.innerHTML = localStorage.getItem('classe_info_board_html') || "";
        infoBoard.addEventListener('input', () => localStorage.setItem('classe_info_board_html', infoBoard.innerHTML));

        function execCmd(cmd, value = null) {
            infoBoard.focus();
            document.execCommand('styleWithCSS', null, true);
            document.execCommand(cmd, false, value);
            localStorage.setItem('classe_info_board_html', infoBoard.innerHTML);
        }

        function changeFontSize(size) {
            infoBoard.focus();
            const selection = window.getSelection();
            if (selection.toString().length > 0) {
                const sizes = { 'large': '4', 'extra': '5', 'xxl': '6', 'giga': '7' };
                document.execCommand('fontSize', false, sizes[size]);
            } else {
                const cssSizes = { 'large': '2.5rem', 'extra': '4rem', 'xxl': '6rem', 'giga': '9rem' };
                infoBoard.style.fontSize = cssSizes[size];
                localStorage.setItem('classe_font_size', size);
            }
            localStorage.setItem('classe_info_board_html', infoBoard.innerHTML);
        }
        // Restore
        const sSize = localStorage.getItem('classe_font_size') || 'large';
        infoBoard.style.fontSize = { 'large': '2.5rem', 'extra': '4rem', 'xxl': '6rem', 'giga': '9rem' }[sSize];
    </script>
</body>
</html>
