<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloc-note | Portail Éducatif</title>

    <!-- Quill.js rich text editor -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-light: #eef2ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ====== HEADER ====== */
        .app-header {
            flex-shrink: 0;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 0 1px 8px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }

        .back-btn {
            width: 34px; height: 34px; border-radius: 9px;
            background: white; border: 1.5px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: var(--accent); font-size: 0.8rem;
            transition: all 0.2s; flex-shrink: 0;
        }
        .back-btn:hover { background: var(--accent-light); border-color: var(--accent); }

        .app-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1rem;
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
        }

        .app-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800; font-size: 1rem; color: var(--text);
        }

        .sync-status {
            display: flex; align-items: center;
            font-size: 0.68rem; color: var(--text-muted);
            margin-top: 1px;
        }
        .sync-dot {
            width: 7px; height: 7px; border-radius: 50%; margin-right: 5px;
        }
        .sync-dot.saved  { background: #22c55e; animation: pulse-g 2s infinite; }
        .sync-dot.saving { background: #f59e0b; }
        .sync-dot.error  { background: #ef4444; }
        @keyframes pulse-g { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }

        .header-right { display: flex; align-items: center; gap: 8px; }

        .btn-icon {
            width: 34px; height: 34px; border-radius: 9px;
            border: 1.5px solid var(--border); background: white;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); cursor: pointer; font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-icon:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

        .btn-new-note {
            display: flex; align-items: center; gap: 7px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white; border: none; border-radius: 10px;
            padding: 8px 14px; font-size: 0.8rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 3px 10px rgba(99,102,241,0.3);
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
        }
        .btn-new-note:hover { transform: translateY(-1px) scale(1.03); box-shadow: 0 6px 18px rgba(99,102,241,0.4); }

        /* ====== TABS BAR ====== */
        .tabs-bar {
            flex-shrink: 0;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-end;
            gap: 0;
            padding: 0 16px;
            overflow-x: auto;
            scrollbar-width: thin;
        }
        .tabs-bar::-webkit-scrollbar { height: 4px; }
        .tabs-bar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .tab {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 14px;
            border: 1px solid transparent;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 0.8rem; font-weight: 600; color: var(--text-muted);
            background: transparent;
            white-space: nowrap;
            max-width: 180px;
            transition: all 0.2s;
            position: relative;
            bottom: -1px;
            flex-shrink: 0;
            user-select: none;
        }
        .tab:hover { background: white; color: var(--text); border-color: var(--border); }
        .tab.active {
            background: white; color: var(--accent);
            border-color: var(--border);
            border-bottom-color: white;
            box-shadow: 0 -2px 0 var(--accent) inset;
        }

        .tab-title {
            overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0;
        }

        .tab-title-edit {
            border: none; outline: none;
            background: transparent; font: inherit;
            color: var(--accent); width: 120px;
            padding: 0;
        }

        .tab-close {
            width: 18px; height: 18px; border-radius: 50%;
            border: none; background: none;
            color: #94a3b8; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; flex-shrink: 0;
            transition: all 0.15s;
        }
        .tab-close:hover { background: #fee2e2; color: #dc2626; }

        /* ====== TOOLBAR (Quill override) ====== */
        .quill-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
        }

        .ql-toolbar.ql-snow {
            flex-shrink: 0;
            border: none !important;
            border-bottom: 1px solid var(--border) !important;
            background: #fafafa;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
        }

        .ql-container.ql-snow {
            flex: 1;
            border: none !important;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
        }

        .ql-editor {
            height: 100% !important;
            padding: 24px 40px;
            line-height: 1.8;
            overflow-y: auto;
        }

        .ql-editor:focus { outline: none; }

        /* Image in editor */
        .ql-editor img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            margin: 8px 0;
            display: block;
        }

        /* Placeholder note when no tabs */
        .no-notes {
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px; color: var(--text-muted);
            background: white;
        }
        .no-notes .icon { font-size: 3.5rem; opacity: 0.3; }
        .no-notes h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700; font-size: 1.2rem; color: var(--text-muted);
        }
        .no-notes p { font-size: 0.875rem; }

        /* ====== IMAGE PASTE INDICATOR ====== */
        .paste-toast {
            position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(60px);
            background: rgba(15,23,42,0.82); color: white;
            padding: 10px 18px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
            backdrop-filter: blur(8px); z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
            opacity: 0; white-space: nowrap;
        }
        .paste-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ====== MODAL RENAME ====== */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(15,23,42,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.25s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box {
            background: white; border-radius: 18px;
            padding: 24px; width: 90%; max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.18);
            transform: scale(0.9) translateY(12px);
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .modal-overlay.active .modal-box { transform: scale(1) translateY(0); }
        .modal-box h3 {
            font-family: 'Outfit', sans-serif; font-weight: 800;
            font-size: 1rem; color: var(--text); margin-bottom: 14px;
        }
        .modal-input {
            width: 100%; border: 2px solid var(--border); border-radius: 10px;
            padding: 10px 12px; font-size: 0.9rem; outline: none;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
        .btn-cancel-sm {
            padding: 8px 14px; border-radius: 8px; border: none;
            background: #f1f5f9; color: var(--text-muted); font-weight: 600;
            font-size: 0.82rem; cursor: pointer;
        }
        .btn-save-sm {
            padding: 8px 16px; border-radius: 8px; border: none;
            background: var(--accent); color: white; font-weight: 700;
            font-size: 0.82rem; cursor: pointer;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        /* ===== AUTH OVERLAY (Glassmorphism) ===== */
        .auth-overlay {
            position: fixed; inset: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            opacity: 1; visibility: visible;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .auth-overlay.hidden {
            opacity: 0; visibility: hidden; pointer-events: none;
            transform: scale(1.1);
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.85);
            padding: 2.5rem; border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            text-align: center; max-width: 400px; width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .login-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white; padding: 1rem 2rem; border-radius: 1rem;
            font-weight: 700; display: flex; align-items: center; gap: 0.75rem;
            margin: 1.5rem auto 0; transition: all 0.3s; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body>
    <!-- Overlay de Sécurité Google (V3.9.1 Hardened) -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card" id="auth-card">
            <div id="auth-loading" class="mb-6">
                <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto"></div>
                <p class="text-slate-500 mt-4 font-bold text-sm">Vérification de session...</p>
            </div>
            <div id="auth-content" class="hidden">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl">
                    <i class="fas fa-lock"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-900 mb-2">Accès Sécurisé</h2>
                <p class="text-slate-500 mb-8 font-medium">Veuillez vous identifier avec votre compte Google pour accéder à votre bloc-note.</p>
                <button onclick="window.login()" class="login-btn">
                    <i class="fab fa-google"></i> Se connecter avec Google
                </button>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <header class="app-header">
        <div class="header-left">
            <a href="index.html" class="back-btn" title="Retour au portail">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="app-icon"><i class="fas fa-book-open"></i></div>
            <div>
                <div class="app-title">Bloc-note</div>
                <div class="sync-status">
                    <span class="sync-dot saved" id="sync-dot"></span>
                    <span id="sync-label">Synchronisé</span>
                </div>
            </div>
        </div>

        <div class="header-right">
            <button class="btn-icon" id="rename-btn" title="Renommer l'onglet actif">
                <i class="fas fa-pen"></i>
            </button>
            <button class="btn-icon" id="delete-btn" title="Supprimer l'onglet actif">
                <i class="fas fa-trash"></i>
            </button>
            <button class="btn-new-note" id="new-note-btn">
                <i class="fas fa-plus"></i> Nouvelle note
            </button>
        </div>
    </header>

    <!-- TABS -->
    <div class="tabs-bar" id="tabs-bar">
        <!-- Tabs injected by JS -->
    </div>

    <!-- EDITOR AREA -->
    <div id="editor-area" class="quill-wrapper">
        <!-- Quill or empty state injected by JS -->
    </div>

    <!-- PASTE TOAST -->
    <div class="paste-toast" id="paste-toast">
        <i class="fas fa-image" style="margin-right:7px"></i><span id="paste-toast-msg">Image collée et uploadée !</span>
    </div>

    <!-- RENAME MODAL -->
    <div class="modal-overlay" id="rename-modal">
        <div class="modal-box">
            <h3><i class="fas fa-pen" style="color:#6366f1;margin-right:8px"></i>Renommer la note</h3>
            <input type="text" id="rename-input" class="modal-input" placeholder="Titre de la note...">
            <div class="modal-actions">
                <button class="btn-cancel-sm" onclick="closeRenameModal()">Annuler</button>
                <button class="btn-save-sm" onclick="confirmRename()">Renommer</button>
            </div>
        </div>
    </div>

    <script>
    // ====== FIREBASE ======
    const firebaseConfig = {
        apiKey: "AIzaSyBGxXTvy8thfYJZTP-QbWrV-2euTmj4NPY",
        authDomain: "portail-postits.firebaseapp.com",
        projectId: "portail-postits",
        storageBucket: "portail-postits.firebasestorage.app",
        messagingSenderId: "494625342197",
        appId: "1:494625342197:web:9cc573fda25019e57ebbbc"
    };

    let fbApp;
    try { fbApp = firebase.app(); } catch(e) { fbApp = firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const notesRef = db.collection('blocnotes');

    window.login = function() {
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider).catch(err => {
            if(err.code === 'auth/popup-blocked' || err.code === 'auth/cancelled-popup-request') {
               firebase.auth().signInWithRedirect(provider);
            } else {
               alert("Erreur d'authentification : " + err.message);
            }
        });
    };

    // Initialize Firebase UI properly
    firebase.auth().onAuthStateChanged(user => {
        const overlay = document.getElementById('auth-overlay');
        const loading = document.getElementById('auth-loading');
        const content = document.getElementById('auth-content');

        if (user) {
            overlay.classList.add('hidden');
            console.log("[Auth] Session reconnue");
        } else {
            console.log("[Auth] Session absente, attente de restauration...");
            // Wait 2.5 seconds to see if session is shared from portal automatically
            setTimeout(() => {
                if (!firebase.auth().currentUser) {
                    loading.classList.add('hidden');
                    content.classList.remove('hidden');
                    console.log("[Auth] Session introuvable, affichage du bouton de connexion");
                }
            }, 2500);
        }
    });


    // ====== CLOUDINARY ======
    const CLOUD_NAME   = 'dqzli9qul';
    const UPLOAD_PRESET = 'portail-blocnote';

    // ====== STATE ======
    let notes = [];        // [{id, title, content, order, createdAt}]
    let activeId = null;
    let quill = null;
    let saveTimer = null;
    let isLoading = false;

    // ====== SYNC STATUS ======
    function setSyncStatus(state, msg) {
        const dot = document.getElementById('sync-dot');
        const lbl = document.getElementById('sync-label');
        dot.className = 'sync-dot ' + state;
        lbl.textContent = msg || (state === 'saved' ? 'Synchronisé' : state === 'saving' ? 'Sauvegarde...' : 'Erreur');
    }

    // ====== TOAST ======
    let toastTimer;
    function showPasteToast(msg) {
        const t = document.getElementById('paste-toast');
        document.getElementById('paste-toast-msg').textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ====== REAL-TIME LISTENER ======
    notesRef.orderBy('order', 'asc').onSnapshot(snapshot => {
        notes = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTabs();
        
        // Initial load or if active note was deleted
        if (!activeId && notes.length > 0) {
            selectNote(notes[0].id);
        } else if (activeId && !notes.find(n => n.id === activeId)) {
            selectNote(notes[0]?.id || null);
        }
    }, err => {
        setSyncStatus('error', 'Erreur Firebase');
        console.error(err);
    });

    // ====== RENDER TABS ======
    function renderTabs() {
        const bar = document.getElementById('tabs-bar');
        bar.innerHTML = '';
        notes.forEach(note => {
            const tab = document.createElement('div');
            tab.className = 'tab' + (note.id === activeId ? ' active' : '');
            tab.dataset.id = note.id;
            tab.innerHTML = `
                <span class="tab-title" title="${escHtml(note.title)}">${escHtml(note.title || 'Sans titre')}</span>
                <button class="tab-close" onclick="event.stopPropagation(); deleteNote('${note.id}')" title="Fermer"><i class="fas fa-times"></i></button>
            `;
            tab.addEventListener('click', () => selectNote(note.id));
            bar.appendChild(tab);
        });
    }

    // ====== SELECT NOTE ======
    function selectNote(id) {
        if(id === activeId && quill) return;
        
        // Save current before switching
        if(quill && activeId) {
            saveCurrentNote(true);
        }
        
        activeId = id;
        renderTabs();
        renderEditor();
    }

    // ====== RENDER EDITOR ======
    function renderEditor() {
        const area = document.getElementById('editor-area');
        const note = notes.find(n => n.id === activeId);

        if(!note) {
            area.innerHTML = `
                <div class="no-notes">
                    <div class="icon"><i class="fas fa-book-open"></i></div>
                    <h2>Aucune note</h2>
                    <p>Cliquez sur <strong>"Nouvelle note"</strong> pour commencer.</p>
                </div>`;
            quill = null;
            return;
        }

        area.innerHTML = '<div id="quill-editor"></div>';

        isLoading = true;
        quill = new Quill('#quill-editor', {
            theme: 'snow',
            placeholder: 'Commencez à écrire... (Ctrl+V pour coller une capture d\'écran)',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    [{ 'indent': '-1' }, { 'indent': '+1' }],
                    ['blockquote', 'code-block'],
                    ['link'],
                    ['clean']
                ]
            }
        });

        // Load content
        if(note.content) {
            try {
                const delta = JSON.parse(note.content);
                quill.setContents(delta, 'silent');
            } catch(e) {
                quill.setText(note.content);
            }
        }
        isLoading = false;

        // Autosave on change
        quill.on('text-change', () => {
            if(isLoading) return;
            setSyncStatus('saving', 'Sauvegarde...');
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => saveCurrentNote(false), 1200);
        });

        // Paste image handler
        quill.root.addEventListener('paste', handlePaste);

        // Focus
        quill.focus();
        // Move cursor to end
        quill.setSelection(quill.getLength(), 0);
    }

    // ====== SAVE NOTE ======
    async function saveCurrentNote(immediate = false) {
        if(!quill || !activeId) return;
        const content = JSON.stringify(quill.getContents());
        try {
            await notesRef.doc(activeId).update({ content, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
            setSyncStatus('saved', 'Synchronisé');
        } catch(e) {
            setSyncStatus('error', 'Erreur sauvegarde');
        }
    }

    // ====== NEW NOTE ======
    async function createNote() {
        const title = 'Note ' + (notes.length + 1);
        const order = notes.length > 0 ? Math.max(...notes.map(n => n.order || 0)) + 1 : 0;
        setSyncStatus('saving', 'Création...');
        try {
            const doc = await notesRef.add({
                title,
                content: '',
                order,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            // Select the new note immediately
            selectNote(doc.id);
        } catch(e) {
            setSyncStatus('error', 'Erreur');
        }
    }

    // ====== DELETE NOTE ======
    async function deleteNote(id) {
        if(notes.length <= 1) {
            if(!confirm('Supprimer cette dernière note ? Le bloc-note sera vide.')) return;
        } else {
            if(!confirm('Supprimer cette note définitivement ?')) return;
        }
        if(id === activeId) {
            const others = notes.filter(n => n.id !== id);
            activeId = others[0]?.id || null;
        }
        await notesRef.doc(id).delete().catch(console.error);
    }

    // ====== RENAME ======
    function openRenameModal() {
        if(!activeId) return;
        const note = notes.find(n => n.id === activeId);
        const input = document.getElementById('rename-input');
        input.value = note?.title || '';
        document.getElementById('rename-modal').classList.add('active');
        setTimeout(() => { input.focus(); input.select(); }, 80);
    }
    function closeRenameModal() {
        document.getElementById('rename-modal').classList.remove('active');
    }
    async function confirmRename() {
        const title = document.getElementById('rename-input').value.trim() || 'Sans titre';
        closeRenameModal();
        if(!activeId) return;
        await notesRef.doc(activeId).update({ title }).catch(console.error);
    }

    // ====== IMAGE PASTE (Cloudinary) ======
    async function handlePaste(e) {
        const items = e.clipboardData?.items;
        if(!items) return;

        for(const item of items) {
            if(item.type.startsWith('image/')) {
                e.preventDefault();
                const file = item.getAsFile();
                if(!file) continue;

                showPasteToast('⏳ Envoi de l\'image...');
                setSyncStatus('saving', 'Upload image...');

                try {
                    const url = await uploadToCloudinary(file);
                    const range = quill.getSelection(true);
                    quill.insertEmbed(range.index, 'image', url);
                    quill.setSelection(range.index + 1);
                    showPasteToast('✅ Image insérée et sauvegardée !');
                    // Trigger save
                    clearTimeout(saveTimer);
                    saveTimer = setTimeout(() => saveCurrentNote(false), 800);
                } catch(err) {
                    showPasteToast('❌ Erreur upload image');
                    setSyncStatus('error', 'Erreur image');
                    console.error(err);
                }
                return;
            }
        }
    }

    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);
        formData.append('folder', 'blocnote-images');

        const resp = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
            method: 'POST',
            body: formData
        });
        if(!resp.ok) throw new Error('Cloudinary upload failed: ' + resp.status);
        const data = await resp.json();
        return data.secure_url;
    }

    // ====== EVENTS ======
    document.getElementById('new-note-btn').addEventListener('click', createNote);
    document.getElementById('rename-btn').addEventListener('click', openRenameModal);
    document.getElementById('delete-btn').addEventListener('click', () => { if(activeId) deleteNote(activeId); });

    document.getElementById('rename-modal').addEventListener('click', e => {
        if(e.target === document.getElementById('rename-modal')) closeRenameModal();
    });
    document.getElementById('rename-input').addEventListener('keydown', e => {
        if(e.key === 'Enter') confirmRename();
        if(e.key === 'Escape') closeRenameModal();
    });
    document.addEventListener('keydown', e => {
        if(e.key === 'Escape') closeRenameModal();
    });

    // ====== UTILS ======
    function escHtml(s) {
        return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    </script>
