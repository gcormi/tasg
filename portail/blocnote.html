<!DOCTYPE html>
<html lang="fr">
<head>
    <script>
        // Accès admin uniquement — ni invités ni accès direct
        if (localStorage.getItem('portal_unlocked') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloc-note | Portail Éducatif</title>

    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-light: #eef2ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ====== AUTH OVERLAY ====== */
        .auth-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .auth-overlay.hidden {
            opacity: 0; visibility: hidden; pointer-events: none;
            transform: scale(1.05);
        }
        .auth-card {
            background: white;
            padding: 2.5rem; border-radius: 1.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            width: 90%; max-width: 380px;
        }
        .auth-logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.5rem;
            margin: 0 auto 1.25rem;
            box-shadow: 0 8px 20px rgba(99,102,241,0.35);
        }
        .auth-card h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800; font-size: 1.4rem;
            text-align: center; color: var(--text);
            margin-bottom: 0.25rem;
        }
        .auth-card p {
            text-align: center; color: var(--text-muted);
            font-size: 0.85rem; margin-bottom: 1.5rem;
        }
        .auth-label {
            display: block; font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-muted); margin-bottom: 0.35rem;
        }
        .auth-input {
            width: 100%; padding: 0.7rem 0.9rem;
            border: 2px solid var(--border); border-radius: 0.6rem;
            font-size: 0.95rem; margin-bottom: 1rem; outline: none;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.15s;
        }
        .auth-input:focus { border-color: var(--accent); }
        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white; border: none; border-radius: 0.75rem;
            padding: 0.85rem; font-size: 1rem; font-weight: 700;
            cursor: pointer; font-family: 'Inter', sans-serif;
            transition: opacity 0.15s; box-shadow: 0 4px 14px rgba(99,102,241,0.35);
        }
        .auth-btn:hover { opacity: 0.9; }
        .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .auth-error {
            background: #fef2f2; border: 1px solid #fca5a5;
            border-radius: 0.5rem; padding: 0.6rem 0.85rem;
            color: #dc2626; font-size: 0.82rem;
            margin-bottom: 1rem; display: none;
        }
        .auth-error.visible { display: block; }
        .auth-hint {
            text-align: center; margin-top: 1rem;
            font-size: 0.78rem; color: var(--text-muted);
        }

        /* ====== HEADER ====== */
        .app-header {
            flex-shrink: 0;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 0 1px 8px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }

        .back-btn {
            width: 34px; height: 34px; border-radius: 9px;
            background: white; border: 1.5px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: var(--accent); font-size: 0.8rem;
            transition: all 0.2s; flex-shrink: 0;
        }
        .back-btn:hover { background: var(--accent-light); border-color: var(--accent); }

        .app-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1rem;
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
        }

        .app-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800; font-size: 1rem; color: var(--text);
        }

        .sync-status {
            display: flex; align-items: center;
            font-size: 0.68rem; color: var(--text-muted);
            margin-top: 1px;
        }
        .sync-dot {
            width: 7px; height: 7px; border-radius: 50%; margin-right: 5px;
        }
        .sync-dot.saved  { background: #22c55e; animation: pulse-g 2s infinite; }
        .sync-dot.saving { background: #f59e0b; }
        .sync-dot.error  { background: #ef4444; }
        @keyframes pulse-g { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }

        .header-right { display: flex; align-items: center; gap: 8px; }

        .btn-icon {
            width: 34px; height: 34px; border-radius: 9px;
            border: 1.5px solid var(--border); background: white;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); cursor: pointer; font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-icon:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

        .btn-logout {
            font-size: 0.75rem; font-weight: 600; color: var(--text-muted);
            background: none; border: 1.5px solid var(--border); border-radius: 9px;
            padding: 0 10px; height: 34px; cursor: pointer; white-space: nowrap;
            transition: all 0.2s;
        }
        .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

        .btn-new-note {
            display: flex; align-items: center; gap: 7px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white; border: none; border-radius: 10px;
            padding: 8px 14px; font-size: 0.8rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 3px 10px rgba(99,102,241,0.3);
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
        }
        .btn-new-note:hover { transform: translateY(-1px) scale(1.03); box-shadow: 0 6px 18px rgba(99,102,241,0.4); }

        /* ====== TABS BAR ====== */
        .tabs-bar {
            flex-shrink: 0;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-end;
            gap: 0;
            padding: 0 16px;
            overflow-x: auto;
            scrollbar-width: thin;
        }
        .tabs-bar::-webkit-scrollbar { height: 4px; }
        .tabs-bar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .tab {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 14px;
            border: 1px solid transparent;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 0.8rem; font-weight: 600; color: var(--text-muted);
            background: transparent;
            white-space: nowrap;
            max-width: 200px;
            transition: all 0.2s;
            position: relative;
            bottom: -1px;
            flex-shrink: 0;
            user-select: none;
        }
        .tab:hover { background: white; color: var(--text); border-color: var(--border); }
        .tab.active {
            background: white; color: var(--text);
            border-color: var(--border);
            border-bottom-color: white;
        }
        .tab-color-dot {
            width: 10px; height: 10px; border-radius: 50%;
            flex-shrink: 0; border: 1.5px solid rgba(0,0,0,0.1);
        }
        .tab-title {
            overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0;
        }
        .tab-close {
            width: 18px; height: 18px; border-radius: 50%;
            border: none; background: none;
            color: #94a3b8; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; flex-shrink: 0;
            transition: all 0.15s;
        }
        .tab-close:hover { background: #fee2e2; color: #dc2626; }

        /* ====== EDITOR ====== */
        .quill-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
        }

        .ql-toolbar.ql-snow {
            flex-shrink: 0;
            border: none !important;
            border-bottom: 1px solid var(--border) !important;
            background: #fafafa;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
        }

        .ql-container.ql-snow {
            flex: 1;
            border: none !important;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
        }

        .ql-editor {
            height: 100% !important;
            padding: 24px 40px;
            line-height: 1.8;
            overflow-y: auto;
        }

        .ql-editor:focus { outline: none; }

        .ql-editor img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            margin: 8px 0;
            display: block;
        }

        .no-notes {
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px; color: var(--text-muted);
            background: white;
        }
        .no-notes .icon { font-size: 3.5rem; opacity: 0.3; }
        .no-notes h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700; font-size: 1.2rem; color: var(--text-muted);
        }
        .no-notes p { font-size: 0.875rem; }

        /* ====== TOAST ====== */
        .paste-toast {
            position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(60px);
            background: rgba(15,23,42,0.82); color: white;
            padding: 10px 18px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
            backdrop-filter: blur(8px); z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
            opacity: 0; white-space: nowrap;
        }
        .paste-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ====== MODALS ====== */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(15,23,42,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.25s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box {
            background: white; border-radius: 18px;
            padding: 24px; width: 90%; max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.18);
            transform: scale(0.9) translateY(12px);
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .modal-overlay.active .modal-box { transform: scale(1) translateY(0); }
        .modal-box h3 {
            font-family: 'Outfit', sans-serif; font-weight: 800;
            font-size: 1rem; color: var(--text); margin-bottom: 14px;
        }
        .modal-input {
            width: 100%; border: 2px solid var(--border); border-radius: 10px;
            padding: 10px 12px; font-size: 0.9rem; outline: none;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
        .btn-cancel-sm {
            padding: 8px 14px; border-radius: 8px; border: none;
            background: #f1f5f9; color: var(--text-muted); font-weight: 600;
            font-size: 0.82rem; cursor: pointer;
        }
        .btn-save-sm {
            padding: 8px 16px; border-radius: 8px; border: none;
            background: var(--accent); color: white; font-weight: 700;
            font-size: 0.82rem; cursor: pointer;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body>

    <!-- AUTH OVERLAY -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-logo"><i class="fas fa-book-open"></i></div>
            <h2>Bloc-note</h2>
            <p>Connectez-vous avec votre identifiant Experia pour retrouver vos notes sur n'importe quel ordinateur.</p>

            <div class="auth-error" id="auth-error"></div>

            <label class="auth-label">Identifiant</label>
            <input type="text" id="login-id" class="auth-input" placeholder="ex : gcormi" autocomplete="username">

            <label class="auth-label">Secret</label>
            <input type="password" id="login-secret" class="auth-input" placeholder="Votre secret Experia" autocomplete="current-password">

            <button class="auth-btn" id="login-btn" onclick="doLogin()">Se connecter</button>

            <p class="auth-hint">Même identifiant et secret que pour Experia.</p>
        </div>
    </div>

    <!-- HEADER -->
    <header class="app-header">
        <div class="header-left">
            <a href="index.html" class="back-btn" title="Retour au portail">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="app-icon"><i class="fas fa-book-open"></i></div>
            <div>
                <div class="app-title">Bloc-note</div>
                <div class="sync-status">
                    <span class="sync-dot saved" id="sync-dot"></span>
                    <span id="sync-label">Synchronisé</span>
                </div>
            </div>
        </div>

        <div class="header-right">
            <button class="btn-icon" id="color-btn" title="Couleur de la note">
                <i class="fas fa-palette"></i>
            </button>
            <button class="btn-icon" id="rename-btn" title="Renommer la note">
                <i class="fas fa-pen"></i>
            </button>
            <button class="btn-icon" id="delete-btn" title="Supprimer la note">
                <i class="fas fa-trash"></i>
            </button>
            <button class="btn-new-note" id="new-note-btn">
                <i class="fas fa-plus"></i> Nouvelle note
            </button>
            <button class="btn-logout" id="logout-btn" onclick="logout()">Déconnexion</button>
        </div>
    </header>

    <!-- TABS -->
    <div class="tabs-bar" id="tabs-bar"></div>

    <!-- EDITOR AREA -->
    <div id="editor-area" class="quill-wrapper"></div>

    <!-- TOAST -->
    <div class="paste-toast" id="paste-toast">
        <i class="fas fa-image" style="margin-right:7px"></i><span id="paste-toast-msg">Image insérée !</span>
    </div>

    <!-- RENAME MODAL -->
    <div class="modal-overlay" id="rename-modal">
        <div class="modal-box">
            <h3><i class="fas fa-pen" style="color:#6366f1;margin-right:8px"></i>Renommer la note</h3>
            <input type="text" id="rename-input" class="modal-input" placeholder="Titre de la note...">
            <div class="modal-actions">
                <button class="btn-cancel-sm" onclick="closeRenameModal()">Annuler</button>
                <button class="btn-save-sm" onclick="confirmRename()">Renommer</button>
            </div>
        </div>
    </div>

    <!-- COLOR MODAL -->
    <div class="modal-overlay" id="color-modal">
        <div class="modal-box">
            <h3><i class="fas fa-palette" style="color:#6366f1;margin-right:8px"></i>Couleur de la note</h3>
            <div id="color-swatches" style="display:flex;flex-wrap:wrap;gap:10px;margin:14px 0;justify-content:center;"></div>
            <div class="modal-actions">
                <button class="btn-cancel-sm" onclick="closeColorModal()">Fermer</button>
            </div>
        </div>
    </div>

<script>
const WORKER_URL = 'https://experia-proxy.gilles-cormi.workers.dev';

// ── État global ───────────────────────────────────────────────────────────────
let notes = [];
let activeId = null;
let quill = null;
let isLoading = false;
let saveTimer = null;
let profId = null;
let profSecret = null;
let _hasUnsaved = false; // true dès qu'une frappe est en attente de sauvegarde

// ── Sync status ───────────────────────────────────────────────────────────────
function setSyncStatus(status, label) {
    const dot = document.getElementById('sync-dot');
    const lbl = document.getElementById('sync-label');
    if (dot) dot.className = 'sync-dot ' + status;
    if (lbl) lbl.textContent = label;
}

// ── Worker call ───────────────────────────────────────────────────────────────
async function workerCall(data) {
    const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...data, profId, profSecret })
    });
    return res.json();
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function showAuthError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.classList.add('visible');
}

async function doLogin() {
    const id = document.getElementById('login-id').value.trim();
    const secret = document.getElementById('login-secret').value;
    document.getElementById('auth-error').classList.remove('visible');

    if (!id || !secret) { showAuthError('Identifiant et secret requis.'); return; }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Connexion...';

    try {
        profId = id;
        profSecret = secret;
        const data = await workerCall({ action: 'test' });
        if (!data.success) {
            showAuthError(data.error || 'Identifiant ou secret incorrect.');
            profId = null; profSecret = null;
            return;
        }
        localStorage.setItem('blocnote_auth', JSON.stringify({ profId: id, profSecret: secret }));
        startApp();
    } catch(e) {
        showAuthError('Erreur réseau : ' + e.message);
        profId = null; profSecret = null;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Se connecter';
    }
}

function logout() {
    if (!confirm('Se déconnecter du bloc-note ?')) return;
    localStorage.removeItem('blocnote_auth');
    profId = null; profSecret = null;
    notes = []; activeId = null; quill = null;
    document.getElementById('tabs-bar').innerHTML = '';
    document.getElementById('editor-area').innerHTML = '';
    document.getElementById('auth-overlay').classList.remove('hidden');
    document.getElementById('login-id').value = '';
    document.getElementById('login-secret').value = '';
}

// ── Démarrage ─────────────────────────────────────────────────────────────────
async function startApp() {
    document.getElementById('auth-overlay').classList.add('hidden');
    await loadNotes();
}

async function loadNotes() {
    setSyncStatus('saving', 'Chargement...');
    try {
        const data = await workerCall({ action: 'listNotes' });
        if (!data.success) { setSyncStatus('error', 'Erreur chargement'); return; }
        notes = data.notes || [];
        renderTabs();
        if (notes.length > 0) {
            await selectNote(notes[0].id);
        } else {
            renderEditor();
            setSyncStatus('saved', 'Prêt');
        }
    } catch(e) {
        setSyncStatus('error', 'Erreur réseau');
    }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function renderTabs() {
    const bar = document.getElementById('tabs-bar');
    bar.innerHTML = '';
    notes.forEach(note => {
        const colorEntry = NOTE_COLORS.find(c => c.value === (note.color || null)) || NOTE_COLORS[0];
        const tab = document.createElement('div');
        tab.className = 'tab' + (note.id === activeId ? ' active' : '');
        tab.dataset.id = note.id;
        tab.innerHTML = `
            <span class="tab-color-dot" style="background:${colorEntry.dot};"></span>
            <span class="tab-title" title="${escHtml(note.title)}">${escHtml(note.title || 'Sans titre')}</span>
            <button class="tab-close" onclick="event.stopPropagation(); deleteNote('${note.id}')" title="Fermer"><i class="fas fa-times"></i></button>
        `;
        tab.addEventListener('click', () => selectNote(note.id));
        bar.appendChild(tab);
    });
}

// ── Select note ───────────────────────────────────────────────────────────────
async function selectNote(id) {
    if (id === activeId && quill) return;

    if (quill && activeId) {
        clearTimeout(saveTimer);
        await saveCurrentNote();
    }

    activeId = id;
    renderTabs();

    const note = notes.find(n => n.id === id);
    if (note && note.content === undefined) {
        setSyncStatus('saving', 'Chargement...');
        try {
            const data = await workerCall({ action: 'readNote', noteId: id });
            if (data.success) {
                note.content = data.note.content || '';
            }
        } catch(e) {}
    }

    renderEditor();
    setSyncStatus('saved', 'Synchronisé');
}

// ── Editor ────────────────────────────────────────────────────────────────────
function renderEditor() {
    const area = document.getElementById('editor-area');
    const note = notes.find(n => n.id === activeId);

    if (!note) {
        area.innerHTML = `
            <div class="no-notes">
                <div class="icon"><i class="fas fa-book-open"></i></div>
                <h2>Aucune note</h2>
                <p>Cliquez sur <strong>"Nouvelle note"</strong> pour commencer.</p>
            </div>`;
        quill = null;
        return;
    }

    area.innerHTML = '<div id="quill-editor"></div>';
    applyNoteColor(note.color || null);

    isLoading = true;
    quill = new Quill('#quill-editor', {
        theme: 'snow',
        placeholder: 'Commencez à écrire…',
        modules: {
            toolbar: [
                [{ 'font': [] }, { 'size': ['small', false, 'large', 'huge'] }],
                [{ 'header': [1, 2, 3, 4, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'align': [] }],
                [{ 'list': 'ordered' }, { 'list': 'bullet' }, { 'list': 'check' }],
                [{ 'indent': '-1' }, { 'indent': '+1' }],
                ['blockquote', 'code-block'],
                ['link', 'image'],
                ['clean']
            ]
        }
    });

    if (note.content) {
        try {
            quill.setContents(JSON.parse(note.content), 'silent');
        } catch(e) {
            quill.setText(note.content);
        }
    }
    isLoading = false;

    quill.on('text-change', () => {
        if (isLoading) return;
        _hasUnsaved = true;
        setSyncStatus('saving', 'Sauvegarde...');
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => saveCurrentNote(), 1200);
    });

    quill.root.addEventListener('paste', handlePaste);
    quill.focus();
    quill.setSelection(quill.getLength(), 0);
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveCurrentNote() {
    if (!quill || !activeId) return;
    const note = notes.find(n => n.id === activeId);
    if (!note) return;
    const content = JSON.stringify(quill.getContents());
    note.content = content;
    try {
        await workerCall({ action: 'writeNote', note: { ...note, content } });
        _hasUnsaved = false;
        setSyncStatus('saved', 'Synchronisé');
    } catch(e) {
        setSyncStatus('error', 'Erreur sauvegarde');
    }
}

// ── Nouvelle note ─────────────────────────────────────────────────────────────
async function createNote() {
    const title = 'Note ' + (notes.length + 1);
    const order = notes.length > 0 ? Math.max(...notes.map(n => n.order || 0)) + 1 : 0;
    const newNote = { title, content: '', color: null, order, createdAt: Date.now() };
    setSyncStatus('saving', 'Création...');
    try {
        const data = await workerCall({ action: 'writeNote', note: newNote });
        if (!data.success) { setSyncStatus('error', 'Erreur création'); return; }
        newNote.id = data.noteId;
        notes.push(newNote);
        renderTabs();
        await selectNote(newNote.id);
    } catch(e) {
        setSyncStatus('error', 'Erreur réseau');
    }
}

// ── Supprimer note ────────────────────────────────────────────────────────────
async function deleteNote(id) {
    if (notes.length <= 1) {
        if (!confirm('Supprimer cette dernière note ?')) return;
    } else {
        if (!confirm('Supprimer cette note définitivement ?')) return;
    }

    if (id === activeId) {
        const others = notes.filter(n => n.id !== id);
        activeId = others[0]?.id || null;
    }

    notes = notes.filter(n => n.id !== id);
    renderTabs();

    if (activeId) {
        await selectNote(activeId);
    } else {
        renderEditor();
    }

    await workerCall({ action: 'deleteNote', noteId: id }).catch(() => {});
}

// ── Renommer ──────────────────────────────────────────────────────────────────
function openRenameModal() {
    if (!activeId) return;
    const note = notes.find(n => n.id === activeId);
    const input = document.getElementById('rename-input');
    input.value = note?.title || '';
    document.getElementById('rename-modal').classList.add('active');
    setTimeout(() => { input.focus(); input.select(); }, 80);
}
function closeRenameModal() {
    document.getElementById('rename-modal').classList.remove('active');
}
async function confirmRename() {
    const title = document.getElementById('rename-input').value.trim() || 'Sans titre';
    closeRenameModal();
    if (!activeId) return;
    const note = notes.find(n => n.id === activeId);
    if (!note) return;
    note.title = title;
    renderTabs();
    await workerCall({ action: 'writeNote', note }).catch(() => {});
}

// ── Couleurs ──────────────────────────────────────────────────────────────────
const NOTE_COLORS = [
    { name: 'Défaut',  value: null,      bg: '#ffffff', dot: '#cbd5e1' },
    { name: 'Jaune',   value: '#fefce8', bg: '#fefce8', dot: '#facc15' },
    { name: 'Rose',    value: '#fdf2f8', bg: '#fdf2f8', dot: '#ec4899' },
    { name: 'Bleu',    value: '#eff6ff', bg: '#eff6ff', dot: '#3b82f6' },
    { name: 'Vert',    value: '#f0fdf4', bg: '#f0fdf4', dot: '#22c55e' },
    { name: 'Orange',  value: '#fff7ed', bg: '#fff7ed', dot: '#f97316' },
    { name: 'Violet',  value: '#faf5ff', bg: '#faf5ff', dot: '#a855f7' },
    { name: 'Cyan',    value: '#ecfeff', bg: '#ecfeff', dot: '#06b6d4' },
    { name: 'Gris',    value: '#f8fafc', bg: '#f8fafc', dot: '#94a3b8' },
    { name: 'Rouge',   value: '#fff1f2', bg: '#fff1f2', dot: '#f43f5e' },
    { name: 'Indigo',  value: '#eef2ff', bg: '#eef2ff', dot: '#6366f1' },
    { name: 'Lime',    value: '#f7fee7', bg: '#f7fee7', dot: '#84cc16' },
];

function applyNoteColor(colorValue) {
    const editorEl = document.querySelector('.ql-editor');
    const containerEl = document.querySelector('.ql-container');
    const bg = colorValue || '#ffffff';
    if (editorEl) editorEl.style.background = bg;
    if (containerEl) containerEl.style.background = bg;
}

function openColorModal() {
    if (!activeId) return;
    const note = notes.find(n => n.id === activeId);
    const swatches = document.getElementById('color-swatches');
    swatches.innerHTML = '';
    NOTE_COLORS.forEach(c => {
        const btn = document.createElement('button');
        const isSelected = (note?.color || null) === c.value;
        btn.title = c.name;
        btn.style.cssText = `
            width:40px;height:40px;border-radius:50%;
            background:${c.bg};
            border:${isSelected ? '3px solid #6366f1' : '2px solid #e2e8f0'};
            cursor:pointer;
            box-shadow:${isSelected ? '0 0 0 3px rgba(99,102,241,0.2)' : 'none'};
            transition:all 0.15s;
        `;
        if (c.value === null) {
            btn.innerHTML = '<span style="font-size:1rem;line-height:40px;">✕</span>';
        } else {
            btn.innerHTML = `<span style="display:block;width:20px;height:20px;border-radius:50%;background:${c.dot};margin:auto;margin-top:8px;"></span>`;
        }
        btn.addEventListener('click', () => pickColor(c.value));
        swatches.appendChild(btn);
    });
    document.getElementById('color-modal').classList.add('active');
}
function closeColorModal() {
    document.getElementById('color-modal').classList.remove('active');
}
async function pickColor(colorValue) {
    closeColorModal();
    if (!activeId) return;
    const note = notes.find(n => n.id === activeId);
    if (!note) return;
    note.color = colorValue || null;
    renderTabs();
    applyNoteColor(colorValue);
    await workerCall({ action: 'writeNote', note }).catch(() => {});
}

// ── Image paste (base64) ──────────────────────────────────────────────────────
async function handlePaste(e) {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
        if (item.type.startsWith('image/')) {
            e.preventDefault();
            const file = item.getAsFile();
            if (!file) continue;
            showPasteToast('⏳ Insertion de l\'image...');
            try {
                const dataUrl = await fileToBase64(file);
                const range = quill.getSelection(true);
                quill.insertEmbed(range.index, 'image', dataUrl);
                quill.setSelection(range.index + 1);
                showPasteToast('✅ Image insérée !');
                _hasUnsaved = true;
                clearTimeout(saveTimer);
                saveTimer = setTimeout(() => saveCurrentNote(), 800);
            } catch(err) {
                showPasteToast('❌ Erreur image');
            }
            return;
        }
    }
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

function showPasteToast(msg) {
    const toast = document.getElementById('paste-toast');
    document.getElementById('paste-toast-msg').textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('new-note-btn').addEventListener('click', createNote);
document.getElementById('rename-btn').addEventListener('click', openRenameModal);
document.getElementById('color-btn').addEventListener('click', openColorModal);
document.getElementById('delete-btn').addEventListener('click', () => { if (activeId) deleteNote(activeId); });

document.getElementById('rename-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('rename-modal')) closeRenameModal();
});
document.getElementById('color-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('color-modal')) closeColorModal();
});
document.getElementById('rename-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmRename();
    if (e.key === 'Escape') closeRenameModal();
});
document.getElementById('login-secret').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
});
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeRenameModal(); closeColorModal(); }
});

// ── Protection fermeture accidentelle ─────────────────────────────────────────
window.addEventListener('beforeunload', function(e) {
    // Avertir si connecté ET sauvegarde en attente ou en cours
    if (!profId) return;
    if (_hasUnsaved || saveTimer !== null) {
        e.preventDefault();
        e.returnValue = 'Votre bloc-note contient des modifications non encore sauvegardées. Voulez-vous vraiment quitter ?';
        return e.returnValue;
    }
    // Même sans modification en cours : demander confirmation car carnet sensible
    e.preventDefault();
    e.returnValue = 'Voulez-vous vraiment quitter votre bloc-note ?';
    return e.returnValue;
});

// ── Auto-login depuis localStorage ────────────────────────────────────────────
(async function init() {
    const saved = JSON.parse(localStorage.getItem('blocnote_auth') || '{}');
    if (saved.profId && saved.profSecret) {
        document.getElementById('login-id').value = saved.profId;
        document.getElementById('login-secret').value = saved.profSecret;
        profId = saved.profId;
        profSecret = saved.profSecret;
        try {
            const data = await workerCall({ action: 'test' });
            if (data.success) { startApp(); return; }
        } catch(e) {}
        profId = null; profSecret = null;
    }
    document.getElementById('auth-overlay').classList.remove('hidden');
})();
</script>
