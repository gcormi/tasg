const PromptOutput = ({ prompt }) => {
    const [copySuccess, setCopySuccess] = React.useState(false); 
    
    // Méthode de secours utilisant document.execCommand('copy')
    const fallbackCopyToClipboard = (text) => {
        const textArea = document.createElement('textarea');
        textArea.value = text;
        
        // Empêche le défilement pendant que nous faisons la sélection
        textArea.style.position = 'fixed';
        textArea.style.left = '-9999px';
        textArea.style.top = '0';
        
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        
        try {
            document.execCommand('copy');
            setCopySuccess(true);
            setTimeout(() => setCopySuccess(false), 2500);
            return true;
        } catch (err) {
            console.error('Erreur: Échec de document.execCommand. Veuillez copier manuellement le texte.', err);
            return false;
        } finally {
            document.body.removeChild(textArea);
        }
    };

    const copyToClipboard = () => { 
        if (!prompt) return; 

        // Tente d'utiliser la méthode moderne (échoue généralement dans iframe)
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(prompt)
                .then(() => {
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(false), 2500);
                })
                .catch(() => {
                    // Si échec de permission (erreur attendue), on passe au fallback.
                    fallbackCopyToClipboard(prompt); 
                });
        } else {
            // Fallback immédiat si l'API moderne n'est pas supportée
            fallbackCopyToClipboard(prompt);
        }
    };

    return <div className="relative mt-6"><pre className="bg-slate-800 text-slate-200 p-4 rounded-lg overflow-x-auto max-h-[500px] text-sm prompt-output border border-slate-700"><code>{prompt}</code></pre><button onClick={copyToClipboard} className={`absolute top-3 right-3 p-2 rounded-lg transition-colors text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-800 focus:ring-blue-500 ${copySuccess ? 'bg-green-500 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`} aria-label={copySuccess ? "Copié !" : "Copier le prompt"}>{copySuccess ? <CheckIcon className="w-4 h-4"/> : <ClipboardIcon className="w-4 h-4"/>}</button></div>;
};

// --- LOGIC FOR KEYWORD EXTRACTION ---
const STOP_WORDS = new Set(['a', 'afin', 'ai', 'aie', 'aient', 'aies', 'ait', 'alors', 'apres', 'as', 'au', 'aucun', 'aucune', 'aujourd', 'aura', 'aurai', 'auraient', 'aurais', 'aurait', 'auras', 'aurez', 'auriez', 'aurions', 'aurons', 'auront', 'aussi', 'autre', 'autres', 'aux', 'avaient', 'avais', 'avait', 'avant', 'avec', 'avez', 'aviez', 'avions', 'avoir', 'avons', 'ayant', 'ayez', 'ayons', 'bon', 'car', 'ce', 'ceci', 'cela', 'celle', 'celles', 'celui', 'cependant', 'certain', 'certaine', 'certaines', 'certains', 'ces', 'cet', 'cette', 'ceux', 'chaque', 'ci', 'comme', 'comment', 'd', 'dans', 'de', 'deja', 'depuis', 'des', 'deux', 'devant', 'devrait', 'doit', 'donc', 'dont', 'du', 'elle', 'elles', 'en', 'encore', 'entre', 'est', 'et', 'etaient', 'etais', 'etait', 'etant', 'ete', 'etes', 'etiez', 'etions', 'etre', 'eu', 'eue', 'eues', 'eurent', 'eus', 'eusse', 'eussent', 'eusses', 'eussiez', 'eussions', 'eut', 'eux', 'faire', 'fais', 'faisaient', 'faisant', 'fait', 'faites', 'fois', 'font', 'furent', 'fus', 'fusse', 'fussent', 'fusses', 'fussiez', 'fussions', 'fut', 'haut', 'hors', 'hui', 'il', 'ils', 'j', 'je', 'l', 'la', 'le', 'les', 'leur', 'leurs', 'lui', 'm', 'ma', 'mais', 'me', 'meme', 'memes', 'mes', 'mien', 'mienne', 'miennes', 'miens', 'moi', 'moins', 'mon', 'mot', 'n', 'ne', 'ni', 'nom', 'non', 'nos', 'notre', 'notres', 'nous', 'on', 'ont', 'ou', 'par', 'parce', 'pas', 'pendant', 'personne', 'peu', 'peut', 'plus', 'plutot', 'pour', 'pourquoi', 'puis', 'qu', 'quand', 'que', 'quel', 'quelle', 'quelles', 'quels', 'qui', 's', 'sa', 'sans', 'se', 'sera', 'serai', 'seraient', 'serais', 'serait', 'seras', 'serez', 'seriez', 'serions', 'serons', 'seront', 'ses', 'si', 'sien', 'sienne', 'siennes', 'siens', 'soi', 'soient', 'sois', 'soit', 'sommes', 'son', 'sont', 'soyez', 'soyons', 'suis', 'sur', 't', 'ta', 'tandis', 'te', 'tel', 'telle', 'telles', 'tels', 'tes', 'toi', 'ton', 'tous', 'tout', 'toute', 'toutes', 'tres', 'tu', 'un', 'une', 'va', 'vais', 'vas', 'vers', 'voici', 'voila', 'vont', 'vos', 'votre', 'votres', 'vous', 'y']);
const normalizeWord = (word) => word.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^A-Z]/g, '');

/**
 * Extrait les mots-clés du texte, en respectant un nombre maximum et des mots forcés.
 * Les mots sont normalisés (majuscules, sans accents, sans caractères spéciaux).
 * @param {string} text 
 * @param {number} count 
 * @param {string} forcedWordsStr 
 * @returns {string[]} Tableau de mots-clés.
 */
function extractKeywords(text, count, forcedWordsStr) {
    const forcedWords = new Set((forcedWordsStr || '').split(',').map(w => normalizeWord(w.trim())).filter(w => w.length > 0));
    
    // Improved tokenization for French
    const words = text.toLowerCase()
        .replace(/['’]/g, ' ') // Replace apostrophes with space
        .split(/[^a-zA-ZàâäéèêëîïôöùûüçÀÂÄÉÈÊËÎÏÔÖÙÛÜÇ0-9]+/) // Split on non-alphanumeric chars (French aware)
        .filter(word => word.length > 3 && !STOP_WORDS.has(word));
    
    // 2. Compter la fréquence des mots normalisés
    const wordCount = {};
    words.forEach(word => {
        const normalized = normalizeWord(word);
        if (normalized.length > 0) {
            wordCount[normalized] = (wordCount[normalized] || 0) + 1;
        }
    });

    // 3. Trier par fréquence
    const sortedWords = Object.entries(wordCount).sort((a, b) => b[1] - a[1]).map(([word]) => word);
    
    const result = [];
    
    // 4. Ajouter d'abord les mots forcés
    forcedWords.forEach(word => { 
        if (word.length > 0 && !result.includes(word)) {
            result.push(word);
        }
    });
    
    // 5. Remplir avec les mots les plus fréquents jusqu'à atteindre 'count'
    for (const word of sortedWords) {
        if (!result.includes(word) && result.length < count) {
            result.push(word);
        }
    }
    
    return result.slice(0, count);
}

- **Introduction :** "Bienvenue dans ton parcours d'apprentissage ! Tu vas découvrir plusieurs jeux pédagogiques basés sur le cours. L'objectif est de réussir un maximum de jeux pédagogiques pour collecter des 'mots magiques' et prouver tes connaissances."
- **Choix du jeu pédagogique :** "En haut de la page, tu verras des onglets pour chaque jeu pédagogique (Memory, Pendu, etc.). Tu es libre de commencer par le jeu pédagogique que tu préfères et de passer d'un jeu pédagogique à l'autre à tout moment. Il n'y a pas d'ordre imposé."
- **Récompenses :** "Chaque fois que tu termines un jeu pédagogique avec succès, un **mot magique** te sera révélé en récompense. Collectionne-les tous !"

- **Fin du parcours :** "Une fois que tu as essayé tous les jeux pédagogiques, clique sur le bouton **'Terminer le Parcours'**. Un bilan final s'affichera avec la liste de tous les mots magiques que tu as réussi à gagner."
- **Conclusion :** "L'important est de participer et de s'amuser tout en révisant. Bonne chance !"

**1.  Navigation par Onglets :** La page doit avoir une barre d'onglets en haut pour chaque jeu : ${selectedGames.map(g => `"${g.label}"`).join(', ')}. L'élève doit pouvoir naviguer librement entre les jeux, même sans les avoir terminés.
**2.  Chronomètre :** Pour chaque jeu, si un chronomètre est activé, it must be **scrupulously respected**. It starts with the game and stops it if the time is up, which is equivalent to a failure.
**3.  Récompenses Individuelles :** À la fin de chaque jeu réussi, une modale doit apparaître pour révéler le mot magique spécifique à ce jeu. Le jeu doit mémoriser en interne (via une variable JavaScript) chaque mot magique débloqué.
**4.  Bouton "Passer le Jeu" :** Chaque jeu doit contenir un bouton "Passer" ou "Abandonner". Au clic, une fenêtre de confirmation doit apparaître ("Êtes-vous sûr de vouloir abandonner ? Vous ne gagnerez pas le mot magique pour ce jeu."). Si l'élève confirme, le jeu est marqué comme terminé (sans succès) et l'élève peut voir la solution si applicable. L'abandon ne bloque pas la navigation vers d'autres jeux.
**5.  Bilan Final :** Un bouton "Terminer le Parcours" doit être présent et visible en permanence. Au clic, il ouvre une modale de bilan qui récapitule la liste de tous les mots magiques que l'élève a gagnés. Si aucun mot n'a été gagné, il affiche un message d'encouragement.

`;
                selectedGames.forEach((game, index) => {
                    const constructor = PromptConstructors[game.id];
                    if (!constructor) return;

                    let gamePromptPart = `\n### JEU ${index + 1} : ${game.label} (dans l'onglet "${game.label}")\n`;
                    let constructorParams = { 
                        ...game.config,
                        timerMinutes: game.config.timerEnabled ? game.config.timerMinutes : null
                    };

                    // Logique pour les jeux basés sur une liste de mots
                    // On extrait un set de mots large pour tous les jeux
                    let countNeeded;
                    if (game.id === 'motsmeles' || game.id === 'motscroises' || game.id === 'pendu') {
                        countNeeded = game.config.numWords * 2; // Mots plus spécifiques
                    } else if (game.id === 'memory') {
                        countNeeded = game.config.numPairs * 3;
                    } else if (game.id === 'intrus') {
                        countNeeded = game.config.numSets * 5;
                    } else if (game.id === 'association') {
                        countNeeded = game.config.numZones * game.config.numItemsPerZone * 2;
                    }
                    
                    countNeeded = Math.max(12, Math.ceil(countNeeded * 1.5)); 
                    let words = extractKeywords(courseText, countNeeded, game.config.forcedWords);

                    if (game.id === 'motsmeles') {
                        // Filtrer les mots > 12 caractères pour éviter les débordements
                        words = words.filter(w => w.length <= 12);
                    }
                    
                    if (words.length < game.config.numWords) {
                         throw new Error(`Pour le jeu "${game.label}", seulement ${words.length} mots valides sur les ${game.config.numWords} nécessaires ont pu être trouvés. Essayez avec un texte plus riche.`);
                    }

                    constructorParams.words = words;
                    
                    gamePromptPart += constructor(constructorParams);
                    superPrompt += gamePromptPart;
                });

                superPrompt += "\n---\n\nProduisez maintenant le code complet et unique pour ce fichier `index.html`. Assurez-vous que la structure à onglets est fonctionnelle et que chaque jeu est autonome dans son onglet.";
                setGeneratedPrompt(superPrompt);

            } catch (e) {
                console.error(e);
                setError(e.message);
            } finally {
                setIsLoading(false);
            }
        }, 200);
    }, [games, courseText]);

    return (
        // --- MODIFICATION : Ajout de "relative" ---
        <div className="min-h-screen font-sans p-4 sm:p-6 lg:p-8 bg-gradient-to-br from-indigo-50 via-white to-blue-50 relative">

            <a href="boite.html" className="absolute top-4 left-4 sm:top-6 sm:left-6 lg:top-8 lg:left-8 flex items-center gap-2 text-slate-500 hover:text-blue-600 font-semibold transition-colors z-10">
                <ArrowLeftIcon className='w-5 h-5'/>Retour
            </a>
            {/* --- FIN DE LA MODIFICATION --- */}
            <div className="max-w-3xl mx-auto space-y-8">
                <header className="text-center py-10">
                    <div className='inline-block bg-white p-4 rounded-2xl mb-6 shadow-md border border-slate-100'> 
                        <SparklesIcon className='w-10 h-10 text-blue-600'/>
                    </div>
                    <h1 className='text-4xl sm:text-5xl font-extrabold bg-gradient-to-r from-blue-600 to-indigo-600 text-transparent bg-clip-text'>Super Générateur</h1>
                    <h2 className='text-2xl sm:text-3xl font-semibold text-slate-700 mt-1'>de Jeux Pédagogiques</h2>
                    <p className='text-base text-slate-500 max-w-2xl mx-auto mt-4 leading-relaxed'> 
                        Transformez vos cours en parcours de jeux interactifs ! Sélectionnez les jeux que vous souhaitez, configurez-les selon vos besoins, et générez un prompt complet pour créer une expérience d'apprentissage gamifiée.
                    </p>
                </header>
                
                <HowToPlaySection />

                <Card className='animate-fade-in'>
                    <SectionTitle 
                        icon={<DocumentTextIcon className="w-6 h-6 text-slate-500" />} 
                        title="1. Texte du cours" 
                        subtitle="Collez ici le contenu de votre cours pour générer les jeux" 
                    />
                    <div className='mt-6'>
                        <textarea
                            className="w-full h-36 p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition text-slate-700 placeholder-slate-400 resize-y"
                            value={courseText}
                            onChange={e => setCourseText(e.target.value)}
                            placeholder="Collez ici le texte de votre cours, leçon, ou tout contenu pédagogique..."
                        />
                        {textWarning && <div className='mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg'>
                            <div className='flex items-start space-x-3'>
                                <InformationCircleIcon className="w-5 h-5 text-amber-600 mt-0.5 flex-shrink-0" />
                                <p className='text-sm text-amber-700'>{textWarning}</p>
                            </div>
                        </div>}
                        {/* Affichage des mots-clés extraits pour information */}
                        {topKeywords.length > 0 && <div className='mt-4 p-3 bg-slate-100 border border-slate-200 rounded-lg text-sm'>
                             <p className='font-semibold text-slate-700 mb-1'>{`Mots-clés extraits (suggestions pour les jeux) :`}</p>
                             <p className='text-slate-600 text-xs'>{topKeywords.join(', ')}</p>
                        </div>}
                    </div>
                </Card>

                <Card className='animate-fade-in'>
                    <SectionTitle 
                        icon={<PuzzleIcon className="w-6 h-6 text-slate-500" />} 
                        title="2. Sélection des jeux" 
                        subtitle="Choisissez les types de jeux à inclure dans votre parcours" 
                    />
                    <div className='grid grid-cols-2 md:grid-cols-3 gap-4 mt-6'>
                        {Object.values(games).map(game => {
                            const IconComponent = getGameIcon(game.id);
                            return <div
                                key={game.id}
                                className={`text-center rounded-xl p-4 cursor-pointer transition-all duration-200 border-2 ${game.selected ? 'border-blue-500 bg-blue-50' : 'border-slate-200 bg-white hover:border-slate-300'}`}
                                onClick={() => handleGameSelectionChange(game.id)}
                            >
                                <div className='flex flex-col items-center justify-between h-full'>
                                    <div className='flex-grow flex flex-col items-center justify-center'>
                                        <IconComponent />
                                        <h3 className='font-bold text-slate-700 text-sm mt-2'>{game.label}</h3>
                                    </div>
                                    <div className='mt-4 w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0' style={{ borderColor: game.selected ? '#3b82f6' : '#cbd5e1' }}>
                                        {game.selected && <div className="w-2.5 h-2.5 bg-blue-600 rounded-full" />}
                                    </div>
                                </div>
                            </div>;
                        })}
                    </div>
                </Card>

                {Object.values(games).filter(game => game.selected).length > 0 && <Card className='animate-fade-in'>
                    <SectionTitle 
                        icon={<CheckCircleIcon className="w-6 h-6 text-slate-500" />} 
                        title="3. Configuration des jeux" 
                        subtitle="Personnalisez les paramètres des jeux sélectionnés" 
                    />
                    <div className='grid grid-cols-1 md:grid-cols-2 gap-6 mt-6'>
                        {Object.values(games).filter(game => game.selected).map(game => {
                            const ConfigComponent = game.component;
                            return <ConfigComponent
                                key={game.id}
                                config={{ ...game.config, id: game.id }}
                                onUpdate={(newConfig) => handleConfigUpdate(game.id, newConfig)}
                            />;
                        })}
                    </div>
                </Card>}

                <div className='py-6'>
                    <Button
                        onClick={handleGenerateSuperPrompt}
                        isLoading={isLoading}
                        disabled={Object.values(games).filter(g => g.selected).length === 0 || !courseText.trim()}
                        icon={<SparklesIcon className="w-5 h-5" />}
                    >
                        {isLoading ? 'Génération...' : '4. Générer le Super-Prompt'}
                    </Button>
                </div>

                {error && <div className='p-4 bg-red-100 border border-red-300 rounded-lg animate-fade-in'>
                    <div className='flex items-start space-x-3'>
                        <div className='w-5 h-5 text-red-600 mt-0.5 flex-shrink-0'>⚠️</div>
                        <p className='text-sm font-semibold text-red-800'>{error}</p>
                    </div>
                </div>}

                {generatedPrompt && <Card className='animate-fade-in'>
                    <SectionTitle 
                        icon={<CheckCircleIcon className="w-6 h-6 text-green-500" />} 
                        title="Votre super-prompt est prêt !" 
                        subtitle="Copiez ce prompt et utilisez-le avec votre IA préférée" 
                    />
                    <PromptOutput prompt={generatedPrompt} />
                    <div className='mt-4 p-4 bg-blue-50 border border-blue-200 rounded-lg'>
                        <div className='flex items-start space-x-3'>
                            <InformationCircleIcon className="w-5 h-5 text-blue-600 mt-0.5 flex-shrink-0" />
                            <div className='text-sm text-blue-800'>
                                <p className='font-semibold mb-1'>Comment utiliser ce prompt :</p>
                                <ol className='list-decimal list-inside space-y-1'>
                                    <li>Copiez le prompt généré ci-dessus.</li>
                                    <li>Collez-le dans votre IA (ChatGPT, Claude, Gemini...).</li>
                                    <li>L'IA créera un fichier HTML complet avec tous vos jeux.</li>
                                    <li>Sauvegardez ce code dans un fichier .html et ouvrez-le.</li>
                                    <li><strong>Votre parcours de jeux est prêt !</strong></li>
                                </ol>
                            </div>
                        </div>
                    </div>
                </Card>}
            </div>
        </div>
    );
};
